<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Followers List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white">
    <header class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white z-50">
        <i class="fa-solid fa-arrow-left text-xl cursor-pointer" onclick="history.back()"></i>
        <h1 class="font-bold text-lg">Followers</h1>
    </header>

    <div id="followers-list" class="p-4 space-y-4">
        <p id="loading-msg" class="text-center text-gray-400 text-sm mt-10">Loading followers...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                // Real-time followers check
                onSnapshot(doc(db, "users", user.uid), async (snap) => {
                    const listDiv = document.getElementById('followers-list');
                    const followers = snap.data()?.followers || [];
                    
                    if(followers.length === 0) {
                        listDiv.innerHTML = `<p class="text-center text-gray-400 mt-10">No followers yet. 👑</p>`;
                        return;
                    }

                    listDiv.innerHTML = "";
                    for(let fUid of followers) {
                        const fDoc = await getDoc(doc(db, "users", fUid));
                        if(fDoc.exists()) {
                            const d = fDoc.data();
                            listDiv.innerHTML += `
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <img src="${d.photoURL || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-full border object-cover">
                                        <div>
                                            <p class="font-bold text-sm">${d.name || 'Gajan User'}</p>
                                            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">UID: ${fUid.substring(0,8)}...</p>
                                        </div>
                                    </div>
                                    <button class="bg-gray-100 px-4 py-1.5 rounded-lg text-xs font-bold border">Remove</button>
                                </div>`;
                        }
                    }
                });
            } else { location.href = "index.html"; }
        });
    </script>
</body>
</html>
