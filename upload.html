    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; } 
            else { console.log("User not logged in"); }
        });

        window.showPreview = (input) => {
            const file = input.files[0];
            if(file) {
                const preview = document.getElementById('preview');
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
                document.getElementById('ui-box').classList.add('hidden');
            }
        };

        window.startGajanUpload = async () => {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            const btn = document.getElementById('post-btn');
            const captionText = document.getElementById('caption').value;

            if(!currentUser) return alert("Pehle Login karein (Profile page par jaakar)!");
            if(!file) return alert("Pehle video select karein!");

            // UI Changes
            btn.style.display = 'none'; 
            document.getElementById('loader').classList.remove('hidden');

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "gajan_live"); // IMPORTANT: Cloudinary mein ise 'Unsigned' rakhein
            formData.append("cloud_name", "dvfgzrxs7");

            const xhr = new XMLHttpRequest();
            xhr.open("POST", "https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", true);

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progress-bar').style.width = percent + "%";
                    document.getElementById('status-txt').innerText = `UPLOADING: ${percent}%`;
                }
            };

            xhr.onload = async () => {
                const response = JSON.parse(xhr.responseText);
                if (xhr.status === 200 || xhr.status === 201) {
                    document.getElementById('status-txt').innerText = "SAVING TO GAJAN FEED...";
                    
                    try {
                        await addDoc(collection(db, "reels"), {
                            videoUrl: response.secure_url,
                            caption: captionText,
                            name: currentUser.displayName || "Gajan User",
                            userPhoto: currentUser.photoURL || "https://via.placeholder.com/150",
                            uid: currentUser.uid,
                            time: serverTimestamp(),
                            views: 0,
                            likedBy: []
                        });
                        alert("🚀 Post Live Ho Gaya!");
                        window.location.href = "reels.html"; // Seedha Reels page par bhejein
                    } catch (e) {
                        console.error("Firebase Error:", e);
                        alert("Database Error! Firebase Rules check karein.");
                        btn.style.display = 'block';
                    }
                } else {
                    console.error("Cloudinary Error:", response);
                    alert("Upload Failed! Cloudinary settings check karein.");
                    btn.style.display = 'block';
                }
            };

            xhr.onerror = () => {
                alert("Network Error! Check your internet connection.");
                btn.style.display = 'block';
            };

            xhr.send(formData);
        };
    </script>
