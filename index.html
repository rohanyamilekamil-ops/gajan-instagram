<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Supreme 2027 Engine</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --cyan: #25f4ee; --bg: #000; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- 1. LOGIN WITH GAJAN STYLES BACKGROUND --- */
        #authScreen { 
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
            background: #000; overflow: hidden;
        }
        .gajan-bg-text {
            position: absolute; font-size: 12vw; font-weight: 900; line-height: 1;
            color: rgba(255,255,255,0.02); text-transform: uppercase; pointer-events: none;
            user-select: none; white-space: nowrap; animation: moveText 20s linear infinite;
        }
        @keyframes moveText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        
        .login-card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; 
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); width: 85%; text-align: center; 
            z-index: 10; box-shadow: 0 0 50px rgba(254,44,85,0.2);
        }

        /* --- 2. FEED LAYOUT (ORIGINAL TIKTOK) --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; }
        .active-screen { display: flex; }
        #feedScroll { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Right Side Buttons */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .p-gold-ring { width: 55px; height: 55px; border-radius: 50%; border: 2.5px solid var(--gold); padding: 2px; background: #000; }
        .p-gold-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .action-icon { font-size: 32px; text-align: center; text-shadow: 0 2px 10px #000; cursor: pointer; }
        .action-icon span { font-size: 12px; display: block; font-weight: bold; margin-top: 4px; }

        /* --- 3. MASTER ADMIN PANEL --- */
        #adminPanel { position: fixed; inset: 0; background: #080808; z-index: 10000; display: none; padding: 25px; overflow-y: auto; border: 2px solid var(--gold); }
        .admin-section { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background: #222; color: #fff; }
        .admin-post-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a1a; margin-top: 8px; border-radius: 10px; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { color: #555; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 26px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="gajan-bg-text" style="top: 10%;">GAJAN GAJAN GAJAN</div>
        <div class="gajan-bg-text" style="top: 40%; animation-delay: -5s; color: rgba(37, 244, 238, 0.02);">GAJAN GAJAN GAJAN</div>
        <div class="gajan-bg-text" style="top: 70%; animation-delay: -10s;">GAJAN GAJAN GAJAN</div>
        
        <div class="login-card">
            <h1 style="color:var(--neon); font-size: 55px; font-weight: 900; letter-spacing: 5px;">GAJAN</h1>
            <p style="color: gray; font-size: 12px; margin-bottom: 30px;">Original TikTok Clone 2027</p>
            <button onclick="googleLogin()" style="width: 100%; padding: 18px; border-radius: 50px; border: none; background: #fff; font-weight: 900; cursor: pointer;">START SYSTEM</button>
        </div>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedScroll"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 60px 20px;">
            <div onclick="adminGodTrigger()" class="p-gold-ring" style="width: 110px; height: 110px; margin: 0 auto; position: relative;">
                <img id="myPhoto" src="https://via.placeholder.com/100">
                <i class="fas fa-camera" onclick="galleryUploadPFP()" style="position: absolute; bottom: 5px; right: 5px; background: var(--neon); padding: 8px; border-radius: 50%; font-size: 12px;"></i>
            </div>
            <h2 id="myName" style="margin-top: 15px; font-size: 28px;">User</h2>
            <p id="myEmail" style="color: gray; font-size: 13px;"></p>
            
            <div style="display:flex; justify-content:center; gap:30px; margin-top:35px;">
                <div>🪙 <b id="myTokens">0</b><br><small>Tokens</small></div>
                <button onclick="document.getElementById('buyBox').style.bottom='0'; fetchAdminQRs();" style="background:var(--gold); border:none; padding:12px 30px; border-radius:15px; font-weight:bold; color:#000;">BUY TOKENS</button>
            </div>
        </div>
        <div id="myGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:1px;"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold); text-align: center; margin-bottom: 30px;">GOD-MODE CONTROL</h2>
        
        <div class="admin-section">
            <h4>Token Distribution (Stock: 10M)</h4>
            <input type="text" id="targetE" placeholder="User Email">
            <input type="number" id="targetA" placeholder="Amount">
            <button onclick="distributeTokens()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; margin-top:15px;">SEND TOKENS</button>
        </div>

        <div class="admin-section">
            <h4>QR Manager (Gallery Upload)</h4>
            <input type="file" accept="image/*" onchange="uploadQRFromGallery(this)">
            <button onclick="deleteQRs()" style="width:100%; padding:10px; background:red; color:#fff; border:none; border-radius:8px; margin-top:10px;">DELETE ALL QRS</button>
        </div>

        <div class="admin-section" id="adminPostManager">
            <h4>Manage Viral Feed (Delete)</h4>
            </div>

        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:15px; background:#333; color:#fff; border:none; border-radius:10px;">EXIT CONTROL</button>
    </div>

    <div id="buyBox" style="position:fixed; bottom:-100%; width:100%; height:80%; background:#111; z-index:6000; transition:0.5s; padding:25px; border-radius:40px 40px 0 0; border-top: 2px solid var(--gold);">
        <h3 style="text-align: center;">Scan & Deposit</h3>
        <div id="qrListArea" style="display:flex; gap:15px; overflow-x:auto; margin-top:25px; height:350px;"></div>
        <button onclick="document.getElementById('buyBox').style.bottom='-100%'" style="width:100%; padding:15px; background:var(--neon); color:#fff; border:none; border-radius:15px; font-weight:bold; margin-top:20px;">CLOSE</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('feedScreen', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="startViralUpload()"><i class="fas fa-plus-square" style="font-size:32px; color:#fff;"></i></div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user-circle"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH & SYNC ---
        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(async u => {
            if(u) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(u.uid);
                const doc = await ref.get();
                if(!doc.exists) await ref.set({ name: u.displayName, email: u.email, photo: u.photoURL, tokens: 0 });
                ref.onSnapshot(s => {
                    const data = s.data();
                    document.getElementById('myName').innerText = data.name;
                    document.getElementById('myEmail').innerText = data.email;
                    document.getElementById('myPhoto').src = data.photo;
                    document.getElementById('myTokens').innerText = (data.tokens || 0).toLocaleString();
                });
                loadFeed();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // --- GALLERY UPLOADS ---
        async function galleryUploadPFP() {
            let i = document.createElement('input'); i.type='file'; i.accept='image/*';
            i.onchange = async (e) => {
                const f = e.target.files[0];
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", {method:'POST', body:fd});
                const d = await res.json();
                await db.collection('users').doc(auth.currentUser.uid).update({ photo: d.secure_url });
                alert("Profile Photo Updated!");
            }; i.click();
        }

        async function uploadQRFromGallery(input) {
            const f = input.files[0];
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
            const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", {method:'POST', body:fd});
            const d = await res.json();
            const ref = db.collection('admin_config').doc('qrs');
            const doc = await ref.get();
            let urls = doc.exists ? doc.data().urls : [];
            urls.push(d.secure_url);
            await ref.set({ urls: urls });
            alert("System QR Updated!");
        }

        // --- FEED & VIDEO SYSTEM ---
        async function startViralUpload() {
            let i = document.createElement('input'); i.type='file'; i.accept='video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0]; alert("CONGRATULATIONS! Uploading started...");
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", {method:'POST', body:fd});
                const d = await res.json();
                const u = auth.currentUser;
                await db.collection('posts').add({
                    url: d.secure_url, uid: u.uid, uName: u.displayName, uPic: u.photoURL, uEmail: u.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                alert("Live!"); loadFeed();
            }; i.click();
        }

        async function loadFeed() {
            const cont = document.getElementById('feedScroll');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="v-post">
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="p-gold-ring"><img src="${d.uPic}"></div>
                            <div class="action-icon"><i class="fas fa-heart"></i><span>${d.likes}</span></div>
                            <div class="action-icon" onclick="alert('Gmail: ${d.uEmail}')"><i class="fas fa-gift" style="color:var(--gold)"></i><span>Gift</span></div>
                            <div class="action-icon"><i class="fas fa-share"></i><span>Share</span></div>
                        </div>
                        <div style="position:absolute; bottom:95px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3 style="font-size:22px;">@${d.uName}</h3>
                            <p style="font-size:11px; opacity:0.6;">${d.uEmail}</p>
                        </div>
                    </div>`;
            });
            const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- MASTER ADMIN LOGIC ---
        let taps = 0;
        function adminGodTrigger() {
            taps++; if(taps >= 5) {
                let p = prompt("MASTER ACCESS KEY:");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminPanel').style.display='block';
                    loadAdminPosts();
                }
                taps = 0;
            }
        }

        async function loadAdminPosts() {
            const list = document.getElementById('adminPostManager');
            const snap = await db.collection('posts').get();
            list.innerHTML = "<h4>Manage Viral Feed</h4>";
            snap.forEach(doc => {
                list.innerHTML += `<div class="admin-post-item">
                    <span>@${doc.data().uName}</span>
                    <button onclick="adminDeleteV('${doc.id}')" style="background:red; color:#fff; border:none; padding:5px 10px; border-radius:5px;">Delete</button>
                </div>`;
            });
        }

        async function adminDeleteV(id) { if(confirm("Delete Video?")) { await db.collection('posts').doc(id).delete(); loadAdminPosts(); } }
        async function deleteQRs() { if(confirm("Delete All QRs?")) { await db.collection('admin_config').doc('qrs').set({urls:[]}); alert("Deleted!"); } }

        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }

        async function fetchAdminQRs() {
            const disp = document.getElementById('qrListArea');
            const snap = await db.collection('admin_config').doc('qrs').get();
            disp.innerHTML = "";
            if(snap.exists) snap.data().urls.forEach(u => disp.innerHTML += `<img src="${u}" style="height:100%; border-radius:20px;">`);
        }
    </script>
</body>
</html>
