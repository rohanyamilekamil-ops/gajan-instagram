<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-tr from-orange-500 to-pink-600 h-screen flex items-center justify-center">
    <div class="w-full max-w-sm p-8 text-center">
        <h1 class="text-7xl text-white mb-8" style="font-family: 'Grand Hotel', cursive;">Gajan</h1>
        <div class="bg-white/20 backdrop-blur-lg p-8 rounded-[30px] border border-white/30 space-y-5">
            <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-white/10 rounded-2xl outline-none text-white placeholder-white/70">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-white/10 rounded-2xl outline-none text-white placeholder-white/70">
            <button onclick="login()" class="w-full py-4 bg-white text-pink-600 font-bold rounded-2xl shadow-xl">Log In</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.login = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p)
            .then(() => window.location.href = "profile.html")
            .catch(err => alert("Email ya Password galat hai!"));
        };
    </script>
</body>
</html>
