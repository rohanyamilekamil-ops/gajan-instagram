<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan TikTok | Ultimate System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- SCREENS --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* --- HOME (POSTS ONLY) & FEED (VIDEO ONLY) --- */
        .post-card { background: #111; margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #222; }
        .post-card img { width: 100%; border-radius: 10px; }
        
        #videoFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- SIDEBAR & WATERMARK --- */
        .watermark { position: absolute; top: 20px; left: 20px; font-weight: 900; color: rgba(255,255,255,0.4); text-shadow: 0 0 10px var(--neon); z-index: 100; }
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 500; }
        .user-circ { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); padding: 2px; }
        .user-circ img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- NAVIGATION --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 2000; border-top: 0.5px solid #333; }
        .nav-item { text-align: center; color: #777; font-size: 11px; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }

        /* --- MODALS --- */
        .modal { position: fixed; bottom: -100%; width: 100%; background: #151515; border-radius: 20px 20px 0 0; z-index: 3000; transition: 0.3s; padding: 20px; border-top: 2px solid var(--neon); }
        .input-g { width: 100%; padding: 15px; background: #222; border: none; color: #fff; border-radius: 10px; margin: 10px 0; }
        .btn-action { width: 100%; padding: 15px; background: var(--neon); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="homeScreen" class="screen active-screen">
        <div style="padding: 15px; border-bottom: 1px solid #222;"><h3>Gajan Home</h3></div>
        <div id="imageGrid"></div>
    </div>

    <div id="feedScreen" class="screen">
        <div id="videoFeed"></div>
    </div>

    <div id="inboxScreen" class="screen">
        <div style="padding: 20px;"><h3>Inbox & Gifts</h3></div>
        <div id="notifList" style="padding: 15px;">No gift notifications yet.</div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 40px 20px;">
            <div id="adminSecret" onclick="triggerAdmin()" class="user-circ" style="width:100px; height:100px; margin: 0 auto;">
                <img id="myPic" src="">
            </div>
            <h2 id="myName" style="margin-top:15px;">Loading...</h2>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:20px;">
                <div onclick="openBuyer()"><b id="myTokens">0</b><br><small style="color:var(--gold);">Buy Tokens</small></div>
            </div>
        </div>
        <div id="myPosts" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px;"></div>
    </div>

    <div id="adminPanel" style="display:none; position:fixed; inset:0; background:#080808; z-index:9999; padding:20px;">
        <h2 style="color:var(--gold);">Admin: MRGAJAN</h2>
        <div style="background:#111; padding:15px; border-radius:10px; margin-top:20px;">
            <p>Master Stock: <b id="adminStockDisplay">10M</b></p>
            <input type="text" id="targetUser" class="input-g" placeholder="User Email">
            <input type="number" id="tokenQty" class="input-g" placeholder="Tokens to Send">
            <button class="btn-action" onclick="transferTokens()" style="background:var(--gold); color:#000;">SEND TOKENS</button>
        </div>
        <div id="adminPostList" style="margin-top:20px;">
            <p>Manage All Posts:</p>
            </div>
        <button onclick="this.parentElement.style.display='none'" class="btn-action" style="margin-top:20px; background:#333;">CLOSE</button>
    </div>

    <div id="buyerModal" class="modal">
        <h3>Deposit Tokens</h3>
        <p>Send payment to any QR and send screenshot to Admin.</p>
        <div id="qrContainer" style="display:flex; overflow-x:auto; gap:10px; margin:15px 0;"></div>
        <button class="btn-action" onclick="this.parentElement.style.bottom='-100%'">Close</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('homeScreen', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showScreen('feedScreen', this)"><i class="fas fa-play-circle"></i>Feed</div>
        <div class="nav-item" onclick="openUpload()"><div class="plus-btn" style="background:#fff; color:#000; padding:5px 15px; border-radius:8px;">+</div></div>
        <div class="nav-item" onclick="showScreen('inboxScreen', this)"><i class="fas fa-comment-dots"></i>Inbox</div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user"></i>Me</div>
    </div>

    <script>
        // --- CONFIG & AUTH ---
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- NAVIGATION ---
        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            if(id==='feedScreen') loadVideos();
            if(id==='homeScreen') loadImages();
        }

        // --- ADMIN TRIGGER (CLICK 5 TIMES ON PIC) ---
        let taps = 0;
        function triggerAdmin() {
            taps++;
            if(taps >= 5) {
                let p = prompt("Enter Master Password:");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminPanel').style.display = 'block';
                    loadAdminData();
                }
                taps = 0;
            }
        }

        // --- 1. UPLOAD FIX (PERCENTAGE & DATA) ---
        async function openUpload() {
            let fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'video/*,image/*';
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                const isVideo = file.type.includes('video');
                const user = auth.currentUser;

                alert("Uploading starting... Please wait.");
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');

                const res = await fetch(`https://api.cloudinary.com/v1_1/dvfgzrxs7/${isVideo?'video':'image'}/upload`, {
                    method: 'POST', body: formData
                });
                const data = await res.json();

                await db.collection('posts').add({
                    url: data.secure_url,
                    type: isVideo ? 'video' : 'image',
                    uid: user.uid,
                    userName: user.displayName || "Gajan User",
                    userPic: user.photoURL || "https://via.placeholder.com/50",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0
                });
                alert("CONGRATULATIONS! Post is LIVE.");
                location.reload();
            };
            fileInput.click();
        }

        // --- 2. LOAD FEED & HOME ---
        async function loadVideos() {
            const feed = document.getElementById('videoFeed');
            const snap = await db.collection('posts').where('type', '==', 'video').orderBy('timestamp', 'desc').get();
            feed.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                feed.innerHTML += `
                    <div class="v-post">
                        <div class="watermark">GAJAN</div>
                        <video loop src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="user-circ"><img src="${d.userPic}"></div>
                            <div onclick="doLike('${doc.id}', this)"><i class="fas fa-heart"></i><b>${d.likes}</b></div>
                            <div onclick="openGift('${d.uid}')"><i class="fas fa-gift" style="color:var(--gold)"></i></div>
                        </div>
                    </div>`;
            });
        }

        async function loadImages() {
            const grid = document.getElementById('imageGrid');
            const snap = await db.collection('posts').where('type', '==', 'image').orderBy('timestamp', 'desc').get();
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `<div class="post-card"><img src="${d.url}"><p>@${d.userName}</p></div>`;
            });
        }

        // --- 3. LIKE SYSTEM (1 USER = 1 LIKE) ---
        async function doLike(id, btn) {
            const user = auth.currentUser;
            const ref = db.collection('posts').doc(id);
            const likeDoc = await ref.collection('likedBy').doc(user.uid).get();
            if(!likeDoc.exists) {
                await ref.collection('likedBy').doc(user.uid).set({liked:true});
                await ref.update({ likes: firebase.firestore.FieldValue.increment(1) });
                btn.style.color = 'var(--neon)';
            }
        }

        // --- 4. ADMIN TOKEN TRANSFER ---
        async function transferTokens() {
            const email = document.getElementById('targetUser').value;
            const qty = parseInt(document.getElementById('tokenQty').value);
            const userSnap = await db.collection('users').where('email', '==', email).get();
            if(userSnap.empty) return alert("User not found!");
            
            const userRef = db.collection('users').doc(userSnap.docs[0].id);
            await userRef.update({ tokens: firebase.firestore.FieldValue.increment(qty) });
            alert(`Sent ${qty} Tokens to ${email}`);
        }

        // --- AUTH SYNC ---
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).set({
                    email: user.email,
                    name: user.displayName,
                    tokens: firebase.firestore.FieldValue.increment(0)
                }, {merge:true});
                document.getElementById('myName').innerText = user.displayName;
                document.getElementById('myPic').src = user.photoURL;
                db.collection('users').doc(user.uid).onSnapshot(d => {
                    document.getElementById('myTokens').innerText = d.data().tokens || 0;
                });
            } else {
                auth.signInAnonymously();
            }
        });

        function openBuyer() { document.getElementById('buyerModal').style.bottom = '0'; }
    </script>
</body>
</html>
