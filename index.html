<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Supreme 2027 System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --cyan: #25f4ee; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- 2027 LIQUID LOGIN --- */
        #authScreen { position: fixed; inset: 0; background: radial-gradient(circle at top, #111, #000); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 380px; text-align: center; box-shadow: 0 0 50px rgba(37, 244, 238, 0.1); }
        .logo-2027 { font-size: 60px; font-weight: 900; background: linear-gradient(to right, var(--cyan), #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px var(--neon)); margin-bottom: 20px; }
        .btn-supreme { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 20px; background: #fff; color: #000; text-transform: uppercase; letter-spacing: 1px; }

        /* --- SCREENS --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* Feed Snap */
        #feedContainer { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar UI */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 100; }
        .p-gold-ring { width: 55px; height: 55px; border-radius: 50%; border: 2.5px solid var(--gold); padding: 2px; background: #000; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .p-gold-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- ADMIN MASTER --- */
        #adminPanel { position: fixed; inset: 0; background: #050505; z-index: 10000; display: none; padding: 25px; overflow-y: auto; }
        .admin-card { background: #111; padding: 20px; border-radius: 25px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background: #222; color: #fff; outline: none; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; z-index: 2000; border-top: 1px solid #222; }
        .nav-item { text-align: center; color: #666; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #fff; text-shadow: 0 0 10px #fff; }
        .nav-item i { font-size: 26px; margin-bottom: 4px; display: block; }
        .plus-supreme { width: 50px; height: 35px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        .plus-supreme::before { content:''; position:absolute; inset:0 -3px; background: linear-gradient(to right, var(--cyan), var(--neon)); border-radius: 10px; z-index: -1; }

        /* Profile Grid */
        .p-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; border: 0.1px solid #222; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="login-card">
            <div class="logo-2027">GAJAN</div>
            <p style="color: #666; font-size: 12px; letter-spacing: 2px;">NEXT-GEN VIRAL SYSTEM</p>
            <button class="btn-supreme" onclick="googleLogin()">Login with Google</button>
            <div style="margin: 20px 0; color: #222;">--- SECURE ---</div>
            <p style="font-size: 10px; color: #444;">Encrypted 256-bit Connection</p>
        </div>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedContainer"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 60px 20px;">
            <div onclick="adminTaps()" class="p-gold-ring" style="width:110px; height:110px; margin: 0 auto; position:relative;">
                <img id="myProfileImg" src="https://via.placeholder.com/100">
                <div onclick="updatePicDirect()" style="position:absolute; bottom:0; right:0; background:var(--neon); width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #000;">
                    <i class="fas fa-camera" style="font-size:12px;"></i>
                </div>
            </div>
            <h2 id="myUserName" style="margin-top:20px; font-size: 28px; font-weight: 900;">Gajan User</h2>
            <button onclick="changeNameDirect()" style="background:none; border:none; color:var(--cyan); font-size:12px; margin-top:5px;">Edit Username</button>
            
            <div style="display:flex; justify-content:center; gap:35px; margin-top:35px;">
                <div>🪙 <b id="myTkn">0</b><br><small style="color:var(--gold);">Tokens</small></div>
                <button onclick="document.getElementById('qrModal').style.bottom='0'; loadUserQRs();" style="background:var(--gold); border:none; padding:12px 30px; border-radius:15px; color:#000; font-weight:bold; box-shadow: 0 5px 15px rgba(255,215,0,0.2);">BUY TOKENS</button>
            </div>
        </div>
        <div id="myVideosGrid" class="p-grid"></div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--gold);">MASTER GAJAN CONTROL</h2>
            <i class="fas fa-times" onclick="document.getElementById('adminPanel').style.display='none'"></i>
        </div>
        <div class="admin-card">
            <h4>Transfer Tokens</h4>
            <input type="text" id="tEmail" placeholder="Target User Email">
            <input type="number" id="tAmt" placeholder="Amount">
            <button onclick="adminTransfer()" class="btn-supreme" style="background:var(--gold); margin-top:15px;">Send Tokens</button>
        </div>
        <div class="admin-card">
            <h4>Update QR Link</h4>
            <input type="text" id="qrLinkInput" placeholder="Paste Image URL">
            <button onclick="saveAdminQR()" class="btn-supreme" style="background:#fff; margin-top:10px;">Update System QR</button>
        </div>
        <div id="allPostsList"></div>
    </div>

    <div id="qrModal" style="position:fixed; bottom:-100%; width:100%; height:75%; background:#111; z-index:3000; transition:0.5s; padding:30px; border-radius:40px 40px 0 0; border-top: 1px solid var(--neon);">
        <h3 style="text-align:center;">Scan to Deposit</h3>
        <div id="qrDisplayArea" style="display:flex; gap:20px; overflow-x:auto; margin-top:30px; padding-bottom:10px;"></div>
        <button onclick="document.getElementById('qrModal').style.bottom='-100%'" class="btn-supreme" style="background:var(--neon); color:#fff;">Close</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('feedScreen', this)"><i class="fas fa-play"></i>Feed</div>
        <div class="nav-item" onclick="systemUpload()"><div class="plus-supreme"><i class="fas fa-plus"></i></div></div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user-ninja"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH & SYNC ---
        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(user.uid);
                const doc = await ref.get();
                if(!doc.exists) await ref.set({ name: user.displayName, email: user.email, photo: user.photoURL, tokens: 0, lastChange: 0 });
                
                ref.onSnapshot(snap => {
                    const d = snap.data();
                    document.getElementById('myUserName').innerText = d.name;
                    document.getElementById('myProfileImg').src = d.photo;
                    document.getElementById('myTkn').innerText = d.tokens || 0;
                });
                loadMainFeed();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // --- GALLERY UPLOAD (PROFILE PHOTO) ---
        async function updatePicDirect() {
            let i = document.createElement('input'); i.type='file'; i.accept='image/*';
            i.onchange = async (e) => {
                const file = e.target.files[0];
                alert("Updating Profile Photo...");
                const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", { method:'POST', body:formData });
                const d = await res.json();
                await db.collection('users').doc(auth.currentUser.uid).update({ photo: d.secure_url });
                alert("Photo Updated!");
            }; i.click();
        }

        // --- NAME CHANGE (9 DAYS LIMIT) ---
        async function changeNameDirect() {
            const u = auth.currentUser;
            const ref = db.collection('users').doc(u.uid);
            const data = (await ref.get()).data();
            const now = Date.now();
            if(now - (data.lastChange || 0) < 9 * 24 * 60 * 60 * 1000) return alert("Limit: 9 din baad badlein!");
            const n = prompt("New Username:");
            if(n) { await ref.update({ name: n, lastChange: now }); alert("Updated!"); }
        }

        // --- SYSTEM UPLOAD (VIDEOS) ---
        async function systemUpload() {
            let i = document.createElement('input'); i.type='file'; i.accept='video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0];
                alert("CONGRATULATIONS! System is uploading your viral video...");
                const formData = new FormData(); formData.append('file', f); formData.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method:'POST', body:formData });
                const d = await res.json();
                
                const u = auth.currentUser;
                const userDoc = await db.collection('users').doc(u.uid).get();
                await db.collection('posts').add({
                    url: d.secure_url, uid: u.uid, uName: userDoc.data().name, uPic: userDoc.data().photo,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                alert("Viral Success! Video is Live."); loadMainFeed();
            }; i.click();
        }

        async function loadMainFeed() {
            const container = document.getElementById('feedContainer');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="v-post">
                        <div style="position:absolute; top:20px; left:20px; font-weight:900; opacity:0.3; letter-spacing:2px;">GAJAN</div>
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="p-gold-ring"><img src="${d.uPic}"></div>
                            <i class="fas fa-heart" style="font-size:35px; color:#fff;" onclick="this.style.color='#fe2c55'"></i>
                            <b>${d.likes}</b>
                            <i class="fas fa-share" style="font-size:30px;" onclick="alert('Link Copied!')"></i>
                        </div>
                        <div style="position:absolute; bottom:95px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3 style="font-size:22px;">@${d.uName}</h3>
                        </div>
                    </div>`;
            });
            const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- PROFILE GRID (USER VIDEOS) ---
        async function loadUserVideos() {
            const grid = document.getElementById('myVideosGrid');
            const snap = await db.collection('posts').where('uid', '==', auth.currentUser.uid).get();
            grid.innerHTML = "";
            snap.forEach(doc => {
                grid.innerHTML += `<div class="grid-item"><video src="${doc.data().url}"></video></div>`;
            });
        }

        // --- ADMIN ---
        let taps = 0;
        function adminTaps() {
            taps++; if(taps >= 5) {
                let p = prompt("Master Key:");
                if(p === "Abdul6353738585@") { document.getElementById('adminPanel').style.display='block'; loadAdminManager(); }
                taps = 0;
            }
        }

        async function saveAdminQR() {
            const link = document.getElementById('qrLinkInput').value;
            const ref = db.collection('admin_config').doc('qrs');
            const doc = await ref.get();
            let urls = doc.exists ? doc.data().urls : [];
            if(urls.length < 2) urls.push(link); else urls = [urls[1], link];
            await ref.set({ urls: urls }); alert("System QR Updated!");
        }

        async function loadUserQRs() {
            const disp = document.getElementById('qrDisplayArea');
            const snap = await db.collection('admin_config').doc('qrs').get();
            disp.innerHTML = "";
            if(snap.exists) snap.data().urls.forEach(u => disp.innerHTML += `<img src="${u}" style="height:350px; border-radius:25px; border:2px solid #222;">`);
        }

        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'meScreen') loadUserVideos();
        }
    </script>
</body>
</html>
