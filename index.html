<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan App | The 2027 Supreme System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --cyan: #25f4ee; --glass: rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background:#000; color:#fff; overflow:hidden; }

        /* --- 1. THEME: 2027 LIQUID DESIGN --- */
        .screen { position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:1000; padding-bottom:80px; }
        .active-screen { display:flex; }

        /* --- 2. SUPREME LOGIN SCREEN --- */
        #authScreen { position:fixed; inset:0; background:radial-gradient(circle at top, #1a1a1a, #000); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .gajan-logo { font-size:65px; font-weight:900; background:linear-gradient(45deg, var(--cyan), #fff, var(--neon)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 15px var(--neon)); margin-bottom:20px; letter-spacing:5px; }
        .login-card { background:var(--glass); backdrop-filter:blur(25px); padding:40px; border-radius:40px; border:1px solid rgba(255,255,255,0.1); width:85%; max-width:380px; }
        .btn-main { width:100%; padding:18px; border-radius:50px; border:none; font-weight:900; cursor:pointer; background:#fff; color:#000; text-transform:uppercase; margin-top:20px; transition:0.3s; }

        /* --- 3. VIDEO FEED SCREEN --- */
        #feedScroll { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .v-post { position:relative; height:100vh; width:100vw; scroll-snap-align:start; background:#000; }
        video { width:100%; height:100%; object-fit:cover; }
        .sidebar { position:absolute; right:12px; bottom:120px; display:flex; flex-direction:column; gap:25px; align-items:center; }
        .p-gold-ring { width:55px; height:55px; border-radius:50%; border:2.5px solid var(--gold); padding:2px; background:#000; }
        .p-gold-ring img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        /* --- 4. PROFILE & WALLET SYSTEM --- */
        .profile-header { text-align:center; padding:50px 20px; }
        .p-avatar { width:110px; height:110px; border-radius:50%; border:3px solid var(--gold); margin:0 auto; position:relative; }
        .p-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
        .cam-btn { position:absolute; bottom:5px; right:5px; background:var(--neon); padding:8px; border-radius:50%; font-size:12px; border:2px solid #000; cursor:pointer; }
        .tkn-card { display:flex; justify-content:center; gap:30px; margin-top:30px; }
        .btn-buy { background:var(--gold); border:none; padding:12px 30px; border-radius:15px; font-weight:bold; color:#000; box-shadow:0 5px 15px rgba(255,215,0,0.2); }

        /* --- 5. ADMIN PANEL --- */
        #adminPanel { position:fixed; inset:0; background:#050505; z-index:10000; display:none; padding:25px; overflow-y:auto; border:2px solid var(--gold); }
        .admin-card { background:#111; padding:20px; border-radius:25px; border:1px solid #333; margin-bottom:20px; }
        input { width:100%; padding:15px; margin-top:10px; border-radius:12px; border:none; background:#222; color:#fff; outline:none; }

        /* --- 6. NAV BAR --- */
        .nav { position:fixed; bottom:0; width:100%; height:75px; background:rgba(0,0,0,0.9); border-top:1px solid #222; display:flex; justify-content:space-around; align-items:center; z-index:5000; }
        .nav-item { text-align:center; color:#555; font-size:11px; cursor:pointer; }
        .nav-item.active { color:#fff; }
        .nav-item i { font-size:26px; margin-bottom:4px; display:block; }
        .plus-supreme { width:50px; height:35px; background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; }
        .plus-supreme::before { content:''; position:absolute; inset:0 -3px; background:linear-gradient(to right, var(--cyan), var(--neon)); border-radius:10px; z-index:-1; }

        /* --- MODAL --- */
        .modal { position:fixed; bottom:-100%; width:100%; background:#111; z-index:6000; transition:0.5s; padding:25px; border-radius:35px 35px 0 0; border-top:1px solid var(--neon); }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="login-card">
            <div class="gajan-logo">GAJAN</div>
            <p style="color:#666; font-size:11px; letter-spacing:2px;">SUPREME VIRAL ENGINE</p>
            <button class="btn-main" onclick="login()">Start with Google</button>
        </div>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedScroll"></div>
    </div>

    <div id="meScreen" class="screen">
        <div class="profile-header">
            <div class="p-avatar" onclick="adminTrigger()">
                <img id="myImg" src="https://via.placeholder.com/100">
                <div class="cam-btn" onclick="updatePFP()"><i class="fas fa-camera"></i></div>
            </div>
            <h2 id="myNameDisplay" style="margin-top:20px; font-weight:900;">User Name</h2>
            <p id="myEmailDisplay" style="color:gray; font-size:12px;"></p>
            
            <div class="tkn-card">
                <div>🪙 <b id="bal">0</b><br><small>Tokens</small></div>
                <button class="btn-buy" onclick="openBuy()">BUY TOKENS</button>
                <button class="btn-buy" style="background:var(--cyan);" onclick="openSend()">SEND</button>
            </div>
        </div>
        <div id="myGrid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:1px;"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold);">MRGAJAN MASTER CONTROL</h2>
        <div class="admin-card">
            <p>Master Stock: <b>10,000,000</b></p>
            <input type="text" id="tE" placeholder="Target Email">
            <input type="number" id="tA" placeholder="Amount">
            <button onclick="distribute()" class="btn-main" style="background:var(--gold); margin-top:15px;">Send Tokens</button>
        </div>
        <div class="admin-card">
            <h4>Update QR from Gallery</h4>
            <input type="file" accept="image/*" onchange="upQR(this)">
            <div id="adminQRPreview" style="display:flex; gap:10px; margin-top:15px; overflow-x:auto;"></div>
        </div>
        <div class="admin-card" id="admPosts">
            <h4>Manage Posts (Delete Anytime)</h4>
        </div>
        <button onclick="this.parentElement.style.display='none'" class="btn-main" style="background:#333; color:#fff;">EXIT</button>
    </div>

    <div id="buyBox" class="modal">
        <h3 style="text-align:center;">Deposit System</h3>
        <div id="userQRList" style="display:flex; gap:15px; overflow-x:auto; margin-top:20px; height:350px;"></div>
        <button onclick="document.getElementById('buyBox').style.bottom='-100%'" class="btn-main" style="background:var(--neon); color:#fff;">Close</button>
    </div>

    <div id="sendBox" class="modal">
        <h3>Transfer Tokens</h3>
        <input type="email" id="fEmail" placeholder="Friend's Email">
        <input type="number" id="fAmt" placeholder="Amount">
        <button onclick="p2pTransfer()" class="btn-main" style="background:var(--cyan); color:#000;">Transfer Now</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showS('feedScreen', this)"><i class="fas fa-play"></i>Home</div>
        <div class="nav-item" onclick="upV()"><div class="plus-supreme"><i class="fas fa-plus"></i></div></div>
        <div class="nav-item" onclick="showS('meScreen', this)"><i class="fas fa-user-circle"></i>Me</div>
    </div>

    <script>
        // --- 13. TECH STACK (FIREBASE CONFIG) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH & SYNC ---
        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(async u => {
            if(u) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(u.uid);
                const doc = await ref.get();
                if(!doc.exists) await ref.set({ name: u.displayName, email: u.email, photo: u.photoURL, tokens: 0 });
                ref.onSnapshot(s => {
                    const d = s.data();
                    document.getElementById('myNameDisplay').innerText = d.name;
                    document.getElementById('myEmailDisplay').innerText = d.email;
                    document.getElementById('myImg').src = d.photo;
                    document.getElementById('bal').innerText = d.tokens || 0;
                });
                loadFeed();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // --- GALLERY UPLOADS ---
        async function updatePFP() {
            let i = document.createElement('input'); i.type='file'; i.accept='image/*';
            i.onchange = async (e) => {
                const f = e.target.files[0]; alert("Updating Profile Photo...");
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", {method:'POST', body:fd});
                const d = await res.json();
                await db.collection('users').doc(auth.currentUser.uid).update({ photo: d.secure_url });
                alert("Success!");
            }; i.click();
        }

        async function upQR(input) {
            const f = input.files[0];
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
            const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", {method:'POST', body:fd});
            const d = await res.json();
            const ref = db.collection('admin_config').doc('qrs');
            const doc = await ref.get();
            let urls = doc.exists ? doc.data().urls : [];
            urls.push(d.secure_url);
            await ref.set({ urls: urls }); alert("QR Uploaded!"); loadUserQRs();
        }

        async function loadUserQRs() {
            const disp = document.getElementById('userQRList');
            const s = await db.collection('admin_config').doc('qrs').get();
            disp.innerHTML = "";
            if(s.exists) s.data().urls.forEach(u => disp.innerHTML += `<img src="${u}" style="height:100%; border-radius:20px;">`);
        }

        // --- VIDEO SYSTEM ---
        async function upV() {
            let i = document.createElement('input'); i.type='file'; i.accept='video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0]; alert("CONGRATULATIONS! Upload started...");
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", {method:'POST', body:fd});
                const d = await res.json();
                const u = auth.currentUser;
                await db.collection('posts').add({
                    url: d.secure_url, uid: u.uid, uName: u.displayName, uPic: u.photoURL, uEmail: u.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                alert("Viral Live!"); loadFeed();
            }; i.click();
        }

        async function loadFeed() {
            const container = document.getElementById('feedScroll');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="v-post">
                        <div style="position:absolute; top:20px; left:20px; font-weight:900; opacity:0.3;">GAJAN</div>
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="p-gold-ring"><img src="${d.uPic}"></div>
                            <i class="fas fa-heart"></i><b>${d.likes}</b>
                            <i class="fas fa-share" onclick="alert('Gmail: ${d.uEmail}')"></i>
                        </div>
                        <div style="position:absolute; bottom:95px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3>@${d.uName}</h3>
                            <p style="font-size:11px; opacity:0.6;">${d.uEmail}</p>
                        </div>
                    </div>`;
            });
            const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- P2P SEND ---
        async function p2pTransfer() {
            const email = document.getElementById('fEmail').value;
            const amt = parseInt(document.getElementById('fAmt').value);
            const uRef = db.collection('users').doc(auth.currentUser.uid);
            const fSnap = await db.collection('users').where('email', '==', email).get();
            if(fSnap.empty) return alert("User not found!");
            await db.runTransaction(async t => {
                const uDoc = await t.get(uRef);
                if(uDoc.data().tokens < amt) throw "Low Balance";
                t.update(uRef, { tokens: firebase.firestore.FieldValue.increment(-amt) });
                t.update(db.collection('users').doc(fSnap.docs[0].id), { tokens: firebase.firestore.FieldValue.increment(amt) });
            });
            alert("Tokens Sent!"); document.getElementById('sendBox').style.bottom='-100%';
        }

        // --- ADMIN ---
        let taps = 0;
        function adminTrigger() {
            taps++; if(taps >= 5) {
                let p = prompt("Admin Key:");
                if(p === "Abdul6353738585@") { document.getElementById('adminPanel').style.display='block'; loadAdminStuff(); }
                taps = 0;
            }
        }

        async function loadAdminStuff() {
            const mgr = document.getElementById('admPosts');
            const s = await db.collection('posts').get();
            mgr.innerHTML = "<h4>Manage Viral Feed</h4>";
            s.forEach(doc => mgr.innerHTML += `<div style="display:flex; justify-content:space-between; background:#222; padding:10px; margin-top:5px; border-radius:10px;">
                <span>@${doc.data().uName}</span><button onclick="admDel('${doc.id}')" style="background:red; border:none; padding:5px; border-radius:5px; color:#fff;">Delete</button></div>`);
        }

        async function admDel(id) { if(confirm("Delete Video?")) { await db.collection('posts').doc(id).delete(); loadAdminStuff(); } }

        function showS(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }

        function openBuy() { document.getElementById('buyBox').style.bottom='0'; loadUserQRs(); }
        function openSend() { document.getElementById('sendBox').style.bottom='0'; }
    </script>
</body>
</html>
