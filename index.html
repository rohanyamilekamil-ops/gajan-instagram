<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; margin: 0; overflow: hidden; }
        
        /* Smooth Vertical Scroll Snapping */
        .video-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .video-card {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: linear-gradient(45deg, #1a1a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Gajan Neon Styles */
        .gajan-logo {
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(to right, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        /* Interaction Sidebar */
        .sidebar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-btn {
            font-size: 28px;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.8); }

        /* Smooth Bottom Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 0.5px solid #333;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-card">
            <h1 class="gajan-logo text-3xl font-bold">GAJAN TIKTOK</h1>
            <p class="absolute bottom-24 left-5 font-semibold">@creator_name <br> <span class="font-normal text-sm">Real TikTok Style #Viral #Gajan</span></p>
            
            <div class="sidebar">
                <div class="text-center"><i class="fa-solid fa-heart action-btn text-red-500"></i><p class="text-xs">1.2M</p></div>
                <div class="text-center"><i class="fa-solid fa-comment action-btn"></i><p class="text-xs">45k</p></div>
                <div class="text-center"><i class="fa-solid fa-share action-btn"></i><p class="text-xs">Share</p></div>
            </div>
        </div>

        <div class="video-card">
            <h1 class="text-xl text-gray-500">Video Content Goes Here</h1>
            <div class="sidebar">
                <div class="text-center"><i class="fa-solid fa-heart action-btn"></i><p class="text-xs">800k</p></div>
                <div class="text-center"><i class="fa-solid fa-comment action-btn"></i><p class="text-xs">12k</p></div>
                <div class="text-center"><i class="fa-solid fa-share action-btn"></i><p class="text-xs">Share</p></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <i class="fa-solid fa-house text-xl"></i>
        <i class="fa-solid fa-magnifying-glass text-xl"></i>
        <div class="bg-white text-black px-4 py-1 rounded-md font-bold text-2xl">+</div>
        <i class="fa-solid fa-message text-xl"></i>
        <i class="fa-solid fa-user text-xl"></i>
    </nav>

</body>
</html>
