<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok | Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        
        /* Initial Loading State taaki refresh na dikhe */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000;
        }

        #authScreen { height: 100vh; display: none; align-items: center; justify-content: center; text-align: center; }
        #mainApp { display: none; padding: 20px; }
        
        .gajan-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #ff2d55; width: 85%; max-width: 400px; }
        .btn-red { background: #ff2d55; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <h2 style="color: #ff2d55;">GAJAN...</h2>
    </div>

    <div id="authScreen">
        <div class="gajan-card">
            <h1 style="background: linear-gradient(to right, #00f2fe, #ff2d55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px;">GAJAN</h1>
            <p style="color: #888; margin-top: 10px;">Premium Short Videos</p>
            <button class="btn-red" onclick="googleSignIn()">Continue with Google</button>
        </div>
    </div>

    <div id="mainApp">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Welcome, <span id="userName">User</span></h3>
            <button onclick="auth.signOut()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:5px;">Logout</button>
        </div>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        
        <div id="feed" style="height: 70vh; display: flex; align-items: center; justify-content: center; background: #050505; border-radius: 20px;">
            <p style="color:#444;">No videos yet. Use + to upload.</p>
        </div>
    </div>

    <script>
        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAs-Aapki-Real-Key", // Yahan apni key paste karein
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "765432109876",
            appId: "1:765432109876:web:example"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // FIX: Auth State Observer
        // Yeh check karta hai ki user login hai ya nahi, bina page refresh kiye.
        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loadingOverlay');
            const authScreen = document.getElementById('authScreen');
            const mainApp = document.getElementById('mainApp');

            loading.style.display = 'none'; // Check khatam hone par loading hatao

            if (user) {
                // User login hai
                authScreen.style.display = 'none';
                mainApp.style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
            } else {
                // User logout hai
                authScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });

        // Google Login Function
        function googleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Persistence 'LOCAL' set karne se login sessions save rehte hain
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => {
                    return auth.signInWithPopup(provider);
                })
                .catch(error => alert("Login Error: " + error.message));
        }
    </script>
</body>
</html>
