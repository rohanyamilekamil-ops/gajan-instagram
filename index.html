<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan TikTok | V12 Final</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* Login Screen */
        #authScreen { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .login-btn { background: #fff; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }

        /* Screens */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* Video Feed (Fast Scroll) */
        #videoFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar & Watermark */
        .watermark { position: absolute; top: 20px; left: 20px; font-weight: bold; color: rgba(255,255,255,0.5); z-index: 100; text-shadow: 0 0 10px var(--neon); }
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 500; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); }

        /* Admin UI */
        #adminPanel { position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: none; padding: 20px; overflow-y: auto; }
        .admin-box { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }

        /* Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #777; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h1 style="color:var(--neon); font-size: 50px;">GAJAN</h1>
        <p>System Login Required</p>
        <button class="login-btn" onclick="googleLogin()">Login with Google</button>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="videoFeed"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 50px 20px;">
            <div onclick="checkAdminTaps()" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto; overflow: hidden;">
                <img id="myPhoto" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h2 id="myDisplayName" style="margin-top:10px;">User</h2>
            <p>🪙 Tokens: <b id="balance">0</b></p>
            <button onclick="openQRModal()" style="margin-top:20px; background:var(--gold); border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">BUY TOKENS</button>
        </div>
        <div id="myVideos" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px;"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold);">MRGAJAN MASTER</h2>
        <div class="admin-box">
            <h4>Token Distribution</h4>
            <input type="text" id="targetEmail" placeholder="User Email" style="width:100%; padding:10px; margin-top:10px; background:#222; border:none; color:#fff;">
            <input type="number" id="targetAmt" placeholder="Amount" style="width:100%; padding:10px; margin-top:10px; background:#222; border:none; color:#fff;">
            <button onclick="distributeTokens()" style="width:100%; margin-top:10px; padding:12px; background:var(--gold); border:none; font-weight:bold;">TRANSFER</button>
        </div>
        <div class="admin-box">
            <h4>QR Codes (Max 2)</h4>
            <input type="text" id="qrLink" placeholder="QR Image Link" style="width:100%; padding:10px; margin-top:10px; background:#222; border:none; color:#fff;">
            <button onclick="saveQR()" style="width:100%; margin-top:10px; padding:10px; background:#fff; border:none; font-weight:bold;">UPDATE QR</button>
        </div>
        <div class="admin-box" id="adminPostManager">
            <h4>Manage Posts</h4>
        </div>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:15px; background:#333; color:#fff; border:none; border-radius:8px;">CLOSE ADMIN</button>
    </div>

    <div id="qrModal" style="position:fixed; bottom:-100%; width:100%; background:#111; z-index:3000; transition:0.3s; padding:20px; border-radius:20px 20px 0 0;">
        <h3>Select QR to Pay</h3>
        <div id="qrDisplay" style="display:flex; gap:10px; margin-top:20px; overflow-x:auto;"></div>
        <button onclick="document.getElementById('qrModal').style.bottom='-100%'" style="width:100%; margin-top:20px; padding:15px; background:var(--neon); border:none; color:#fff; font-weight:bold;">Close</button>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="showScreen('feedScreen', this)"><i class="fas fa-play-circle"></i>Feed</div>
        <div class="nav-item" onclick="startUpload()"><i class="fas fa-plus-square" style="font-size:30px; color:#fff;"></i></div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH ---
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('myPhoto').src = user.photoURL;
                document.getElementById('myDisplayName').innerText = user.displayName;
                syncUser(user);
                loadFeed();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
            }
        });

        async function syncUser(u) {
            const ref = db.collection('users').doc(u.uid);
            await ref.set({ name: u.displayName, email: u.email, photo: u.photoURL }, {merge:true});
            ref.onSnapshot(d => document.getElementById('balance').innerText = d.data()?.tokens || 0);
        }

        // --- NAVIGATION ---
        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            if(id==='feedScreen') loadFeed();
        }

        // --- UPLOAD & FEED (FIXED) ---
        async function startUpload() {
            let input = document.createElement('input');
            input.type = 'file'; input.accept = 'video/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                alert("Uploading... Please wait for 100%");
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');

                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method:'POST', body:formData });
                const data = await res.json();

                await db.collection('posts').add({
                    url: data.secure_url,
                    uid: auth.currentUser.uid,
                    userName: auth.currentUser.displayName,
                    userPic: auth.currentUser.photoURL,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0
                });
                alert("CONGRATULATIONS! Video is LIVE.");
                loadFeed();
            };
            input.click();
        }

        async function loadFeed() {
            const container = document.getElementById('videoFeed');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="v-post">
                        <div class="watermark">GAJAN</div>
                        <video loop src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <img src="${d.userPic}" class="user-pic">
                            <i class="fas fa-heart" style="font-size:30px;" onclick="alert('Liked!')"></i>
                            <small>${d.likes}</small>
                        </div>
                    </div>`;
            });
            // Auto play logic
            const obs = new IntersectionObserver(ents => {
                ents.forEach(e => { if(e.isIntersecting) e.target.play(); else e.target.pause(); });
            }, {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- ADMIN CONTROLS ---
        let adminTaps = 0;
        function checkAdminTaps() {
            adminTaps++;
            if(adminTaps >= 5) {
                let p = prompt("Admin Password:");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminPanel').style.display = 'block';
                    loadAdminPosts();
                }
                adminTaps = 0;
            }
        }

        async function distributeTokens() {
            const email = document.getElementById('targetEmail').value;
            const amt = parseInt(document.getElementById('targetAmt').value);
            const userSnap = await db.collection('users').where('email', '==', email).get();
            if(userSnap.empty) return alert("User not found!");
            await db.collection('users').doc(userSnap.docs[0].id).update({ tokens: firebase.firestore.FieldValue.increment(amt) });
            alert("Sent!");
        }

        async function saveQR() {
            const link = document.getElementById('qrLink').value;
            const ref = db.collection('admin_config').doc('qrs');
            const doc = await ref.get();
            let urls = doc.exists ? doc.data().urls : [];
            if(urls.length < 2) urls.push(link); else urls = [urls[1], link];
            await ref.set({ urls: urls });
            alert("QR Updated!");
        }

        async function openQRModal() {
            document.getElementById('qrModal').style.bottom = '0';
            const display = document.getElementById('qrDisplay');
            const snap = await db.collection('admin_config').doc('qrs').get();
            display.innerHTML = "";
            if(snap.exists) {
                snap.data().urls.forEach(url => { display.innerHTML += `<img src="${url}" style="height:250px; border-radius:10px;">`; });
            }
        }

        async function loadAdminPosts() {
            const mgr = document.getElementById('adminPostManager');
            const snap = await db.collection('posts').get();
            mgr.innerHTML = "<h4>Manage Posts</h4>";
            snap.forEach(doc => {
                mgr.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#222; margin-top:5px;">
                    <span>@${doc.data().userName}</span>
                    <button onclick="deletePost('${doc.id}')" style="background:red; color:#fff; border:none; padding:5px;">Delete</button>
                </div>`;
            });
        }

        async function deletePost(id) { if(confirm("Delete?")) { await db.collection('posts').doc(id).delete(); loadAdminPosts(); } }
    </script>
</body>
</html>
