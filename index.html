<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | The Ultimate System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; --glass: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- 2027 SUPREME LOGIN --- */
        #authScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gajan-bg { position: absolute; font-size: 20vw; font-weight: 900; color: rgba(255,255,255,0.03); white-space: nowrap; z-index: -1; animation: slide 20s linear infinite; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .login-card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 400px; text-align: center; }
        .btn-g { background: #fff; color: #000; padding: 15px; border-radius: 50px; border: none; font-weight: bold; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }

        /* --- NAVIGATION --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #777; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; display: block; }
        .plus-btn { background: #fff; color: #000; padding: 4px 15px; border-radius: 8px; font-weight: bold; font-size: 22px; }

        /* --- SCREENS --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* Feed */
        #feedContainer { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; }

        /* --- ADMIN MASTER --- */
        #adminPanel { position: fixed; inset: 0; background: #080808; z-index: 10000; display: none; padding: 25px; border: 2px solid var(--gold); overflow-y: auto; }
        .admin-box { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #222; color: #fff; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="gajan-bg">GAJAN GAJAN GAJAN</div>
        <div class="login-card">
            <h1 style="color:var(--neon); font-size: 50px; letter-spacing: 5px;">GAJAN</h1>
            <p style="opacity:0.5; font-size: 12px;">Original TikTok Clone V2027</p>
            <button class="btn-g" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_logo_32.png" width="20">
                Start with Google
            </button>
        </div>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedContainer"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 50px 20px;">
            <div onclick="checkAdmin()" style="width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto; position: relative;">
                <img id="myPhoto" src="" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                <i class="fas fa-camera" onclick="upProfile()" style="position:absolute; bottom:5px; right:5px; background:var(--neon); padding:8px; border-radius:50%; font-size:12px; cursor:pointer;"></i>
            </div>
            <h2 id="myName" style="margin-top:15px;">User</h2>
            <p id="myEmail" style="color:gray; font-size:12px;"></p>
            <div style="display:flex; justify-content:center; gap:25px; margin-top:25px;">
                <div>🪙 <b id="myTkn">0</b><br><small>Tokens</small></div>
                <button onclick="document.getElementById('buyBox').style.bottom='0'; loadQRs();" style="background:var(--gold); color:#000; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">BUY TOKENS</button>
            </div>
        </div>
        <div id="myGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:1px;"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold);">MRGAJAN MASTER CONTROL</h2>
        <div class="admin-box">
            <h4>Transfer Tokens (Stock: 10M)</h4>
            <input type="text" id="targetE" placeholder="User Email">
            <input type="number" id="targetA" placeholder="Amount">
            <button onclick="distribute()" style="width:100%; margin-top:10px; padding:12px; background:var(--gold); border:none; font-weight:bold;">SEND TOKENS</button>
        </div>
        <div class="admin-box" id="adminPosts">
            <h4>Manage Viral Feed (Delete)</h4>
        </div>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:15px; background:#333; color:#fff; border:none; border-radius:10px;">EXIT</button>
    </div>

    <div id="buyBox" style="position:fixed; bottom:-100%; width:100%; height:75%; background:#111; z-index:3000; transition:0.5s; padding:25px; border-radius:40px 40px 0 0;">
        <h3>Deposit System</h3>
        <div id="qrList" style="display:flex; gap:15px; overflow-x:auto; margin-top:20px; height:350px;"></div>
        <button onclick="document.getElementById('buyBox').style.bottom='-100%'" style="width:100%; margin-top:20px; padding:15px; background:var(--neon); border:none; font-weight:bold; border-radius:10px;">CLOSE</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('feedScreen', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="alert('Discover coming soon')"><i class="fas fa-search"></i>Discover</div>
        <div class="nav-item" onclick="upVideo()"><div class="plus-btn">+</div></div>
        <div class="nav-item"><i class="fas fa-comment-dots"></i>Inbox</div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH ---
        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(user.uid);
                const doc = await ref.get();
                if(!doc.exists) await ref.set({ name: user.displayName, email: user.email, photo: user.photoURL, tokens: 0 });
                ref.onSnapshot(s => {
                    const d = s.data();
                    document.getElementById('myName').innerText = d.name;
                    document.getElementById('myEmail').innerText = d.email;
                    document.getElementById('myPhoto').src = d.photo;
                    document.getElementById('myTkn').innerText = d.tokens || 0;
                });
                loadFeed();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // --- FEED & UPLOAD ---
        async function upVideo() {
            let i = document.createElement('input'); i.type='file'; i.accept='video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0];
                alert("CONGRATULATIONS! Video is uploading to Gajan System...");
                const formData = new FormData(); formData.append('file', f); formData.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method:'POST', body:formData });
                const d = await res.json();
                const u = auth.currentUser;
                await db.collection('posts').add({
                    url: d.secure_url, uid: u.uid, uName: u.displayName, uPic: u.photoURL, uEmail: u.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                alert("Live!"); loadFeed();
            }; i.click();
        }

        async function loadFeed() {
            const container = document.getElementById('feedContainer');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="v-post">
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="user-pic"><img src="${d.uPic}"></div>
                            <i class="fas fa-heart"></i><b>${d.likes}</b>
                            <i class="fas fa-share" onclick="alert('Gmail: ${d.uEmail}')"></i>
                        </div>
                        <div style="position:absolute; bottom:95px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3>@${d.uName}</h3>
                            <p style="font-size:10px; opacity:0.6;">${d.uEmail}</p>
                        </div>
                    </div>`;
            });
            const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- ADMIN ---
        let taps = 0;
        function checkAdmin() {
            taps++; if(taps >= 5) {
                let p = prompt("Master Key:");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminPanel').style.display='block';
                    loadAdminPosts();
                }
                taps = 0;
            }
        }

        async function loadAdminPosts() {
            const list = document.getElementById('adminPosts');
            const snap = await db.collection('posts').get();
            list.innerHTML = "<h4>Manage Viral Feed</h4>";
            snap.forEach(doc => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#222; margin-top:5px; border-radius:10px;">
                    <span>@${doc.data().uName}</span>
                    <button onclick="adminDelete('${doc.id}')" style="background:red; border:none; color:#fff; padding:5px 10px; border-radius:5px;">Delete</button>
                </div>`;
            });
        }

        async function adminDelete(id) { if(confirm("Delete Video?")) { await db.collection('posts').doc(id).delete(); loadAdminPosts(); } }

        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
