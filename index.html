<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .gajan-logo-font { font-family: 'Grand Hotel', cursive; }
        .attractive-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-attachment: fixed; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; }
        .active-tab { border-bottom: 2px solid #000; color: #000 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body class="attractive-bg text-white h-screen overflow-hidden">

    <div id="auth-section" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6 hidden">
        <h1 class="gajan-logo-font text-8xl mb-6">Gajan</h1>
        <div id="login-card" class="glass-card w-full max-w-sm p-8 space-y-6">
            <h2 class="text-xl font-semibold text-center text-white">Welcome Back</h2>
            <input id="login-email" type="email" placeholder="Email address" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none text-white">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none text-white">
            <button onclick="handleLogin()" class="w-full py-3 bg-white text-indigo-600 font-bold rounded-xl shadow-lg">Log In</button>
            <p class="text-center text-sm text-white/80">Don't have an account? <button onclick="toggleAuth()" class="font-bold underline text-white">Sign Up</button></p>
        </div>
        <div id="signup-card" class="glass-card w-full max-w-sm p-8 space-y-4 hidden">
            <h2 class="text-xl font-semibold text-center text-white">Create Account</h2>
            <input id="reg-name" type="text" placeholder="Full Name" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none text-white">
            <input id="reg-email" type="email" placeholder="Email address" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none text-white">
            <input id="reg-password" type="password" placeholder="Create Password" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none text-white">
            <button onclick="handleSignup()" class="w-full py-3 bg-indigo-500 text-white font-bold rounded-xl shadow-lg">Create Account</button>
            <p class="text-center text-sm text-white/80">Already have an account? <button onclick="toggleAuth()" class="font-bold underline text-white">Log In</button></p>
        </div>
    </div>

    <div id="main-app" class="hidden h-screen bg-white text-black overflow-y-auto no-scrollbar">
        
        <header class="flex justify-between items-center px-4 py-2 bg-white border-b sticky top-0 z-50">
            <h1 class="text-3xl gajan-logo-font">Gajan</h1>
            <div class="flex space-x-5 items-center">
                <i class="fa-regular fa-square-plus text-2xl"></i>
                <a href="messenger.html"><i class="fa-brands fa-facebook-messenger text-2xl"></i></a>
                <button onclick="logout()" class="text-red-500 text-xs font-bold border border-red-200 px-2 py-1 rounded">Logout</button>
            </div>
        </header>

        <div class="p-4">
            <div class="flex items-center space-x-8 mb-6 px-2">
                <div class="w-20 h-20 rounded-full border-2 border-pink-500 p-1">
                    <img id="user-avatar" src="https://via.placeholder.com/150" class="rounded-full w-full h-full object-cover">
                </div>
                <div class="flex-1 flex justify-around text-center">
                    <div><p class="font-bold">11</p><p class="text-[10px] text-gray-500 uppercase">Posts</p></div>
                    <div><p class="font-bold">191</p><p class="text-[10px] text-gray-500 uppercase">Followers</p></div>
                    <div><p class="font-bold">120</p><p class="text-[10px] text-gray-500 uppercase">Following</p></div>
                </div>
            </div>
            <div class="px-2 mb-4">
                <p id="display-name" class="font-bold text-sm">Gajan User</p>
                <p class="text-sm text-gray-600">Standard Core Gajan Edition ❤️</p>
            </div>
            <div class="flex space-x-2">
                <button class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-xs">Edit profile</button>
                <button class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-xs text-pink-600"><i class="fa-solid fa-wallet mr-1"></i>Wallet</button>
            </div>
        </div>

        <div class="flex border-t">
            <button class="flex-1 py-3 text-xl active-tab"><i class="fa-solid fa-table-cells"></i></button>
            <a href="reels.html" class="flex-1 py-3 text-xl text-gray-400 text-center"><i class="fa-solid fa-clapperboard"></i></a>
            <button class="flex-1 py-3 text-xl text-gray-400"><i class="fa-solid fa-user-tag"></i></button>
        </div>

        <div class="grid grid-cols-3 gap-0.5 pb-20">
            <div class="aspect-square bg-gray-100"><img src="https://picsum.photos/300/300?random=21" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-100"><img src="https://picsum.photos/300/300?random=22" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-100"><img src="https://picsum.photos/300/300?random=23" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-100"><img src="https://picsum.photos/300/300?random=24" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-100"><img src="https://picsum.photos/300/300?random=25" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-100"><img src="https://picsum.photos/300/300?random=26" class="w-full h-full object-cover"></div>
        </div>

        <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-3 z-[60]">
            <a href="index.html"><i class="fa-solid fa-house text-2xl"></i></a>
            <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
            <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-400"></i></a>
            <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
            <div class="w-7 h-7 bg-indigo-500 rounded-full border border-black flex items-center justify-center text-[10px] text-white">G</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.toggleAuth = () => {
            document.getElementById('login-card').classList.toggle('hidden');
            document.getElementById('signup-card').classList.toggle('hidden');
        };

        window.handleSignup = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                location.reload();
            } catch (err) { alert(err.message); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (err) { alert("Login failed!"); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-name').innerText = user.displayName || "Gajan User";
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
