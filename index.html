<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiktok Gajan Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Login Screen */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .g-btn { background: #fff; color: #000; padding: 15px 35px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; margin-top: 25px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

        /* Video Feed */
        .app-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; background: #000; }
        .app-feed::-webkit-scrollbar { display: none; }
        .post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI Overlays */
        .sidebar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .sidebar-item { text-align: center; font-size: 12px; }
        .sidebar-item i { font-size: 30px; margin-bottom: 2px; }
        
        .info { position: absolute; bottom: 80px; left: 15px; width: 70%; text-shadow: 1px 1px 5px #000; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-icon { text-align: center; font-size: 10px; color: #fff; cursor: pointer; }
        .nav-icon i { font-size: 22px; margin-bottom: 2px; }
        .add-btn { background: linear-gradient(to right, #69C9D0, #EE1D52); padding: 5px 18px; border-radius: 10px; color: #fff; font-size: 22px; font-weight: bold; }

        /* Profile Screen */
        #profileScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; display: none; flex-direction: column; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h1 style="color: #fe2c55; font-size: 45px; margin: 0;">Gajan</h1>
        <p style="opacity: 0.7;">Tiktok Gajan Official App</p>
        <button class="g-btn" onclick="signIn()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            Login with Google
        </button>
        <p id="authStatus" style="margin-top: 20px; font-size: 12px; color: #69C9D0;"></p>
    </div>

    <div class="app-feed" id="mainFeed"></div>

    <div id="profileScreen">
        <div style="padding: 25px; display: flex; flex-direction: column; align-items: center; border-bottom: 0.5px solid #222;">
            <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px;">
                <i class="fas fa-arrow-left" onclick="toggleP()"></i>
                <b id="headName">Profile</b>
                <i class="fas fa-sign-out-alt" onclick="signOutUser()"></i>
            </div>
            <img id="uPic" style="width: 85px; height: 85px; border-radius: 50%; border: 2px solid #fe2c55; object-fit: cover;">
            <h3 id="uName" style="margin: 15px 0 5px 0;">Name</h3>
            <p style="color: gray; margin: 0;">0 Followers • 0 Following</p>
        </div>
        <div class="grid" id="uGrid"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-icon" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-icon"><i class="fas fa-search"></i><br>Discover</div>
        <div class="add-btn" onclick="alert('Upload system loading...')">+</div>
        <div class="nav-icon"><i class="fas fa-envelope"></i><br>Inbox</div>
        <div class="nav-icon" onclick="toggleP()"><i class="fas fa-user"></i><br>Profile</div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- LOGIN LOGIC (REDIRECT METHOD) ---
        function signIn() {
            document.getElementById('authStatus').innerText = "Connecting to Google...";
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        function signOutUser() { auth.signOut().then(() => location.reload()); }

        // Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('uName').innerText = user.displayName;
                document.getElementById('uPic').src = user.photoURL;
                loadVideos();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
            }
        });

        // --- LOAD VIDEOS ---
        async function loadVideos() {
            const feed = document.getElementById('mainFeed');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').limit(20).get();
            feed.innerHTML = "";
            
            if(snap.empty) {
                feed.innerHTML = "<div style='padding-top:100px; text-align:center;'>No videos yet. Post something!</div>";
                return;
            }

            snap.forEach(doc => {
                const d = doc.data();
                feed.innerHTML += `
                <div class="post">
                    <video loop playsinline src="${d.videoUrl}" onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="sidebar">
                        <div class="sidebar-item"><i class="fas fa-heart"></i><br>${d.likes || 0}</div>
                        <div class="sidebar-item"><i class="fas fa-comment-dots"></i><br>0</div>
                        <div class="sidebar-item"><i class="fas fa-share"></i><br>Share</div>
                    </div>
                    <div class="info">
                        <h3>@${d.userName || 'user'}</h3>
                        <p>${d.caption || 'Tiktok Gajan Vibes'}</p>
                    </div>
                </div>`;
            });

            // Intersection Observer
            const obs = new IntersectionObserver(ents => {
                ents.forEach(e => { if(e.isIntersecting) e.target.play(); else e.target.pause(); });
            }, {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- PROFILE LOGIC ---
        function toggleP() {
            const s = document.getElementById('profileScreen');
            if(s.style.display === 'flex') {
                s.style.display = 'none';
            } else {
                s.style.display = 'flex';
                loadMyGrid();
            }
        }

        async function loadMyGrid() {
            const g = document.getElementById('uGrid');
            const user = auth.currentUser;
            if(!user) return;
            
            const snap = await db.collection('posts').where('userEmail', '==', user.email).get();
            g.innerHTML = "";
            if(snap.empty) {
                g.innerHTML = "<p style='grid-column: span 3; text-align:center; padding:50px; color:gray;'>No videos posted.</p>";
            }
            snap.forEach(doc => {
                g.innerHTML += `<div class="grid-item"><video src="${doc.data().videoUrl}"></video></div>`;
            });
        }
    </script>
</body>
</html>
