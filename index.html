<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Supreme 2027</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --cyan: #25f4ee; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- LOGIN --- */
        #authScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); width: 85%; text-align: center; }
        .logo { font-size: 60px; font-weight: 900; background: linear-gradient(to right, var(--cyan), #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- SCREENS --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* Video Feed */
        #feedContainer { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .p-ring { width: 55px; height: 55px; border-radius: 50%; border: 2.5px solid var(--gold); padding: 2px; }
        .p-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- ADMIN MASTER --- */
        #adminPanel { position: fixed; inset: 0; background: #050505; z-index: 10000; display: none; padding: 25px; overflow-y: auto; border: 1px solid var(--gold); }
        .admin-card { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background: #222; color: #fff; }
        
        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #555; font-size: 11px; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 26px; margin-bottom: 4px; display: block; }
        .plus-btn { background: #fff; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: bold; }

        /* Modal */
        .modal { position: fixed; bottom: -100%; width: 100%; background: #111; border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.5s; padding: 25px; border-top: 2px solid var(--neon); }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="login-card">
            <div class="logo">GAJAN</div>
            <button onclick="googleLogin()" style="width:100%; padding:15px; border-radius:50px; border:none; background:#fff; font-weight:bold; margin-top:30px;">Login with Google</button>
        </div>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedContainer"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 50px 20px;">
            <div onclick="adminTaps()" class="p-ring" style="width:110px; height:110px; margin: 0 auto; position:relative;">
                <img id="uP" src="https://via.placeholder.com/100">
                <i class="fas fa-camera" onclick="upP()" style="position:absolute; bottom:5px; right:5px; background:var(--neon); padding:8px; border-radius:50%; font-size:12px;"></i>
            </div>
            <h2 id="uN" style="margin-top:15px;">User</h2>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:30px;">
                <div>🪙 <b id="uT">0</b><br><small>Tokens</small></div>
                <button onclick="document.getElementById('buyBox').style.bottom='0'" style="background:var(--gold); border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">BUY TOKENS</button>
                <button onclick="document.getElementById('sendBox').style.bottom='0'" style="background:var(--cyan); border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">SEND</button>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold);">MASTER CONTROL</h2>
        <div class="admin-card">
            <p>Master Stock: <b id="stock">10,000,000</b></p>
            <input type="text" id="targetE" placeholder="User Email">
            <input type="number" id="targetA" placeholder="Amount">
            <button onclick="transfer()" style="width:100%; padding:15px; background:var(--gold); border:none; margin-top:10px; border-radius:10px; font-weight:bold;">TRANSFER NOW</button>
        </div>
        <div class="admin-card">
            <h4>Gallery QR Upload</h4>
            <input type="file" id="qrF" accept="image/*" onchange="upQR(this)">
            <div id="qrP" style="margin-top:10px; display:flex; gap:10px; overflow-x:auto;"></div>
        </div>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:15px; background:#333; border:none; color:#fff; border-radius:10px;">EXIT ADMIN</button>
    </div>

    <div id="buyBox" class="modal">
        <h3>Scan & Deposit</h3>
        <div id="userQR" style="display:flex; gap:15px; overflow-x:auto; margin-top:20px; height:300px;"></div>
        <button onclick="document.getElementById('buyBox').style.bottom='-100%'" style="width:100%; padding:15px; margin-top:20px; background:var(--neon); border:none; color:#fff; font-weight:bold; border-radius:10px;">Close</button>
    </div>

    <div id="sendBox" class="modal">
        <h3>Send Tokens to Friend</h3>
        <input type="email" id="fEmail" placeholder="Friend's Email">
        <input type="number" id="fAmt" placeholder="Amount">
        <button onclick="sendToFriend()" style="width:100%; padding:15px; margin-top:20px; background:var(--cyan); border:none; font-weight:bold; border-radius:10px;">SEND NOW</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showS('feedScreen', this)"><i class="fas fa-play"></i>Feed</div>
        <div class="nav-item" onclick="upV()"><div class="plus-btn">+</div></div>
        <div class="nav-item" onclick="showS('meScreen', this)"><i class="fas fa-user-circle"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH & USER ---
        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(user.uid);
                const doc = await ref.get();
                if(!doc.exists) await ref.set({ name: user.displayName, email: user.email, photo: user.photoURL, tokens: 0 });
                ref.onSnapshot(s => {
                    const d = s.data();
                    document.getElementById('uN').innerText = d.name;
                    document.getElementById('uP').src = d.photo;
                    document.getElementById('uT').innerText = d.tokens || 0;
                });
                loadFeed();
                loadUserQRs();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // --- GALLERY QR UPLOAD (ADMIN) ---
        async function upQR(input) {
            const f = input.files[0];
            const formData = new FormData(); formData.append('file', f); formData.append('upload_preset', 'ml_default');
            const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", { method:'POST', body:formData });
            const d = await res.json();
            
            const ref = db.collection('admin_config').doc('qrs');
            const doc = await ref.get();
            let urls = doc.exists ? doc.data().urls : [];
            urls.push(d.secure_url);
            await ref.set({ urls: urls });
            alert("QR Uploaded from Gallery!");
            loadUserQRs();
        }

        async function loadUserQRs() {
            const disp = document.getElementById('userQR');
            const snap = await db.collection('admin_config').doc('qrs').get();
            disp.innerHTML = "";
            if(snap.exists) snap.data().urls.forEach(u => disp.innerHTML += `<img src="${u}" style="height:100%; border-radius:20px;">`);
        }

        // --- P2P SEND TO FRIEND ---
        async function sendToFriend() {
            const email = document.getElementById('fEmail').value;
            const amt = parseInt(document.getElementById('fAmt').value);
            const user = auth.currentUser;

            const uRef = db.collection('users').doc(user.uid);
            const uDoc = await uRef.get();
            if(uDoc.data().tokens < amt) return alert("Low Tokens!");

            const fSnap = await db.collection('users').where('email', '==', email).get();
            if(fSnap.empty) return alert("User not found!");

            await db.runTransaction(async t => {
                t.update(uRef, { tokens: firebase.firestore.FieldValue.increment(-amt) });
                t.update(db.collection('users').doc(fSnap.docs[0].id), { tokens: firebase.firestore.FieldValue.increment(amt) });
            });
            alert("Tokens Sent Successfully!");
            document.getElementById('sendBox').style.bottom='-100%';
        }

        // --- UPLOAD & FEED ---
        async function upV() {
            let i = document.createElement('input'); i.type='file'; i.accept='video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0];
                alert("CONGRATULATIONS! Uploading...");
                const formData = new FormData(); formData.append('file', f); formData.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method:'POST', body:formData });
                const d = await res.json();
                
                await db.collection('posts').add({
                    url: d.secure_url, uid: auth.currentUser.uid, uName: auth.currentUser.displayName, uPic: auth.currentUser.photoURL,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                alert("Live!"); loadFeed();
            }; i.click();
        }

        async function loadFeed() {
            const container = document.getElementById('feedContainer');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="v-post">
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar"><div class="p-ring"><img src="${d.uPic}"></div><i class="fas fa-heart"></i><b>${d.likes}</b></div>
                        <div style="position:absolute; bottom:95px; left:15px;"><h3>@${d.uName}</h3></div>
                    </div>`;
            });
        }

        // --- ADMIN ---
        let taps = 0;
        function adminTaps() {
            taps++; if(taps >= 5) {
                let p = prompt("Admin Key:");
                if(p === "Abdul6353738585@") document.getElementById('adminPanel').style.display='block';
                taps = 0;
            }
        }

        function showS(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
