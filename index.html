<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok | Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #authScreen { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #ff2d55; text-align: center; }
        .btn-google { background: #ff2d55; color: #fff; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #mainApp { display: none; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="loader"><h2>LOADING...</h2></div>

    <div id="authScreen">
        <div class="login-card">
            <h1 style="color:#ff2d55">GAJAN</h1>
            <button class="btn-google" onclick="login()">Continue with Google</button>
        </div>
    </div>

    <div id="mainApp">
        <h1>Welcome to Gajan TikTok</h1>
        <p id="userEmail"></p>
        <button onclick="firebase.auth().signOut()" style="background:#333; color:#fff; border:none; padding:10px; border-radius:5px;">Logout</button>
    </div>

    <script>
        // Aapki Real Config
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB50TL4_KyiU1XF6e2PZ0mE4",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7cc447600efbaf"
        };

        firebase.initializeApp(firebaseConfig);

        // REFRESH FIX: Yeh check karega user login hai ya nahi
        firebase.auth().onAuthStateChanged((user) => {
            document.getElementById('loader').style.display = 'none';
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userEmail').innerText = "Logged in as: " + user.email;
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        // POPUP LOGIN: Isse loop nahi banega
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(err => {
                alert("Error: " + err.message);
            });
        }
    </script>
</body>
</html>
