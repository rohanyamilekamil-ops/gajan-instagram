<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .gajan-logo { font-family: 'Grand Hotel', cursive; font-size: 5.5rem; color: white; margin-bottom: 1.5rem; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="w-full max-w-sm p-8 text-center">
        <h1 class="gajan-logo">Gajan</h1>
        <div class="bg-white/10 backdrop-blur-md p-8 rounded-[30px] border border-white/20 space-y-5">
            <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-white/20 rounded-2xl outline-none text-white placeholder-white/70">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-white/20 rounded-2xl outline-none text-white placeholder-white/70">
            <button onclick="login()" class="w-full py-4 bg-white text-pink-600 font-bold rounded-2xl shadow-xl active:scale-95 transition">Log In</button>
            <p class="text-white text-sm">Account nahi hai? <a href="signup.html" class="font-bold underline">Sign Up</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Login Function
        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Details bhariye!");

            signInWithEmailAndPassword(auth, email, pass)
                .then(() => { window.location.href = "profile.html"; })
                .catch(err => { alert("Login Error: " + err.message); });
        };

        // If already logged in, go to profile
        onAuthStateChanged(auth, user => {
            if(user) { window.location.href = "profile.html"; }
        });
    </script>
</body>
</html>
