<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiktok Gajan Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Login Screen */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .g-btn { background: #fff; color: #000; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; margin-top: 20px; }

        /* Main Feed */
        .app-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .app-feed::-webkit-scrollbar { display: none; }
        .post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; align-items: center; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-icon { text-align: center; font-size: 10px; color: #888; cursor: pointer; }
        .nav-icon i { font-size: 22px; color: #fff; margin-bottom: 2px; }
        .add-btn { background: linear-gradient(to right, #69C9D0, #EE1D52); padding: 5px 18px; border-radius: 10px; color: #fff; font-size: 20px; font-weight: bold; }

        /* Profile Panel */
        #profileScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; display: none; flex-direction: column; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #222; overflow: hidden; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h1 style="color: #fe2c55; font-size: 40px;">Gajan</h1>
        <p>Login karke start karein</p>
        <button class="g-btn" onclick="signIn()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            Google Login
        </button>
    </div>

    <div class="app-feed" id="mainFeed"></div>

    <div id="profileScreen">
        <div style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <img id="uPic" style="width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fe2c55;">
            <div>
                <h2 id="uName" style="margin: 0;">User Name</h2>
                <button onclick="signOutUser()" style="background: none; border: 1px solid #444; color: #fff; padding: 5px 10px; margin-top: 5px; border-radius: 4px;">Logout</button>
            </div>
            <button onclick="toggleP()" style="margin-left: auto; background: none; border: none; color: #fff; font-size: 20px;">×</button>
        </div>
        <div class="grid" id="uGrid"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-icon" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="add-btn" onclick="alert('Upload functionality integrated!')">+</div>
        <div class="nav-icon" onclick="toggleP()"><i class="fas fa-user"></i><br>Profile</div>
    </div>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 1. Google Auth
        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        function signOutUser() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('uName').innerText = user.displayName;
                document.getElementById('uPic').src = user.photoURL;
                loadVideos();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
            }
        });

        // 2. Load Feed
        async function loadVideos() {
            const feed = document.getElementById('mainFeed');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            feed.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                feed.innerHTML += `
                <div class="post">
                    <video loop src="${d.videoUrl}" onclick="this.paused ? this.play() : this.pause()"></video>
                    <div style="position:absolute; bottom:80px; left:15px;">
                        <h3>@${d.userName || 'user'}</h3>
                        <p>${d.caption || ''}</p>
                    </div>
                </div>`;
            });
            // Auto play logic
            const obs = new IntersectionObserver(ents => {
                ents.forEach(e => { if(e.isIntersecting) e.target.play(); else e.target.pause(); });
            }, {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // 3. Profile Toggle
        function toggleP() {
            const s = document.getElementById('profileScreen');
            s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
            if(s.style.display === 'flex') loadMyGrid();
        }

        async function loadMyGrid() {
            const g = document.getElementById('uGrid');
            const user = auth.currentUser;
            const snap = await db.collection('posts').where('userEmail', '==', user.email).get();
            g.innerHTML = "";
            snap.forEach(doc => {
                g.innerHTML += `<div class="grid-item"><video src="${doc.data().videoUrl}"></video></div>`;
            });
        }
    </script>
</body>
</html>
