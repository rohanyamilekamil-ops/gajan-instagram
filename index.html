<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white p-4 shadow-sm sticky top-0 flex justify-between">
        <b class="text-xl">MySocial</b>
        <button id="upload_btn" class="bg-blue-600 text-white px-4 py-1 rounded">Post</button>
    </nav>

    <div id="feed" class="max-w-md mx-auto p-4 space-y-4">
        </div>

    <script>
        // --- CONFIGURATION ---
        const CLOUD_NAME = "YOUR_CLOUD_NAME"; // Apna Cloudinary name yahan likhein
        const UPLOAD_PRESET = "YOUR_PRESET";   // Apna Upload Preset yahan likhein

        // Cloudinary Widget Setup
        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET
        }, (error, result) => {
            if (!error && result && result.event === "success") { 
                alert("Photo Uploaded! Link: " + result.info.secure_url);
                // Yahan hum future mein GitHub API connect karenge
            }
        });

        document.getElementById("upload_btn").onclick = () => myWidget.open();
    </script>
</body>
</html>
