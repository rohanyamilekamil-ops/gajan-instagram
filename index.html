<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Supreme 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- LATEST 2026 LOGIN DESIGN --- */
        #authScreen { position: fixed; inset: 0; background: radial-gradient(circle at top, #1a1a1a, #000); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 380px; text-align: center; }
        .logo-text { font-size: 55px; font-weight: 900; background: linear-gradient(45deg, #25f4ee, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        .btn-neon { background: var(--neon); color: #fff; padding: 15px; border-radius: 50px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; box-shadow: 0 0 20px var(--neon); }

        /* --- NAVIGATION --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 26px; margin-bottom: 4px; display: block; }
        .plus-btn { background: #fff; color: #000; padding: 5px 18px; border-radius: 10px; font-weight: bold; font-size: 22px; }

        /* --- FEED --- */
        #feedScroll { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .p-ring { width: 55px; height: 55px; border-radius: 50%; border: 2.5px solid var(--gold); padding: 2px; }
        .p-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- PROFILE --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 100px; }
        .active-screen { display: flex; }
        #qrDisplay img { width: 100%; max-width: 250px; border-radius: 20px; border: 3px solid #333; margin: 10px auto; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="login-card">
            <div class="logo-text">GAJAN</div>
            <p style="opacity:0.6; font-size: 12px;">SYSTEM V16 SUPREME</p>
            <input type="email" id="email" placeholder="Enter Email">
            <input type="password" id="pass" placeholder="Enter Password">
            <button class="btn-neon" onclick="handleAuth()">LOGIN / REGISTER</button>
        </div>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedScroll"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 60px 20px;">
            <div onclick="adminCheckTaps()" class="p-ring" style="width:110px; height:110px; margin: 0 auto; cursor:pointer;">
                <img id="myPic" src="https://via.placeholder.com/100">
            </div>
            <h2 id="myName" style="margin-top:15px; font-size: 26px;">Gajan User</h2>
            
            <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
                <button onclick="editProfile()" style="background:#222; border:none; padding:8px 15px; border-radius:8px; font-size:12px; color:#fff;">Update Name & Photo</button>
            </div>

            <div style="display:flex; justify-content:center; gap:30px; margin-top:30px;">
                <div>🪙 <b id="balance">0</b><br><small style="color:var(--gold);">Tokens</small></div>
                <button onclick="document.getElementById('buyModal').style.bottom='0'; loadQRs();" style="background:var(--gold); border:none; padding:12px 25px; border-radius:12px; font-weight:bold; color:#000;">BUY TOKENS</button>
            </div>
        </div>
        <div id="userGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px;"></div>
    </div>

    <div id="adminPanel" style="display:none; position:fixed; inset:0; background:#050505; z-index:10000; padding:25px; overflow-y:auto;">
        <h2 style="color:var(--gold);">MASTER ADMIN CONTROL</h2>
        <div style="background:#111; padding:20px; border-radius:15px; margin-top:20px;">
            <h4>Transfer Tokens</h4>
            <input type="text" id="targetEmail" placeholder="User Email">
            <input type="number" id="targetAmt" placeholder="Amount">
            <button onclick="distTokens()" class="btn-neon" style="background:var(--gold); color:#000; box-shadow:none;">SEND</button>
        </div>
        <div style="background:#111; padding:20px; border-radius:15px; margin-top:20px;">
            <h4>Update QR Link</h4>
            <input type="text" id="qrLink" placeholder="Image URL">
            <button onclick="addQR()" class="btn-neon" style="background:#fff; color:#000; box-shadow:none;">SAVE QR</button>
        </div>
        <div id="adminPosts" style="margin-top:20px;"></div>
        <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-neon" style="background:#333; margin-top:20px;">EXIT</button>
    </div>

    <div id="buyModal" style="position:fixed; bottom:-100%; width:100%; height:80%; background:#111; z-index:3000; transition:0.4s; padding:25px; border-radius:35px 35px 0 0; overflow-y:auto;">
        <h3 style="text-align: center;">Scan & Deposit</h3>
        <div id="qrDisplay" style="text-align: center; margin-top: 20px;"></div>
        <button onclick="document.getElementById('buyModal').style.bottom='-100%'" class="btn-neon">Close</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('feedScreen', this)"><i class="fas fa-play"></i>Feed</div>
        <div class="nav-item" onclick="startUpload()"><div class="plus-btn">+</div></div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user-circle"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- AUTH ---
        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); }
            catch { await auth.createUserWithEmailAndPassword(e, p); }
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(user.uid);
                ref.onSnapshot(d => {
                    const data = d.data() || {};
                    document.getElementById('myName').innerText = data.name || "Gajan User";
                    document.getElementById('myPic').src = data.photo || "https://via.placeholder.com/100";
                    document.getElementById('balance').innerText = data.tokens || 0;
                });
                loadFeed();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // --- PROFILE EDIT (PHOTO & NAME) ---
        async function editProfile() {
            const u = auth.currentUser;
            const newName = prompt("Enter New Username:");
            const newPhoto = prompt("Enter Profile Photo Link (Direct URL):");
            const ref = db.collection('users').doc(u.uid);
            const data = (await ref.get()).data() || {};
            const now = Date.now();
            if(newName && now - (data.lastChange || 0) < 9 * 24 * 60 * 60 * 1000) return alert("Error: 9 din limit!");
            
            await ref.set({ name: newName || data.name, photo: newPhoto || data.photo, lastChange: now }, {merge:true});
            alert("Updated!");
        }

        // --- UPLOAD & FEED (FIXED) ---
        async function startUpload() {
            let i = document.createElement('input'); i.type = 'file'; i.accept = 'video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0];
                alert("CONGRATULATIONS! Uploading started...");
                const formData = new FormData();
                formData.append('file', f);
                formData.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method:'POST', body:formData });
                const d = await res.json();
                
                const userD = (await db.collection('users').doc(auth.currentUser.uid).get()).data();
                await db.collection('posts').add({
                    url: d.secure_url, uid: auth.currentUser.uid,
                    uName: userD.name, uPic: userD.photo,
                    likes: 0, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Live!"); loadFeed();
            };
            i.click();
        }

        async function loadFeed() {
            const container = document.getElementById('feedScroll');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="v-post">
                        <div style="position:absolute; top:20px; left:20px; font-weight:900; opacity:0.3;">GAJAN</div>
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="p-ring"><img src="${d.uPic}"></div>
                            <i class="fas fa-heart" style="font-size:35px;" onclick="this.style.color='red'"></i>
                            <b>${d.likes}</b>
                        </div>
                        <div style="position:absolute; bottom:95px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3>@${d.uName}</h3>
                        </div>
                    </div>`;
            });
            const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- ADMIN ---
        let taps = 0;
        function adminCheckTaps() {
            taps++; if(taps >= 5) {
                let p = prompt("Admin Key:");
                if(p === "Abdul6353738585@") { document.getElementById('adminPanel').style.display='block'; loadAdminStuff(); }
                taps = 0;
            }
        }

        async function addQR() {
            const url = document.getElementById('qrLink').value;
            const ref = db.collection('admin_config').doc('qrs');
            const d = await ref.get();
            let urls = d.exists ? d.data().urls : [];
            if(urls.length < 2) urls.push(url); else urls = [urls[1], url];
            await ref.set({ urls: urls }); alert("QR Saved!");
        }

        async function loadQRs() {
            const disp = document.getElementById('qrDisplay');
            const snap = await db.collection('admin_config').doc('qrs').get();
            disp.innerHTML = "";
            if(snap.exists) snap.data().urls.forEach(u => disp.innerHTML += `<img src="${u}">`);
        }

        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
