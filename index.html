<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok Clone & Token Shop</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Video Feed Setup */
        .video-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-post { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar & Overlay */
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; }
        .icon { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Top Token Bar */
        .token-header { position: fixed; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 10; }
        .token-count { color: #ffd700; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Modal / Popups */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; z-index: 20; border: 1px solid #E1306C; }
        .modal h3 { margin-bottom: 15px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn { background: #E1306C; color: #fff; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #qrcode { background: white; padding: 10px; border-radius: 10px; margin: 10px auto; display: block; width: fit-content; }
    </style>
</head>
<body>

    <div class="token-header">
        <div class="token-count" onclick="openShop()">💎 <span id="tokenVal">Loading...</span></div>
        <button id="loginBtn" onclick="gmailLogin()" style="background:transparent; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:20px;">Login</button>
    </div>

    <div class="video-container" id="feed">
        <div class="video-post">
            <video loop onclick="this.paused ? this.play() : this.pause()" autoplay muted>
                <source src="https://v.redd.it/9zivqf5p8zb81/DASH_720.mp4" type="video/mp4">
            </video>
            <div class="side-bar">
                <div class="icon">❤️</div>
                <div class="icon">💬</div>
                <div class="icon" onclick="openShop()">🎁</div>
            </div>
        </div>
    </div>

    <div id="shopModal" class="modal">
        <h3>Gajan Token Shop</h3>
        <div id="qrcode"></div>
        <p id="upiIdDisplay" style="text-align:center; font-size:12px;">UPI: Loading...</p>
        <button class="btn" onclick="document.getElementById('shopModal').style.display='none'">Close</button>
        <hr style="margin:15px 0; opacity:0.3;">
        <button onclick="adminPanel()" style="background:none; color:#555; border:none; width:100%; font-size:10px;">Admin Settings</button>
    </div>

    <div id="adminModal" class="modal">
        <h3>Update Shop Data</h3>
        <input type="text" id="newUpi" placeholder="Nayi UPI ID (e.g. gajan@ybl)">
        <button class="btn" onclick="saveAdminData()">Update Now</button>
        <button class="btn" style="background:#444; margin-top:5px;" onclick="document.getElementById('adminModal').style.display='none'">Cancel</button>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAs-Example-Key", // Aapki asli API Key yahan aayegi
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "765432109876",
            appId: "1:765432109876:web:example"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Gmail Login
        function gmailLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                alert("Welcome " + res.user.displayName);
                document.getElementById('loginBtn').innerText = res.user.displayName.split(' ')[0];
            }).catch(e => alert(e.message));
        }

        // Live Token & UPI Update (admin_data/stock_info)
        db.collection("admin_data").doc("stock_info").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('tokenVal').innerText = (data.total_tokens || 0) + " GJN";
                const upi = data.qr_link || "gajan@upi";
                document.getElementById('upiIdDisplay').innerText = "Pay to: " + upi;
                
                // QR Update
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: `upi://pay?pa=${upi}&pn=Gajan&cu=INR`,
                    width: 150, height: 150
                });
            }
        });

        function openShop() { document.getElementById('shopModal').style.display = 'block'; }

        function adminPanel() {
            const p = prompt("Password:");
            if(p === "Abdul6353738585@") {
                document.getElementById('adminModal').style.display = 'block';
            }
        }

        async function saveAdminData() {
            const upi = document.getElementById('newUpi').value;
            if(!upi) return;
            try {
                await db.collection("admin_data").doc("stock_info").update({ qr_link: upi });
                alert("Updated!");
                document.getElementById('adminModal').style.display = 'none';
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
