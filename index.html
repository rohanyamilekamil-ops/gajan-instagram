<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok | Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #authScreen, #mainApp { display: none; text-align: center; width: 100%; }
        .card { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #ff2d55; margin: auto; max-width: 350px; }
        .btn-google { background: #ff2d55; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>
    <div id="loader"><h2>LOADING GAJAN...</h2></div>

    <div id="authScreen">
        <div class="card">
            <h1 style="color:#ff2d55;">GAJAN</h1>
            <button class="btn-google" onclick="login()">Login with Google</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="card">
            <h2 id="tokenDisplay" style="color:#ffd700;">💎 0</h2>
            <p id="upiDisplay" style="color:#888;"></p>
            <button onclick="auth.signOut()" style="color:#444; background:none; border:none; margin-top:20px;">Logout</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB50TL4_KyiU1XF6e2PZ0mE4",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7cc447600efbaf"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // REFRESH LOOP FIX: Use onAuthStateChanged with a clean UI toggle
        auth.onAuthStateChanged((user) => {
            document.getElementById('loader').style.display = 'none';
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                // Load Firestore Data
                db.collection("stock_info").doc("stock_info").onSnapshot((doc) => {
                    if (doc.exists) {
                        document.getElementById('tokenDisplay').innerText = "💎 " + doc.data().total_tokens;
                        document.getElementById('upiDisplay').innerText = doc.data().qr_link;
                    }
                });
            } else {
                document.getElementById('authScreen').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Using Popup to avoid redirect refresh loop
            auth.signInWithPopup(provider).catch(err => alert("Error: " + err.message));
        }
    </script>
</body>
</html>
