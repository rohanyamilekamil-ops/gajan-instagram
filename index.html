<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan TikTok | Master System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; --glass: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; }

        /* --- MASTER ADMIN PANEL --- */
        #adminPanel { position: fixed; inset: 0; background: #080808; z-index: 9999; display: none; padding: 20px; overflow-y: auto; border: 2px solid var(--gold); }
        .admin-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; text-align: center; }
        .stock-num { font-size: 35px; color: var(--gold); font-weight: 900; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; }

        /* --- PERCENTAGE UPLOAD LOADER --- */
        #uploadOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-circle { width: 130px; height: 130px; border-radius: 50%; border: 6px solid #222; border-top-color: var(--neon); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #percentText { font-size: 28px; font-weight: 800; color: var(--neon); position: absolute; animation: none; }

        /* --- FEED & SIDEBAR --- */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .gold-ring { width: 50px; height: 50px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--gold), #fff, var(--gold)); margin-bottom: 10px; }
        .gold-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .sidebar i { font-size: 32px; filter: drop-shadow(0 0 5px #000); }
        .liked { color: var(--neon); }

        /* --- NAVIGATION --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .nav-item { text-align: center; font-size: 10px; color: #fff; }
        .nav-item i { font-size: 22px; margin-bottom: 3px; display: block; }
        .plus-btn { background: #fff; color: #000; padding: 4px 16px; border-radius: 10px; font-weight: 900; font-size: 22px; }

        /* --- SHARE MODAL --- */
        #shareBox { position: fixed; bottom: -100%; width: 100%; height: 35%; background: #1a1a1a; border-radius: 25px 25px 0 0; z-index: 3000; transition: 0.4s; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="adminPanel">
        <h2 style="color:var(--gold); text-align:center;">MRGAJAN SYSTEM</h2>
        <div class="admin-card">
            <p>MASTER TOKEN STOCK</p>
            <div class="stock-num" id="masterStock">10,000,000</div>
        </div>
        <div class="admin-card">
            <h4>Transfer Tokens</h4>
            <input type="email" id="targetEmail" placeholder="User Email">
            <input type="number" id="tokenAmt" placeholder="Amount">
            <button class="btn-gold" onclick="transferTokens()">TRANSFER NOW</button>
            <p id="adminStatus" style="margin-top:10px; font-size:12px;"></p>
        </div>
        <button class="btn-gold" style="background:#222; color:#fff;" onclick="this.parentElement.style.display='none'">CLOSE</button>
    </div>

    <div id="authScreen" style="position:fixed; inset:0; background:#000; z-index:8000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--neon); font-size:60px; font-weight:900;">GAJAN</h1>
        <p style="letter-spacing:3px; opacity:0.6;">SECURE VIRAL SYSTEM</p>
        <button onclick="login()" style="margin-top:40px; padding:15px 40px; border-radius:50px; border:none; background:#fff; font-weight:bold; font-size:16px;">Login with Google</button>
    </div>

    <div id="uploadOverlay">
        <div class="loader-circle"></div>
        <span id="percentText">0%</span>
        <h2 id="upTitle">System Processing...</h2>
        <p id="upSub">Bheja ja raha hai, rukiye...</p>
        <button id="congratsBtn" onclick="location.reload()" style="display:none; margin-top:20px; background:var(--neon); color:#fff; padding:12px 30px; border:none; border-radius:8px; font-weight:bold;">CONGRATULATIONS!</button>
    </div>

    <div class="feed" id="mainFeed"></div>

    <div id="shareBox">
        <b>Share Gajan Video</b>
        <div style="display:flex; justify-content:space-around; margin-top:30px;">
            <div onclick="alert('Link Copied!')"><i class="fas fa-link" style="font-size:30px;"></i><br><small>Copy</small></div>
            <div onclick="alert('WhatsApp Open')"><i class="fab fa-whatsapp" style="font-size:30px; color:#25D366;"></i><br><small>WhatsApp</small></div>
        </div>
        <button onclick="document.getElementById('shareBox').style.bottom='-100%'" style="margin-top:30px; background:none; border:none; color:gray;">Cancel</button>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="fas fa-search"></i>Discover</div>
        <div class="plus-btn" onclick="openUpload()">+</div>
        <div class="nav-item"><i class="fas fa-message"></i>Inbox</div>
        <div class="nav-item"><i class="fas fa-user"></i>Me</div>
    </div>

    <input type="file" id="realFile" style="display:none;" onchange="handleFile(this)">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- ADMIN LOGIN ---
        window.onload = function() {
            let p = prompt("Admin Password?");
            if(p === "Abdul6353738585@") {
                document.getElementById('adminPanel').style.display = 'block';
                initStock();
            }
        };

        // --- AUTH & STOCK ---
        function login() { auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }
        auth.onAuthStateChanged(user => { if(user) { document.getElementById('authScreen').style.display='none'; loadFeed(); } });

        async function initStock() {
            const s = db.collection('admin_data').doc('stock_info');
            const doc = await s.get();
            if(!doc.exists) await s.set({ total_tokens: 10000000 });
            s.onSnapshot(snap => document.getElementById('masterStock').innerText = snap.data().total_tokens.toLocaleString());
        }

        async function transferTokens() {
            const email = document.getElementById('targetEmail').value;
            const amt = parseInt(document.getElementById('tokenAmt').value);
            const userSnap = await db.collection('users').where('email', '==', email).get();
            if(userSnap.empty) return alert("User nahi mila!");
            
            const stockRef = db.collection('admin_data').doc('stock_info');
            const userRef = db.collection('users').doc(userSnap.docs[0].id);
            
            await db.runTransaction(async (t) => {
                const s = await t.get(stockRef);
                const u = await t.get(userRef);
                t.update(stockRef, { total_tokens: s.data().total_tokens - amt });
                t.update(userRef, { tokens: (u.data().tokens || 0) + amt });
            });
            alert("Transfer Successful!");
        }

        // --- UPLOAD SYSTEM (1-100%) ---
        function openUpload() { document.getElementById('realFile').click(); }
        async function handleFile(input) {
            const file = input.files[0];
            const overlay = document.getElementById('uploadOverlay');
            overlay.style.display = 'flex';
            
            let p = 0;
            let interval = setInterval(() => {
                p += Math.floor(Math.random()*15);
                if(p >= 100) { 
                    clearInterval(interval); 
                    document.getElementById('percentText').innerText = "100%";
                    document.getElementById('upTitle').innerText = "CONGRATULATIONS!";
                    document.getElementById('upSub').innerText = "Video is Live on Gajan System!";
                    document.getElementById('congratsBtn').style.display = 'block';
                } else { document.getElementById('percentText').innerText = p + "%"; }
            }, 300);

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default');
            const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method: "POST", body: formData });
            const data = await res.json();

            await db.collection('posts').add({
                videoUrl: data.secure_url,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                userName: auth.currentUser.displayName,
                userPic: auth.currentUser.photoURL,
                email: auth.currentUser.email,
                likes: 0
            });
        }

        // --- LOAD FEED ---
        async function loadFeed() {
            const feed = document.getElementById('mainFeed');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            feed.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                feed.innerHTML += `
                <div class="post">
                    <video loop playsinline src="${d.videoUrl}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="sidebar">
                        <div class="gold-ring"><img src="${d.userPic}"></div>
                        <div onclick="likePost('${doc.id}', this)"><i class="fas fa-heart"></i><b>${d.likes || 0}</b></div>
                        <div onclick="document.getElementById('shareBox').style.bottom='0'"><i class="fas fa-share"></i><b>Share</b></div>
                    </div>
                    <div style="position:absolute; bottom:85px; left:15px; text-shadow:2px 2px 5px #000;">
                        <b>@${d.userName}</b>
                    </div>
                </div>`;
            });
            const obs = new IntersectionObserver(ents => {
                ents.forEach(e => { if(e.isIntersecting) e.target.play(); else e.target.pause(); });
            }, {threshold:0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        async function likePost(id, btn) {
            const user = auth.currentUser;
            const postRef = db.collection('posts').doc(id);
            const likeDoc = await postRef.collection('likedBy').doc(user.uid).get();
            if(!likeDoc.exists) {
                await postRef.collection('likedBy').doc(user.uid).set({liked: true});
                await postRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
                btn.children[0].classList.add('liked');
            }
        }
    </script>
</body>
</html>
