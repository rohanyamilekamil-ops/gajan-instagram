<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">SocialCloud</h1>
            <button id="upload_widget" class="bg-blue-500 text-white px-6 py-2 rounded-full font-semibold hover:bg-blue-600 transition">
                + Post
            </button>
        </div>
    </nav>

    <main id="feed" class="max-w-md mx-auto py-6 space-y-6 px-4">
        <p class="text-center text-gray-500 italic">Loading posts...</p>
    </main>

    <script>
        // --- ⚙️ CONFIGURATION (Apna data yahan bharein) ---
        const CLOUD_NAME = "APNA_CLOUDINARY_NAME";
        const UPLOAD_PRESET = "APNA_UNSIGNED_PRESET";
        const GITHUB_USER = "APNA_GITHUB_USERNAME";
        const GITHUB_REPO = "APNA_REPO_NAME";
        const GITHUB_TOKEN = "APNA_GITHUB_TOKEN"; // ⚠️ Warning: Ise hide karna zaroori hai

        // 1. POSTS FETCH KARNA (posts.json se)
        async function loadFeed() {
            const feedContainer = document.getElementById('feed');
            try {
                // Cache bust karne ke liye timestamp lagaya hai
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/posts.json?t=${Date.now()}`);
                const posts = await response.json();
                
                feedContainer.innerHTML = ''; // Clear loading text
                
                if (posts.length === 0) {
                    feedContainer.innerHTML = '<p class="text-center text-gray-400">No posts yet. Be the first!</p>';
                }

                posts.reverse().forEach(post => {
                    const postHTML = `
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <img src="${post.url}" class="w-full h-auto object-cover" loading="lazy">
                            <div class="p-4">
                                <p class="text-gray-800 font-medium">${post.caption || ""}</p>
                                <span class="text-xs text-gray-400">${new Date(post.date).toLocaleString()}</span>
                            </div>
                        </div>
                    `;
                    feedContainer.innerHTML += postHTML;
                });
            } catch (err) {
                console.error("Feed load nahi ho saki:", err);
            }
        }

        // 2. GITHUB ACTION KO SIGNAL BHEJNA (Save karne ke liye)
        async function triggerSaveAction(imageUrl) {
            const caption = prompt("Write a caption:") || "New post";
            
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/dispatches`, {
                method: "POST",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json"
                },
                body: JSON.stringify({
                    event_type: "new-post",
                    client_payload: {
                        post: {
                            id: Date.now(),
                            url: imageUrl,
                            caption: caption,
                            date: new Date().toISOString()
                        }
                    }
                })
            });

            if (response.ok) {
                alert("Upload Successful! Post 1-2 minute mein feed mein dikhegi (GitHub refresh ho raha hai).");
            } else {
                alert("GitHub connection failed. Token check karein.");
            }
        }

        // 3. CLOUDINARY WIDGET SETUP
        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET
        }, (error, result) => {
            if (!error && result && result.event === "success") { 
                triggerSaveAction(result.info.secure_url);
            }
        });

        document.getElementById("upload_widget").onclick = () => myWidget.open();
        
        // Initial Load
        loadFeed();
    </script>
</body>
</html>
