<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan - Social Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        .gajan-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text gajan-gradient">Gajan</h1>
            <button id="upload_widget" class="bg-black text-white px-5 py-2 rounded-lg font-bold hover:opacity-80 transition">
                New Post
            </button>
        </div>
    </nav>

    <main id="feed" class="max-w-md mx-auto py-6 space-y-8 px-4">
        <div class="text-center py-10 text-gray-400">Loading Gajan Feed...</div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const CLOUD_NAME = "dvfgzrxs7"; // ✅ Set from your screenshot
        const UPLOAD_PRESET = "YOUR_UNSIGNED_PRESET"; // Cloudinary > Settings > Upload se dalo
        const GITHUB_USER = "YOUR_USERNAME"; 
        const GITHUB_REPO = "YOUR_REPO_NAME";
        const GITHUB_TOKEN = "YOUR_TOKEN"; // GitHub Settings se dalo

        // Load Posts
        async function loadGajanFeed() {
            const feed = document.getElementById('feed');
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/posts.json?v=${Date.now()}`);
                const posts = await res.json();
                feed.innerHTML = '';
                posts.reverse().forEach(p => {
                    feed.innerHTML += `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden border">
                            <img src="${p.url}" class="w-full h-64 object-cover">
                            <div class="p-4">
                                <p class="font-semibold text-gray-800">${p.caption}</p>
                                <p class="text-[10px] text-gray-400 mt-1 uppercase">${new Date(p.date).toLocaleString()}</p>
                            </div>
                        </div>`;
                });
            } catch(e) { console.log("No posts yet."); }
        }

        // Save Logic
        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET
        }, async (error, result) => {
            if (!error && result.event === "success") {
                const caption = prompt("Write something for Gajan:");
                await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/dispatches`, {
                    method: "POST",
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` },
                    body: JSON.stringify({
                        event_type: "new-post",
                        client_payload: { post: { url: result.info.secure_url, caption: caption, date: new Date().toISOString() } }
                    })
                });
                alert("Gajan update ho raha hai! 1 min wait karein.");
            }
        });

        document.getElementById("upload_widget").onclick = () => myWidget.open();
        loadGajanFeed();
    </script>
</body>
</html>
