<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan Instagram - Token Shop</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 15px; margin: 20px auto; width: 90%; max-width: 400px; border: 1px solid #333; }
        #qrcode { background: white; padding: 10px; display: inline-block; margin: 10px; border-radius: 10px; }
        input, button { padding: 10px; margin: 10px; width: 80%; border-radius: 5px; border: none; }
        button { background: #E1306C; color: white; font-weight: bold; cursor: pointer; }
        .stock-info { font-size: 1.5rem; color: #ffd700; margin: 10px; }
    </style>
</head>
<body>

    <h2>💎 Gajan Token Shop</h2>

    <div class="card">
        <p>Current Token Stock:</p>
        <div id="tokenStock" class="stock-info">Loading...</div>
    </div>

    <div class="card">
        <h3>Scan to Buy Tokens</h3>
        <div id="qrcode"></div>
        <p id="upiText">UPI: Loading...</p>
    </div>

    <div id="adminPanel" style="display:none;" class="card">
        <h3>Admin: Update UPI ID</h3>
        <input type="text" id="newUpi" placeholder="Enter new UPI ID (e.g. gajan@upi)">
        <button onclick="updateUpiInDb()">Update QR Now</button>
    </div>

    <button onclick="showAdmin()">Admin Login</button>

    <script>
        // Copy your Firebase Config from settings
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Database se Tokens aur UPI ID fetch karna
        db.collection("stock_info").doc("admin_data").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById("tokenStock").innerText = data.total_tokens + " GJN";
                
                // QR Code Generate karna
                const upiId = data.qr_link || "gajan@upi";
                document.getElementById("upiText").innerText = "UPI ID: " + upiId;
                
                document.getElementById("qrcode").innerHTML = ""; // Clear old QR
                new QRCode(document.getElementById("qrcode"), {
                    text: `upi://pay?pa=${upiId}&pn=GajanInstagram&cu=INR`,
                    width: 200,
                    height: 200
                });
            }
        });

        // 2. UPI ID badalne ka function
        async function updateUpiInDb() {
            const upi = document.getElementById("newUpi").value;
            if(!upi) return alert("UPI ID likho!");
            
            try {
                await db.collection("stock_info").doc("admin_data").update({
                    qr_link: upi
                });
                alert("UPI QR badal gaya!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function showAdmin() {
            const pass = prompt("Enter Admin Password:");
            if(pass === "Abdul6353738585@") {
                document.getElementById("adminPanel").style.display = "block";
            } else { alert("Wrong Password!"); }
        }
    </script>
</body>
</html>
