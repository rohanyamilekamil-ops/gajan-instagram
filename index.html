<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      height: 100vh;
      width: 100%;
      position: relative;
      scroll-snap-align: start;
    }

    video {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }

    .sidebar {
      position: absolute;
      right: 10px;
      bottom: 100px;
      color: white;
      text-align: center;
    }

    .sidebar div {
      margin: 20px 0;
      cursor: pointer;
      font-size: 22px;
    }

    .bottom {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }

    .username {
      font-weight: bold;
    }

    .desc {
      font-size: 14px;
    }

    /* Top Bar */
    .topbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
      color: white;
      z-index: 10;
      padding: 10px;
      background: rgba(0,0,0,0.3);
    }

    .topbar span {
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="topbar">
  <span>Following</span>
  <span><b>For You</b></span>
</div>

<div class="container">

  <!-- Video 1 -->
  <div class="video">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>

    <div class="sidebar">
      <div>❤️</div>
      <div>💬</div>
      <div>🔗</div>
    </div>

    <div class="bottom">
      <div class="username">@user1</div>
      <div class="desc">Amazing video 🔥</div>
    </div>
  </div>

  <!-- Video 2 -->
  <div class="video">
    <video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted></video>

    <div class="sidebar">
      <div>❤️</div>
      <div>💬</div>
      <div>🔗</div>
    </div>

    <div class="bottom">
      <div class="username">@user2</div>
      <div class="desc">Dance reel 💃</div>
    </div>
  </div>

</div>

<script>
  const videos = document.querySelectorAll("video");

  videos.forEach(video => {
    video.addEventListener("click", () => {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    });
  });
</script>

</body>
</html>
