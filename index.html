<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamicTitle">Gajan App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style id="dynamicTheme">
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; }

        /* Screens */
        .screen { position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:1000; padding-bottom:80px; }
        .active-screen { display:flex; }

        /* Video Feed */
        #feedScroll { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .v-post { position:relative; height:100vh; width:100vw; scroll-snap-align:start; }
        video { width:100%; height:100%; object-fit:cover; }

        /* Sidebar & Admin Buttons */
        .sidebar { position:absolute; right:12px; bottom:120px; display:flex; flex-direction:column; gap:20px; align-items:center; }
        .p-ring { width:55px; height:55px; border-radius:50%; border:2px solid var(--gold); padding:2px; }

        /* --- GOD MODE ADMIN PANEL --- */
        #adminPanel { position:fixed; inset:0; background:#050505; z-index:10000; display:none; padding:20px; overflow-y:auto; border:3px solid var(--neon); }
        .admin-card { background:#111; padding:20px; border-radius:20px; border:1px solid #333; margin-bottom:20px; }
        input, select { width:100%; padding:14px; margin-top:10px; border-radius:10px; border:none; background:#222; color:#fff; outline:none; }
        .btn-save { width:100%; padding:15px; background:var(--neon); color:#fff; border:none; border-radius:10px; font-weight:bold; margin-top:10px; }
        
        /* Nav */
        .nav { position:fixed; bottom:0; width:100%; height:70px; background:#000; border-top:1px solid #222; display:flex; justify-content:space-around; align-items:center; z-index:2000; }
        .nav-item { text-align:center; color:#555; font-size:11px; }
        .nav-item.active { color:#fff; }
        .nav-item i { font-size:24px; display:block; }
    </style>
</head>
<body>

    <div id="authScreen" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 id="appLogoDisplay" style="color:var(--neon); font-size:60px; font-weight:900;">GAJAN</h1>
        <button onclick="googleLogin()" style="width:80%; padding:15px; border-radius:50px; border:none; background:#fff; font-weight:bold; margin-top:40px;">START SYSTEM</button>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedScroll"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align:center; padding:50px 20px;">
            <div onclick="godModeTrigger()" class="p-ring" style="width:110px; height:110px; margin:0 auto; position:relative;">
                <img id="myImg" src="" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                <i class="fas fa-camera" onclick="updatePFP()" style="position:absolute; bottom:5px; right:5px; background:var(--neon); padding:8px; border-radius:50%; font-size:12px;"></i>
            </div>
            <h2 id="myName" style="margin-top:15px;">User</h2>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:30px;">
                <button onclick="document.getElementById('buyBox').style.bottom='0'" style="background:var(--gold); color:#000; padding:12px 30px; border:none; border-radius:15px; font-weight:bold;">BUY TOKENS</button>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold); text-align:center;">MASTER SYSTEM CONTROL</h2>
        
        <div class="admin-card">
            <h4>1. App Identity (Name & Logo)</h4>
            <input type="text" id="cfgAppName" placeholder="Change App Name">
            <button class="btn-save" onclick="updateAppConfig()">Update App Identity</button>
        </div>

        <div class="admin-card">
            <h4>2. QR Manager (Gallery Upload)</h4>
            <input type="file" id="cfgQR" accept="image/*" onchange="uploadAdminQR(this)">
            <button class="btn-save" style="background:#444;" onclick="deleteAllQRs()">Delete All QRs</button>
        </div>

        <div class="admin-card">
            <h4>3. System Layout & Buttons</h4>
            <select id="cfgGiftBtn">
                <option value="flex">Show Gift Button</option>
                <option value="none">Hide Gift Button</option>
            </select>
            <select id="cfgPlusBtn">
                <option value="flex">Show Upload (+) Button</option>
                <option value="none">Hide Upload (+) Button</option>
            </select>
            <button class="btn-save" onclick="updateLayout()">Save Layout</button>
        </div>

        <div class="admin-card" id="videoManagerList">
            <h4>4. Manage Viral Feed (Delete)</h4>
        </div>

        <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-save" style="background:#222;">CLOSE MASTER PANEL</button>
    </div>

    <div id="buyBox" style="position:fixed; bottom:-100%; width:100%; height:80%; background:#111; z-index:5000; transition:0.5s; padding:25px; border-radius:40px 40px 0 0;">
        <h3>Deposit Tokens</h3>
        <div id="qrList" style="display:flex; gap:15px; overflow-x:auto; margin-top:20px; height:350px;"></div>
        <button onclick="document.getElementById('buyBox').style.bottom='-100%'" class="btn-save">Close</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showS('feedScreen', this)"><i class="fas fa-play"></i>Home</div>
        <div id="plusContainer" class="nav-item" onclick="upV()"><div style="background:#fff; color:#000; padding:5px 15px; border-radius:10px; font-weight:bold;">+</div></div>
        <div class="nav-item" onclick="showS('meScreen', this)"><i class="fas fa-user-circle"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- DYNAMIC CONFIG LISTENER ---
        function listenToConfig() {
            db.collection('system_config').doc('main').onSnapshot(doc => {
                if(doc.exists) {
                    const cfg = doc.data();
                    document.getElementById('dynamicTitle').innerText = cfg.appName;
                    document.getElementById('appLogoDisplay').innerText = cfg.appName;
                    document.getElementById('plusContainer').style.display = cfg.plusBtn;
                    // Gift visibility logic handled in feed loader
                }
            });
        }

        // --- ADMIN GOD MODE CONTROLS ---
        async function updateAppConfig() {
            const name = document.getElementById('cfgAppName').value;
            if(!name) return;
            await db.collection('system_config').doc('main').set({ appName: name }, {merge:true});
            alert("App Name Updated Worldwide!");
        }

        async function updateLayout() {
            const plus = document.getElementById('cfgPlusBtn').value;
            const gift = document.getElementById('cfgGiftBtn').value;
            await db.collection('system_config').doc('main').set({ plusBtn: plus, giftBtn: gift }, {merge:true});
            alert("Layout System Updated!");
        }

        async function uploadAdminQR(input) {
            const file = input.files[0];
            const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', 'ml_default');
            const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", {method:'POST', body:formData});
            const d = await res.json();
            
            const ref = db.collection('admin_config').doc('qrs');
            const doc = await ref.get();
            let urls = doc.exists ? doc.data().urls : [];
            urls.push(d.secure_url);
            await ref.set({ urls: urls });
            alert("QR Added to Gallery!"); loadUserQRs();
        }

        async function deleteAllQRs() {
            if(confirm("Sare QR delete kar du?")) {
                await db.collection('admin_config').doc('qrs').set({ urls: [] });
                alert("All QRs Deleted!");
            }
        }

        // --- AUTH & FEED ---
        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authScreen').style.display='none';
                syncUserData(user);
                loadFeed();
                listenToConfig();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        async function syncUserData(user) {
            const ref = db.collection('users').doc(user.uid);
            const doc = await ref.get();
            if(!doc.exists) await ref.set({ name: user.displayName, email: user.email, photo: user.photoURL, tokens: 0 });
            ref.onSnapshot(s => {
                document.getElementById('myName').innerText = s.data().name;
                document.getElementById('myImg').src = s.data().photo;
            });
        }

        async function loadFeed() {
            const cont = document.getElementById('feedScroll');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            const config = (await db.collection('system_config').doc('main').get()).data();
            
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="v-post">
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="p-ring"><img src="${d.uPic}"></div>
                            <i class="fas fa-heart" style="font-size:35px;"></i>
                            <i class="fas fa-gift" style="display:${config.giftBtn}; color:var(--gold); font-size:30px;"></i>
                            <i class="fas fa-share"></i>
                        </div>
                        <div style="position:absolute; bottom:95px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3>@${d.uName}</h3>
                        </div>
                    </div>`;
            });
        }

        // --- ADMIN TRIGGER ---
        let taps = 0;
        function godModeTrigger() {
            taps++; if(taps >= 5) {
                let p = prompt("MASTER ADMIN KEY:");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminPanel').style.display='block';
                    loadAdminPostManager();
                }
                taps = 0;
            }
        }

        async function loadAdminPostManager() {
            const mgr = document.getElementById('videoManagerList');
            const s = await db.collection('posts').get();
            mgr.innerHTML = "<h4>4. Manage Viral Feed</h4>";
            s.forEach(doc => {
                mgr.innerHTML += `<div style="display:flex; justify-content:space-between; background:#222; padding:10px; margin-top:5px; border-radius:10px;">
                    <span>@${doc.data().uName}</span>
                    <button onclick="adminDelV('${doc.id}')" style="background:red; color:#fff; border:none; padding:5px 10px; border-radius:5px;">Delete</button>
                </div>`;
            });
        }

        async function adminDelV(id) { if(confirm("Delete Video?")) { await db.collection('posts').doc(id).delete(); loadAdminPostManager(); } }

        function showS(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }

        async function loadUserQRs() {
            const disp = document.getElementById('qrList');
            const s = await db.collection('admin_config').doc('qrs').get();
            disp.innerHTML = "";
            if(s.exists) s.data().urls.forEach(u => disp.innerHTML += `<img src="${u}" style="height:100%; border-radius:20px;">`);
        }
    </script>
</body>
</html>
