<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .g-logo { font-family: 'Grand Hotel', cursive; font-size: 5rem; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="w-full max-w-sm p-8 text-center">
        <h1 class="g-logo">Gajan</h1>
        <div class="bg-white/20 backdrop-blur-md p-8 rounded-[30px] border border-white/30 space-y-4">
            <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-white/10 rounded-2xl outline-none text-white placeholder-white/70 border border-white/20">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-white/10 rounded-2xl outline-none text-white placeholder-white/70 border border-white/20">
            <button onclick="login()" class="w-full py-4 bg-white text-pink-600 font-bold rounded-2xl shadow-xl active:scale-95 transition">Log In</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p)
                .then(() => { window.location.href = "profile.html"; })
                .catch(err => alert("Details sahi se bhariye!"));
        };

        onAuthStateChanged(auth, user => { if(user) window.location.href = "profile.html"; });
    </script>
</body>
</html>
