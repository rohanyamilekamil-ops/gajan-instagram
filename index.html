<!DOCTYPE html>
<html>
<head>
<title>GAJAN TIKTOK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

.top {
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

video {
  width:100%;
  height:100vh;
  object-fit:cover;
}

.controls {
  position:fixed;
  right:10px;
  bottom:100px;
}

.controls div {
  margin:15px 0;
  font-size:22px;
  cursor:pointer;
}

.form {
  position:fixed;
  top:50px;
  left:10px;
}
</style>
</head>

<body>

<div class="top">
  <h3>GAJAN TIKTOK</h3>
</div>

<div class="form">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button><br><br>

  <input type="file" id="file"><br><br>
  <input id="desc" placeholder="Description"><br><br>
  <button onclick="upload()">Upload</button>
</div>

<div id="feed"></div>

<script>

// Fake database (demo)
let users = [];
let videos = [];

function login(){
  const email = emailInput();
  const pass = passwordInput();

  let user = users.find(u=>u.email===email);

  if(!user){
    users.push({email,password:pass});
    alert("Signup Done ✅");
  } else {
    if(user.password===pass){
      alert("Login Success ✅");
      loadVideos();
    } else {
      alert("Wrong Password ❌");
    }
  }
}

function upload(){
  const file = document.getElementById("file").files[0];
  const desc = document.getElementById("desc").value;

  if(!file) return alert("Select video");

  const url = URL.createObjectURL(file);

  videos.push({url,desc,likes:0});

  alert("Video Uploaded 🎥");
  loadVideos();
}

function loadVideos(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach((v,i)=>{
    feed.innerHTML += `
      <div>
        <video src="${v.url}" autoplay loop controls></video>
        <p>${v.desc}</p>
        <button onclick="like(${i})">❤️ ${v.likes}</button>
      </div>
    `;
  });
}

function like(i){
  videos[i].likes++;
  loadVideos();
}

function emailInput(){
  return document.getElementById("email").value;
}

function passwordInput(){
  return document.getElementById("password").value;
}

</script>

</body>
</html>
