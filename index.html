<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok | Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* === NEW STYLISH LOGIN SCREEN === */
        #authScreen { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #222, #000); 
            z-index: 9999; 
            position: fixed; 
            width: 100%; 
            transition: opacity 0.5s ease-out;
        }
        
        .login-box { 
            text-align: center; 
            padding: 40px; 
            border-radius: 25px; 
            background: #111; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 10px 40px rgba(255, 45, 85, 0.2); 
        }
        
        /* SUPER STYLISH GAJAN TIKTOK TEXT */
        .gajan-text { 
            font-size: 36px; 
            font-weight: 900; 
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00fffb 0%, #ff2d55 50%, #ffd700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 45, 85, 0.3);
            letter-spacing: -1px;
        }
        
        .btn-google { 
            background: linear-gradient(135deg, #ff2d55, #E1306C); 
            color: white; 
            padding: 16px 20px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 100%; 
            font-size: 16px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(225, 48, 108, 0.3);
            transition: transform 0.2s;
        }
        .btn-google:active { transform: scale(0.98); }

        /* MAIN APP CONTENT (Baqi UI pehle ki tarah) */
        #mainApp { display: none; height: 100vh; }
        /* Add other app UI here (feed, upload, etc) */
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="login-box">
            <h1 class="gajan-text">Gajan TikTok</h1>
            <p style="color:#aaa; margin-bottom:30px; font-size:14px;">Log in to Gajan TikTok to start watching.</p>
            <button class="btn-google" onclick="googleSignIn()">Continue with Google</button>
            <p style="color:#444; margin-top:15px; font-size:10px;">Gajan is a personalized short video social app</p>
        </div>
    </div>

    <div id="mainApp">
        <div style="padding:50px; text-align:center;">
            <h1>Main Feed Open!</h1>
            <p>Login Success.</p>
        </div>
    </div>

    <script>
        // === PASTE YOUR API KEYS HERE FROM FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyAs-Replace-This-With-Your-Actual-Key",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // **CRITICAL LOGIN FIX**: Using onAuthStateChanged instead of just an ID token check
        auth.onAuthStateChanged(user => {
            const authScr = document.getElementById('authScreen');
            const mainApp = document.getElementById('mainApp');
            
            if (user) {
                // User is signed in. Hide Login, Show App.
                authScr.style.opacity = 0;
                setTimeout(() => { authScr.style.display = 'none'; }, 500); // Smooth hide
                mainApp.style.display = 'block';
                // setupUserAccount(user); // Initialize user data
            } else {
                // User is signed out. Show Login, Hide App.
                authScr.style.display = 'flex';
                authScr.style.opacity = 1;
                mainApp.style.display = 'none';
            }
        });

        // Fixed signIn method
        function googleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Optional: for mobile chrome, signInWithRedirect is often more stable.
            auth.signInWithPopup(provider).catch(error => {
                alert("Login failed: " + error.message);
            });
        }
    </script>
</body>
</html>
