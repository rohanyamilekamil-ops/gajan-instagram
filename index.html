<div id="profilePanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; overflow-y:auto;">
    
    <div style="display:flex; justify-content:space-between; padding:20px; align-items:center;">
        <i class="fas fa-arrow-left" onclick="toggleProfile()" style="font-size:20px;"></i>
        <span id="profileUsername" style="font-weight:bold;">User Profile</span>
        <i class="fas fa-bars"></i>
    </div>

    <div style="text-align:center; padding:20px;">
        <img id="userImgBig" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid #fe2c55; object-fit:cover;">
        <h3 id="profileName" style="margin-top:10px;">@gajan_user</h3>
        
        <div style="display:flex; justify-content:center; gap:30px; margin-top:20px;">
            <div style="text-align:center;"><b>120</b><br><small style="color:gray;">Following</small></div>
            <div style="text-align:center;"><b>5.2k</b><br><small style="color:gray;">Followers</small></div>
            <div style="text-align:center;"><b id="totalLikes">0</b><br><small style="color:gray;">Likes</small></div>
        </div>

        <button style="margin-top:20px; padding:8px 40px; border-radius:5px; border:1px solid #444; background:none; color:#fff; font-weight:bold;">Edit Profile</button>
    </div>

    <hr style="border:0.1px solid #222; margin:0;">

    <div id="userVideoGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px; padding:2px;">
        </div>
</div>

<script>
    // --- User Profile Logic ---

    async function toggleProfile() {
        const p = document.getElementById('profilePanel');
        if(p.style.display === 'none' || p.style.display === '') {
            p.style.display = 'block';
            loadUserVideos(); // Profile khulte hi videos load karo
        } else {
            p.style.display = 'none';
        }
    }

    async function loadUserVideos() {
        if(!currentUser) return;

        const grid = document.getElementById('userVideoGrid');
        const totalLikesDisp = document.getElementById('totalLikes');
        grid.innerHTML = "<p style='padding:20px; grid-column:span 3; text-align:center;'>Loading your videos...</p>";

        // Database se sirf wahi videos mangwao jo login user ke hain
        // Note: Iske liye upload karte waqt 'userEmail' save karna zaroori hai
        const snap = await db.collection('posts')
                             .where('userEmail', '==', currentUser.email)
                             .get();

        let countLikes = 0;
        grid.innerHTML = ""; // Clear loader

        if(snap.empty) {
            grid.innerHTML = "<p style='padding:20px; grid-column:span 3; text-align:center;'>No videos posted yet.</p>";
            return;
        }

        snap.forEach(doc => {
            const data = doc.data();
            countLikes += (data.likes || 0);

            // Grid Item Design
            grid.innerHTML += `
                <div style="position:relative; aspect-ratio: 9/16; background:#111; overflow:hidden;">
                    <video src="${data.videoUrl}" style="width:100%; height:100%; object-fit:cover;"></video>
                    <div style="position:absolute; bottom:5px; left:5px; font-size:12px;">
                        <i class="fas fa-play"></i> ${data.views || 0}
                    </div>
                </div>
            `;
        });

        totalLikesDisp.innerText = countLikes;
        document.getElementById('userImgBig').src = currentUser.photoURL;
        document.getElementById('profileName').innerText = "@" + currentUser.displayName.replace(/\s+/g, '').toLowerCase();
    }

    // --- Upload Function Update (Zaroori) ---
    // Jab user video upload kare, toh uska Email aur Name bhi save karo

            likes: 0,
            views: 0,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        // ... 
    }
</script>
