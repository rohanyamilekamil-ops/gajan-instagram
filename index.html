<div class="bg-white border mt-2" id="post-container">
    <div class="p-3 flex items-center space-x-2">
        <div class="w-8 h-8 bg-pink-500 rounded-full flex items-center justify-center text-white text-xs">G</div>
        <span class="font-semibold text-sm">Gajan_Official</span>
    </div>
    
    <img src="https://picsum.photos/500/500" class="w-full aspect-square object-cover">
    
    <div class="p-3">
        <div class="flex space-x-4 text-2xl mb-2">
            <button onclick="handleLike()"><i id="like-icon" class="fa-regular fa-heart text-gray-700"></i></button>
            <i class="fa-regular fa-comment"></i>
        </div>
        
        <p class="text-sm font-bold"><span id="like-count">0</span> Likes</p>
        
        <div id="comment-list" class="mt-2 text-sm space-y-1 max-h-32 overflow-y-auto">
            </div>

        <div class="mt-3 flex border-t pt-2">
            <input id="comment-input" type="text" placeholder="Add a comment..." class="flex-1 text-sm outline-none">
            <button onclick="postComment()" class="text-blue-500 font-bold text-sm ml-2">Post</button>
        </div>
    </div>
</div>
