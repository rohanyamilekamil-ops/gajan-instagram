<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Original System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* Screens */
        .screen { position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:1000; padding-bottom:70px; }
        .active-screen { display:flex; }

        /* Feed */
        #feedScroll { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .v-post { position:relative; height:100vh; width:100vw; scroll-snap-align:start; }
        video { width:100%; height:100%; object-fit:cover; }

        /* Sidebar */
        .sidebar { position:absolute; right:12px; bottom:120px; display:flex; flex-direction:column; gap:20px; align-items:center; }
        .p-ring { width:50px; height:50px; border-radius:50%; border:2px solid var(--gold); padding:2px; }
        .p-ring img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        /* Admin Dashboard */
        #adminPanel { position:fixed; inset:0; background:#0a0a0a; z-index:10000; display:none; padding:20px; overflow-y:auto; border:3px solid var(--gold); }
        .admin-card { background:#111; padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid #333; }
        input { width:100%; padding:12px; margin-top:10px; background:#222; color:#fff; border:none; border-radius:8px; }

        /* Nav */
        .nav { position:fixed; bottom:0; width:100%; height:65px; background:#000; border-top:1px solid #222; display:flex; justify-content:space-around; align-items:center; z-index:2000; }
        .nav-item { text-align:center; color:#555; font-size:10px; }
        .nav-item.active { color:#fff; }
        .nav-item i { font-size:24px; display:block; }
    </style>
</head>
<body>

    <div id="authScreen" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--neon); font-size:60px; font-weight:900;">GAJAN</h1>
        <button onclick="googleLogin()" style="width:80%; padding:15px; border-radius:50px; background:#fff; font-weight:bold; margin-top:30px; border:none;">Login with Google</button>
    </div>

    <div id="feedScreen" class="screen active-screen">
        <div id="feedScroll"></div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align:center; padding:50px 20px;">
            <div onclick="adminTaps()" class="p-ring" style="width:100px; height:100px; margin:0 auto; position:relative;">
                <img id="uImg" src="https://via.placeholder.com/100">
                <i class="fas fa-camera" onclick="upPFP()" style="position:absolute; bottom:0; right:0; background:var(--neon); padding:8px; border-radius:50%; font-size:12px;"></i>
            </div>
            <h2 id="uName" style="margin-top:15px;">User</h2>
            <p id="uEmail" style="color:gray; font-size:12px;"></p>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                <button onclick="document.getElementById('buyBox').style.bottom='0'; loadQRs();" style="background:var(--gold); padding:10px 20px; border-radius:10px; border:none; font-weight:bold;">BUY TOKENS</button>
            </div>
        </div>
        <div id="myGrid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:1px;"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--gold); text-align:center;">ADMIN MASTER</h2>
        <div class="admin-card">
            <h4>Transfer Tokens</h4>
            <input type="text" id="targetE" placeholder="Email">
            <input type="number" id="targetA" placeholder="Amount">
            <button onclick="transfer()" style="width:100%; padding:12px; background:var(--gold); border:none; font-weight:bold; margin-top:10px;">SEND</button>
        </div>
        <div class="admin-card">
            <h4>Gallery QR Upload</h4>
            <input type="file" onchange="upQR(this)">
        </div>
        <div class="admin-card" id="postList">
            <h4>Delete Any Video</h4>
        </div>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:15px; background:#333; color:#fff; border:none;">EXIT</button>
    </div>

    <div id="buyBox" style="position:fixed; bottom:-100%; width:100%; height:75%; background:#111; z-index:5000; transition:0.4s; padding:25px; border-radius:30px 30px 0 0;">
        <h3>Deposit QR</h3>
        <div id="qrDisp" style="display:flex; gap:10px; overflow-x:auto; margin-top:20px; height:350px;"></div>
        <button onclick="document.getElementById('buyBox').style.bottom='-100%'" style="width:100%; padding:15px; background:var(--neon); color:#fff; border:none; margin-top:20px;">CLOSE</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showS('feedScreen', this)"><i class="fas fa-play"></i>Feed</div>
        <div class="nav-item" onclick="upV()"><div style="background:#fff; color:#000; padding:5px 15px; border-radius:8px; font-weight:bold;">+</div></div>
        <div class="nav-item" onclick="showS('meScreen', this)"><i class="fas fa-user-circle"></i>Me</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // AUTH
        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        auth.onAuthStateChanged(async u => {
            if(u) {
                document.getElementById('authScreen').style.display='none';
                const ref = db.collection('users').doc(u.uid);
                const doc = await ref.get();
                if(!doc.exists) await ref.set({ name: u.displayName, email: u.email, photo: u.photoURL, tokens: 0 });
                ref.onSnapshot(s => {
                    document.getElementById('uName').innerText = s.data().name;
                    document.getElementById('uEmail').innerText = s.data().email;
                    document.getElementById('uImg').src = s.data().photo;
                });
                loadFeed();
            } else { document.getElementById('authScreen').style.display='flex'; }
        });

        // UPLOAD & FEED
        async function upV() {
            let i = document.createElement('input'); i.type='file'; i.accept='video/*';
            i.onchange = async (e) => {
                const f = e.target.files[0]; alert("CONGRATULATIONS! Uploading...");
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", {method:'POST', body:fd});
                const d = await res.json();
                const u = (await db.collection('users').doc(auth.currentUser.uid).get()).data();
                await db.collection('posts').add({
                    url: d.secure_url, uid: auth.currentUser.uid, uName: u.name, uPic: u.photo, uEmail: u.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                alert("Live!"); loadFeed();
            }; i.click();
        }

        async function loadFeed() {
            const cont = document.getElementById('feedScroll');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="v-post">
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="p-ring"><img src="${d.uPic}"></div>
                            <i class="fas fa-heart"></i><b>${d.likes}</b>
                            <i class="fas fa-share" onclick="alert('${d.uEmail}')"></i>
                        </div>
                        <div style="position:absolute; bottom:90px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3>@${d.uName}</h3><p style="font-size:10px; opacity:0.5;">${d.uEmail}</p>
                        </div>
                    </div>`;
            });
        }

        // ADMIN
        let taps = 0;
        function adminTaps() {
            taps++; if(taps >= 5) {
                let p = prompt("Master Key:");
                if(p === "Abdul6353738585@") { document.getElementById('adminPanel').style.display='block'; loadAdminPosts(); }
                taps = 0;
            }
        }

        async function loadAdminPosts() {
            const list = document.getElementById('postList');
            const snap = await db.collection('posts').get();
            list.innerHTML = "<h4>Manage Posts</h4>";
            snap.forEach(doc => list.innerHTML += `<div style="display:flex; justify-content:space-between; background:#222; padding:10px; margin-top:5px;"><span>@${doc.data().uName}</span><button onclick="admDel('${doc.id}')" style="background:red; color:#fff; border:none; padding:5px;">Delete</button></div>`);
        }

        async function admDel(id) { if(confirm("Delete?")) { await db.collection('posts').doc(id).delete(); loadAdminPosts(); } }

        function showS(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
