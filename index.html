<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan Insta | Login & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .g-gradient { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .video-container { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid #bc1888; box-shadow: 0 0 20px rgba(188, 24, 136, 0.3); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="mb-8 text-center">
        <div class="w-20 h-20 g-gradient rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl">
            <span class="text-white font-black italic text-4xl">G</span>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter">GAJAN INSTA</h1>
        <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] mt-1">Core Earning Platform</p>
    </div>

    <div class="glass-card p-4 w-full max-w-sm mb-8">
        <h2 class="text-xs font-bold text-pink-500 mb-3 uppercase tracking-widest text-center">
            <i class="fa-solid fa-circle-play mr-1"></i> How to Earn & Buy Tokens
        </h2>
        <div class="video-container bg-black aspect-video flex items-center justify-center">
            <video id="intro-video" controls class="w-full h-full" poster="https://via.placeholder.com/400x225?text=Watch+Earning+Guide">
                <source src="APNI_VIDEO_LINK_YAHAN_DAALEIN.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <p class="text-[9px] text-gray-400 mt-3 text-center italic">1. Buy Tokens 2. Like Reels 3. Creators Earn Money!</p>
    </div>

    <div class="w-full max-w-sm space-y-4">
        <input id="email" type="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-pink-500 transition text-sm">
        <input id="password" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-pink-500 transition text-sm">
        
        <button id="login-btn" class="w-full g-gradient py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition mt-4">
            Start Earning Now
        </button>
        
        <div class="text-center mt-6">
            <p class="text-gray-500 text-xs">Don't have an account? <a href="signup.html" class="text-white font-bold">Sign Up</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerText = "Authenticating...";
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                location.href = "reels.html";
            } catch (e) {
                alert("Login Error: " + e.message);
                btn.innerText = "Start Earning Now";
            }
        };
    </script>
</body>
</html>
