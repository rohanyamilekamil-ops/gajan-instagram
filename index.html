<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok | Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 1. LOGIN SCREEN (Strictly First) */
        #authScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; z-index: 9999; position: fixed; width: 100%; }
        .login-box { text-align: center; padding: 40px; border-radius: 30px; background: #111; border: 1px solid #333; width: 85%; max-width: 400px; }
        .btn-google { background: #ff2d55; color: white; padding: 15px 25px; border: none; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }

        /* 2. MAIN FEED */
        #mainApp { display: none; height: 100vh; }
        .video-feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .video-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI Overlays */
        .top-header { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .token-badge { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; color: #ffd700; font-weight: bold; border: 1px solid #ffd700; }
        
        .side-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-icon { width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .profile-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; }
        .upload-plus { background: linear-gradient(to right, #2af5ff, #ff2d55); padding: 6px 18px; border-radius: 10px; color: #000; font-size: 20px; font-weight: bold; }

        /* Modals */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; z-index: 10000; border: 1px solid #ff2d55; text-align: center; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; margin: 15px auto; width: 150px; }
        .close-btn { background: #333; color: #fff; padding: 10px; width: 100%; border: none; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="login-box">
            <h2 style="color:#ff2d55; margin-bottom:10px;">Gajan TikTok</h2>
            <p style="color:#888; margin-bottom:30px;">Login to start watching and earning</p>
            <button class="btn-google" onclick="googleSignIn()">Continue with Google</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="top-header">
            <div class="token-badge" onclick="openModal('shopModal')">💎 <span id="userTokenBal">0</span></div>
            <img id="userAvatar" class="profile-btn" src="" onclick="openModal('profileModal')">
        </div>

        <div class="video-feed" id="feed">
            <div class="video-card"><p style="width:100%; text-align:center;">Discovering Videos...</p></div>
        </div>

        <div class="nav-bar">
            <span style="font-size:24px;" onclick="location.reload()">🏠</span>
            <div class="upload-plus" onclick="openModal('uploadModal')">+</div>
            <span style="font-size:24px;" onclick="openModal('profileModal')">👤</span>
        </div>
    </div>

    <div id="shopModal" class="modal">
        <h3>Gajan Shop</h3>
        <div id="qrcode"></div>
        <p id="upiIdDisplay" style="font-size:12px; color:#aaa;">UPI: Loading...</p>
        <button class="close-btn" onclick="closeModal('shopModal')">Cancel</button>
    </div>

    <div id="profileModal" class="modal">
        <img id="pModalPic" style="width:80px; height:80px; border-radius:50%; margin-bottom:10px;">
        <h3 id="pModalName">User</h3>
        <p id="pModalEmail" style="color:#777; font-size:12px; margin-bottom:20px;"></p>
        <button class="btn-google" style="background:#444;" onclick="auth.signOut()">Logout</button>
        <button class="close-btn" onclick="closeModal('profileModal')">Back</button>
    </div>

    <div id="uploadModal" class="modal">
        <h3>Post Video</h3>
        <input type="file" id="vFile" accept="video/*" style="margin:20px 0; color:white;">
        <button id="upBtn" class="btn-google" onclick="startUpload()">Upload Now</button>
        <button class="close-btn" onclick="closeModal('uploadModal')">Close</button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAs-Aapki-Real-Key-Yahan-Dalein",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "765432109876",
            appId: "1:765432109876:web:example"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 1. AUTH LOGIC (Auto-Login Check)
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                initUserAccount(user);
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        async function initUserAccount(user) {
            document.getElementById('userAvatar').src = user.photoURL;
            document.getElementById('pModalPic').src = user.photoURL;
            document.getElementById('pModalName').innerText = user.displayName;
            document.getElementById('pModalEmail').innerText = user.email;

            // User-Specific Tokens
            const userRef = db.collection("users").doc(user.uid);
            const doc = await userRef.get();
            if(!doc.exists) await userRef.set({ tokens: 0, email: user.email });
            
            userRef.onSnapshot(d => {
                document.getElementById('userTokenBal').innerText = d.data().tokens || 0;
            });
        }

        function googleSignIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        // 2. LIVE VIDEO FEED
        db.collection("videos").orderBy("timestamp", "desc").onSnapshot(snap => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="video-card">
                        <video loop onclick="this.paused?this.play():this.pause()" autoplay muted playsinline src="${data.url}"></video>
                        <div class="side-actions">
                            <div class="action-icon">❤️</div>
                            <div class="action-icon" onclick="openModal('shopModal')">🎁</div>
                        </div>
                    </div>`;
            });
        });

        // 3. FREE UPLOAD SYSTEM
        async function startUpload() {
            const file = document.getElementById('vFile').files[0];
            const btn = document.getElementById('upBtn');
            if(!file) return alert("Select Video!");
            
            btn.innerText = "Processing..."; btn.disabled = true;
            const formData = new FormData(); formData.append('file', file);

            try {
                const res = await fetch('https://file.io', { method: 'POST', body: formData });
                const json = await res.json();
                if(json.success) {
                    await db.collection("videos").add({
                        url: json.link,
                        uid: auth.currentUser.uid,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert("Video Live!"); closeModal('uploadModal');
                }
            } catch(e) { alert("Upload Failed"); }
            btn.innerText = "Upload Now"; btn.disabled = false;
        }

        // 4. ADMIN SHOP & QR
        db.collection("admin_data").doc("stock_info").onSnapshot(doc => {
            if(doc.exists) {
                const upi = doc.data().qr_link || "gajan@upi";
                document.getElementById('upiIdDisplay').innerText = "UPI: " + upi;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById('qrcode'), { text: `upi://pay?pa=${upi}&pn=Gajan`, width: 140, height: 140 });
            }
        });

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
