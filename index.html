<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Clone</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video-card {
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }

    .username {
      font-weight: bold;
    }

    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      color: white;
      text-align: center;
    }

    .actions div {
      cursor: pointer;
      font-size: 20px;
    }

    .top-bar {
      position: fixed;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-weight: bold;
      z-index: 10;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px 0;
    }
  </style>
</head>

<body>

<div class="top-bar">TikTok</div>

<div class="container">

  <!-- Video 1 -->
  <div class="video-card">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>

    <div class="overlay">
      <div class="username">@user1</div>
      <div>Awesome video 🔥</div>
    </div>

    <div class="actions">
      <div>❤️<br>1.2K</div>
      <div>💬<br>200</div>
      <div>🔗<br>Share</div>
    </div>
  </div>

  <!-- Video 2 -->
  <div class="video-card">
    <video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted></video>

    <div class="overlay">
      <div class="username">@user2</div>
      <div>Another clip 🎥</div>
    </div>

    <div class="actions">
      <div>❤️<br>3K</div>
      <div>💬<br>500</div>
      <div>🔗<br>Share</div>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <div>🏠 Home</div>
  <div>🔍 Search</div>
  <div>➕ Upload</div>
  <div>❤️ Likes</div>
  <div>👤 Profile</div>
</div>

<script>
  const videos = document.querySelectorAll("video");

  videos.forEach(video => {
    video.addEventListener("click", () => {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    });
  });
</script>

</body>
</html>
