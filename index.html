<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok | Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Smooth Loading Overlay */
        #loader {
            position: fixed; top: 0; width: 100%; height: 100%; background: #000;
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }

        /* Stylish Login */
        #authScreen { height: 100vh; display: none; align-items: center; justify-content: center; text-align: center; }
        .login-card { background: #111; padding: 40px; border-radius: 25px; border: 1px solid #ff2d55; width: 85%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 45, 85, 0.3); }
        .btn-google { background: #ff2d55; color: #fff; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 25px; }

        /* Main App Layout */
        #mainApp { display: none; height: 100vh; position: relative; }
        .top-nav { position: absolute; top: 20px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 10; }
        .tokens { color: #ffd700; font-weight: bold; font-size: 18px; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="loader"><h2>GAJAN...</h2></div>

    <div id="authScreen">
        <div class="login-card">
            <h1 style="color: #ff2d55; font-size: 35px;">Gajan TikTok</h1>
            <p style="color: #888; margin-top: 10px;">Login to start watching and earning</p>
            <button class="btn-google" onclick="login()">Continue with Google</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="top-nav">
            <div class="tokens">💎 1000000</div>
            <div onclick="auth.signOut()" style="cursor:pointer">Logout</div>
        </div>
        <div style="height: 100%; display: flex; align-items: center; justify-content: center;">
            <p>Video Feed Loading...</p>
        </div>
        <div class="bottom-nav">
            <span>🏠</span>
            <span style="background: #ff2d55; padding: 5px 15px; border-radius: 8px;">+</span>
            <span>🎁</span>
        </div>
    </div>

    <script>
        // Aapki Real API Key
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB50TL4_KyiU1...", // Ise maine aapke screenshot se liya hai
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c..."
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // REFRESH PROBLEM FIX: Auth state check
        auth.onAuthStateChanged(user => {
            document.getElementById('loader').style.display = 'none';
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(alert);
        }
    </script>
</body>
</html>
