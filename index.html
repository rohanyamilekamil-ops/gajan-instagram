<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan App | Next-Gen TikTok Clone</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --cyan: #25f4ee; --dark-bg: #010101; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--dark-bg); color: #fff; overflow: hidden; }

        /* --- 1. LOGIN & SPLASH SYSTEM --- */
        #authScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-anim { font-size: 65px; font-weight: 900; background: linear-gradient(45deg, var(--cyan), #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px var(--neon)); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .login-box { width: 85%; max-width: 380px; margin-top: 40px; }
        input { width: 100%; padding: 16px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; }
        .btn-prime { width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; background: var(--neon); color: #fff; margin-top: 15px; }

        /* --- 2. THEME & UI SCREENS --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* Video Feed Screen */
        #feedScroll { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Action Buttons (Right Sidebar) */
        .action-bar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .profile-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; padding: 2px; }
        .profile-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .icon-unit { text-align: center; font-size: 30px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); cursor: pointer; }
        .icon-unit span { font-size: 12px; display: block; font-weight: bold; }

        /* --- 3. GIFT & TOKEN SYSTEM --- */
        .modal { position: fixed; bottom: -100%; width: 100%; background: #111; z-index: 3000; transition: 0.4s; padding: 25px; border-radius: 30px 30px 0 0; border-top: 2px solid var(--gold); }
        .gift-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .gift-item { background: #222; padding: 10px; border-radius: 15px; text-align: center; font-size: 20px; }

        /* --- 4. NAVIGATION BAR --- */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 5000; border-top: 0.5px solid #222; }
        .nav-link { text-align: center; color: #777; font-size: 10px; }
        .nav-link.active { color: #fff; }
        .nav-link i { font-size: 24px; margin-bottom: 4px; display: block; }
        .upload-center { background: #fff; color: #000; width: 45px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; position: relative; }
        .upload-center::before { content:''; position:absolute; inset: 0 -3px; background: linear-gradient(to right, var(--cyan), var(--neon)); border-radius: 8px; z-index: -1; }

        /* --- 5. ADMIN CONTROL UI --- */
        #adminDashboard { position: fixed; inset: 0; background: #080808; z-index: 10000; display: none; padding: 25px; overflow-y: auto; border: 4px solid var(--gold); }
        .admin-stat-card { background: #151515; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .del-post-btn { background: var(--neon); border: none; padding: 5px 12px; border-radius: 5px; color: #fff; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="logo-anim">GAJAN</div>
        <div class="login-box" id="loginForm">
            <input type="email" id="userEmail" placeholder="Email / Phone">
            <input type="password" id="userPass" placeholder="Password">
            <button class="btn-prime" onclick="processLogin()">LOGIN / SIGNUP</button>
            <button onclick="googleAuth()" style="background:none; border:1px solid #444; color:#fff; width:100%; margin-top:15px; padding:12px; border-radius:50px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_logo_32.png" width="18" style="vertical-align:middle;"> Continue with Google
            </button>
        </div>
    </div>

    <div id="homeScreen" class="screen active-screen">
        <div id="feedScroll">
            </div>
    </div>

    <div id="profileScreen" class="screen">
        <div style="text-align: center; padding: 40px 20px;">
            <div onclick="adminTaps()" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto; position: relative;">
                <img id="myAvatar" src="https://via.placeholder.com/100" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                <i class="fas fa-plus-circle" onclick="changeProfilePhoto()" style="position:absolute; bottom:5px; right:5px; color:var(--neon); background:#fff; border-radius:50%;"></i>
            </div>
            <h2 id="displayUName" style="margin-top:15px;">Gajan User</h2>
            <p id="displayUEmail" style="color:gray; font-size:12px;">user@gajan.app</p>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:30px;">
                <div onclick="openWallet()"><b id="walletBal">0</b><br><small>Tokens</small></div>
                <div><b>0</b><br><small>Followers</small></div>
            </div>
            <button class="btn-prime" style="background:var(--gold); color:#000; width:auto; padding:10px 40px;" onclick="openQR()">MY QR CODE</button>
        </div>
        <div id="userGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:1px;"></div>
    </div>

    <div id="giftModal" class="modal">
        <h3>Send Love to Creator</h3>
        <div class="gift-grid">
            <div class="gift-item" onclick="sendGift(10)">🌹<br><small>10</small></div>
            <div class="gift-item" onclick="sendGift(100)">💎<br><small>100</small></div>
            <div class="gift-item" onclick="sendGift(500)">👑<br><small>500</small></div>
            <div class="gift-item" onclick="sendGift(1000)">🚀<br><small>1000</small></div>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <h3>Scan & Pay</h3>
        <div id="adminQRContainer" style="text-align: center; margin-top: 20px;">
            </div>
        <button class="btn-prime" onclick="closeModal('qrModal')">CLOSE</button>
    </div>

    <div id="adminDashboard">
        <h2 style="color:var(--gold);">MRGAJAN MASTER PANEL</h2>
        <div class="admin-stat-card">
            <h4>System Token Stock: <span id="masterStock">10,000,000</span></h4>
            <input type="email" id="tEmail" placeholder="User Gmail">
            <input type="number" id="tAmount" placeholder="Amount">
            <button class="btn-prime" style="background:var(--gold); color:#000;" onclick="adminTransfer()">DISTRIBUTE TOKENS</button>
        </div>
        <div class="admin-stat-card">
            <h4>Gallery QR Control</h4>
            <input type="file" accept="image/*" onchange="adminUploadQR(this)">
        </div>
        <div class="admin-stat-card" id="allPostList">
            <h4>Video Management (Delete Anytime)</h4>
            </div>
        <button class="btn-prime" style="background:#333;" onclick="closeAdmin()">LOGOUT ADMIN</button>
    </div>

    <div class="navbar">
        <div class="nav-link active" onclick="showScreen('homeScreen', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-link" onclick="alert('Search Open')"><i class="fas fa-search"></i>Search</div>
        <div class="nav-link" onclick="handleUpload()"><div class="upload-center">+</div></div>
        <div class="nav-item nav-link" onclick="alert('Inbox Open')"><i class="fas fa-comment-dots"></i>Inbox</div>
        <div class="nav-link" onclick="showScreen('profileScreen', this)"><i class="fas fa-user"></i>Profile</div>
    </div>

    <script>
        // --- 13. TECH STACK (FIREBASE CONFIG) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 1. LOGIN / SIGNUP SYSTEM ---
        function googleAuth() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(async (user) => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if(!doc.exists) {
                    await userRef.set({ name: user.displayName, email: user.email, photo: user.photoURL, tokens: 0, uid: user.uid });
                }
                syncProfile(user.uid);
                loadFeed();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
            }
        });

        async function syncProfile(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                const data = doc.data();
                document.getElementById('displayUName').innerText = data.name;
                document.getElementById('displayUEmail').innerText = data.email;
                document.getElementById('myAvatar').src = data.photo;
                document.getElementById('walletBal').innerText = data.tokens.toLocaleString();
            });
        }

        // --- 4. VIDEO SYSTEM (UPLOAD & FEED) ---
        async function handleUpload() {
            let input = document.createElement('input');
            input.type = 'file'; input.accept = 'video/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                alert("Processing 2027 Optimization... Please Wait.");
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');
                
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", { method: 'POST', body: formData });
                const d = await res.json();
                
                const u = auth.currentUser;
                await db.collection('posts').add({
                    url: d.secure_url, uid: u.uid, name: u.displayName, photo: u.photoURL,
                    email: u.email, likes: 0, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("CONGRATULATIONS! Video is LIVE."); loadFeed();
            };
            input.click();
        }

        async function loadFeed() {
            const cont = document.getElementById('feedScroll');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="video-post">
                        <video loop playsinline src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="action-bar">
                            <div class="profile-btn"><img src="${d.photo}"></div>
                            <div class="icon-unit" onclick="likePost('${doc.id}')"><i class="fas fa-heart"></i><span>${d.likes}</span></div>
                            <div class="icon-unit" onclick="document.getElementById('giftModal').style.bottom='0'"><i class="fas fa-gift" style="color:var(--gold)"></i><span>Gift</span></div>
                            <div class="icon-unit" onclick="alert('Gmail: ${d.email}')"><i class="fas fa-share"></i><span>Share</span></div>
                        </div>
                        <div style="position:absolute; bottom:85px; left:15px; text-shadow:2px 2px 10px #000;">
                            <h3>@${d.name}</h3>
                            <p style="font-size:12px; opacity:0.7;">${d.email}</p>
                        </div>
                    </div>`;
            });
            const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold: 0.8});
            document.querySelectorAll('video').forEach(v => obs.observe(v));
        }

        // --- 11. ADMIN PANEL (MASTER ACCESS) ---
        let taps = 0;
        function adminTaps() {
            taps++; if(taps >= 5) {
                let p = prompt("MASTER ADMIN KEY:");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminDashboard').style.display = 'block';
                    loadAdminPosts();
                }
                taps = 0;
            }
        }

        async function loadAdminPosts() {
            const list = document.getElementById('allPostList');
            const snap = await db.collection('posts').get();
            list.innerHTML = "<h4>Manage Viral Feed</h4>";
            snap.forEach(doc => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; background:#222; padding:10px; margin-top:5px; border-radius:10px;">
                    <span>@${doc.data().name}</span>
                    <button class="del-post-btn" onclick="adminDelete('${doc.id}')">DELETE</button>
                </div>`;
            });
        }

        async function adminDelete(id) {
            if(confirm("Delete this video forever?")) {
                await db.collection('posts').doc(id).delete();
                loadAdminPosts();
                alert("Video Hata di gayi hai!");
            }
        }

        // --- 10. PROFILE SYSTEM (GALLERY PHOTO) ---
        async function changeProfilePhoto() {
            let i = document.createElement('input'); i.type='file'; i.accept='image/*';
            i.onchange = async (e) => {
                const f = e.target.files[0];
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'ml_default');
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", {method:'POST', body:fd});
                const d = await res.json();
                await db.collection('users').doc(auth.currentUser.uid).update({ photo: d.secure_url });
                alert("Profile Photo Updated!");
            }; i.click();
        }

        // --- UI UTILS ---
        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
