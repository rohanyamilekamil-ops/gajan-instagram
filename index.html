<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan App</title>
    <style>
        body { margin:0; font-family: sans-serif; background:#fafafa; }
        .header { position:sticky; top:0; background:#fff; border-bottom:1px solid #dbdbdb; padding:10px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
        .token-btn { background:#000; color:#fff; padding:5px 15px; border-radius:20px; cursor:pointer; font-weight:bold; }
        .profile { text-align:center; padding:20px; background:#fff; border-bottom:1px solid #dbdbdb; }
        .dp { width:100px; height:100px; border-radius:50%; border:2px solid #E1306C; object-fit:cover; }
        .nav { position:fixed; bottom:0; width:100%; background:#fff; border-top:1px solid #dbdbdb; display:flex; justify-content:space-around; padding:15px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color:#E1306C;">GAJAN</h2>
        <div class="token-btn" onclick="openRecharge()">🪙 <span id="balance">0</span></div>
    </div>
    <div class="profile">
        <label for="dp-input"><img id="user-dp" src="https://via.placeholder.com/100" class="dp"></label>
        <input type="file" id="dp-input" hidden onchange="updateDP(event)">
        <h3 style="margin-top:10px;">@Gajan_User</h3>
        <p style="color:#888; font-size:12px;">Tap photo to change</p>
    </div>
    <div id="feed" style="text-align:center; padding:50px; color:#999;">Abhi koi video nahi hai.</div>
    <div class="nav">
        <span>🏠</span><span>➕</span><span>🎬</span><span>👤</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
