<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Standard Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .insta-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 2px solid #000; color: #000 !important; }
    </style>
</head>
<body class="bg-white text-black font-sans">

    <div id="login-section" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-8 bg-[#0a0a0a]">
        <div class="w-full max-w-sm space-y-6 text-center">
            <h1 class="text-4xl font-bold italic text-white mb-10">Gajan</h1>
            <input type="text" placeholder="Phone number, username, or email" class="w-full p-3 bg-[#121212] border border-gray-800 rounded-md text-white outline-none focus:border-gray-600">
            <input type="password" placeholder="Password" class="w-full p-3 bg-[#121212] border border-gray-800 rounded-md text-white outline-none focus:border-gray-600">
            <button onclick="loginSuccess()" class="w-full py-3 bg-[#0095f6] text-white font-bold rounded-lg hover:bg-blue-600">Log In</button>
            <div class="flex items-center space-x-2 py-4">
                <div class="h-[1px] bg-gray-800 flex-1"></div>
                <span class="text-gray-500 text-xs">OR</span>
                <div class="h-[1px] bg-gray-800 flex-1"></div>
            </div>
            <button class="text-[#0095f6] font-bold text-sm"><i class="fa-brands fa-facebook mr-2"></i>Log in with Facebook</button>
        </div>
        <div class="absolute bottom-10 text-gray-500 text-sm">
            Don't have an account? <span class="text-[#0095f6] font-bold">Sign Up</span>
        </div>
    </div>

    <div id="main-app" class="hidden pb-20">
        
        <header class="p-4 border-b">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center space-x-2">
                    <span class="font-bold text-xl">mrgajan_</span>
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                </div>
                <div class="flex space-x-6">
                    <i class="fa-solid fa-plus-square text-2xl"></i>
                    <i class="fa-solid fa-bars text-2xl"></i>
                </div>
            </div>

            <div class="flex items-center space-x-8 px-2">
                <div class="relative">
                    <img src="https://via.placeholder.com/150" class="w-20 h-20 rounded-full border p-1 border-gray-200">
                    <div class="absolute bottom-0 right-0 bg-blue-500 text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-white text-[10px]">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                </div>
                <div class="flex-1 flex justify-around text-center">
                    <div><p class="font-bold">11</p><p class="text-xs">Posts</p></div>
                    <div><p class="font-bold">191</p><p class="text-xs">Followers</p></div>
                    <div><p class="font-bold">120</p><p class="text-xs">Following</p></div>
                </div>
            </div>
            <div class="mt-4 px-2">
                <p class="font-bold text-sm">jamnagar</p>
                <p class="text-sm text-gray-600">ey/mer/cos/co</p>
            </div>
            <div class="flex space-x-2 mt-4">
                <button class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-sm">Edit profile</button>
                <button class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-sm">Share profile</button>
            </div>
        </header>

        <div class="flex border-b">
            <button class="flex-1 py-3 text-xl active-tab"><i class="fa-solid fa-table-cells"></i></button>
            <button class="flex-1 py-3 text-xl text-gray-400"><i class="fa-solid fa-clapperboard"></i></button>
            <button class="flex-1 py-3 text-xl text-gray-400"><i class="fa-solid fa-user-tag"></i></button>
        </div>

        <div class="grid grid-cols-3 gap-0.5 mt-0.5">
            <div class="aspect-square bg-gray-200 relative">
                <img src="https://picsum.photos/300/300?random=1" class="w-full h-full object-cover">
                <i class="fa-solid fa-play absolute top-2 right-2 text-white text-xs"></i>
            </div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/300/300?random=2" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/300/300?random=3" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/300/300?random=4" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/300/300?random=5" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/300/300?random=6" class="w-full h-full object-cover"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-3 z-50">
        <i class="fa-solid fa-house text-2xl"></i>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <i class="fa-solid fa-clapperboard text-2xl text-gray-400"></i>
        <i class="fa-solid fa-wallet text-2xl text-pink-600"></i>
        <div class="w-7 h-7 bg-gray-300 rounded-full border border-black"></div>
    </nav>

    <script>
        function loginSuccess() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
        }
    </script>
</body>
</html>
