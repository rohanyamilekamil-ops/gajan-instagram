<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Modern Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .gajan-logo { font-family: 'Grand Hotel', cursive; font-size: 5rem; color: white; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); }
        /* Attractive Core Background */
        .attractive-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }
        .hidden { display: none; }
    </style>
</head>
<body class="attractive-bg text-white h-screen overflow-hidden">

    <div id="auth-section" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6">
        <h1 class="gajan-logo mb-6">Gajan</h1>

        <div id="login-card" class="glass-card w-full max-w-sm p-8 space-y-6">
            <h2 class="text-xl font-semibold text-center">Welcome Back</h2>
            <input id="login-email" type="email" placeholder="Email address" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none focus:border-white">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none focus:border-white">
            <button onclick="handleLogin()" class="w-full py-3 bg-white text-indigo-600 font-bold rounded-xl shadow-lg hover:bg-opacity-90 transition">Log In</button>
            <p class="text-center text-sm">Don't have an account? <button onclick="toggleAuth()" class="font-bold underline">Sign Up</button></p>
        </div>

        <div id="signup-card" class="glass-card w-full max-w-sm p-8 space-y-4 hidden">
            <h2 class="text-xl font-semibold text-center">Create Account</h2>
            <input id="reg-name" type="text" placeholder="Full Name" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none focus:border-white">
            <input id="reg-email" type="email" placeholder="Email address" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none focus:border-white">
            <input id="reg-password" type="password" placeholder="Create Password" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none focus:border-white">
            <button onclick="handleSignup()" class="w-full py-3 bg-indigo-500 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-600 transition">Create Account</button>
            <p class="text-center text-sm">Already have an account? <button onclick="toggleAuth()" class="font-bold underline">Log In</button></p>
        </div>
    </div>

    <div id="main-app" class="hidden h-screen bg-white text-black overflow-y-auto">
        <header class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-50">
            <h1 class="text-3xl font-bold italic" style="font-family: 'Grand Hotel';">Gajan</h1>
            <button onclick="logout()" class="text-red-500 text-sm font-bold">Logout</button>
        </header>
        <div class="p-4 text-center">
            <p class="mt-20 text-gray-500">Welcome to Gajan Dashboard!</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Toggle Login/Signup
        window.toggleAuth = () => {
            document.getElementById('login-card').classList.toggle('hidden');
            document.getElementById('signup-card').classList.toggle('hidden');
        };

        // Handle Signup
        window.handleSignup = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Account Created! Welcome to Gajan.");
            } catch (err) { alert(err.message); }
        };

        // Handle Login
        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) { alert("Invalid Credentials!"); }
        };

        // Handle Logout
        window.logout = () => signOut(auth);

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
