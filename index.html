<!DOCTYPE html>
<html>
<head>
  <title>Gajan TikTok</title>
  <style>
    body { margin:0; font-family:sans-serif; background:black; color:white;}
    video { width:100%; height:100vh; object-fit:cover;}
    .btn { position:fixed; right:10px; top:50%; }
    button { display:block; margin:10px; padding:10px;}
  </style>
</head>
<body>

<h2 id="user"></h2>

<input type="file" id="videoUpload">
<button onclick="uploadVideo()">Upload</button>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY",
  authDomain: "PASTE",
  projectId: "PASTE",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
auth.signInAnonymously().then(() => {
  document.getElementById("user").innerText = "User Logged In";
  loadVideos();
});

// UPLOAD
async function uploadVideo() {
  let file = document.getElementById("videoUpload").files[0];

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "unsigned_preset");

  let res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload", {
    method: "POST",
    body: formData
  });

  let data = await res.json();

  await db.collection("videos").add({
    url: data.secure_url,
    likes: 0
  });

  alert("Uploaded!");
  loadVideos();
}

// LOAD VIDEOS
async function loadVideos() {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  let snap = await db.collection("videos").get();

  snap.forEach(doc => {
    let v = doc.data();

    let video = document.createElement("video");
    video.src = v.url;
    video.controls = true;

    let likeBtn = document.createElement("button");
    likeBtn.innerText = "❤️ " + v.likes;

    likeBtn.onclick = async () => {
      await db.collection("videos").doc(doc.id).update({
        likes: v.likes + 1
      });
      loadVideos();
    };

    feed.appendChild(video);
    feed.appendChild(likeBtn);
  });
}
</script>

</body>
</html>
