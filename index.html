<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Official Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #ffffff; }
        .gajan-logo { font-family: 'Grand Hotel', cursive; font-size: 2.8rem; }
        .attractive-bg { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); background-attachment: fixed; }
        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 30px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 2px solid #000; color: #000 !important; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body class="no-scrollbar">

    <div id="auth-section" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6 attractive-bg">
        <h1 class="text-white text-8xl gajan-logo mb-10 shadow-xl">Gajan</h1>
        
        <div id="login-card" class="glass-card w-full max-w-sm p-10 space-y-6">
            <input id="login-email" type="email" placeholder="Email" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white placeholder-white/70">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white placeholder-white/70">
            <button onclick="handleLogin()" class="w-full py-4 bg-white text-pink-600 font-bold rounded-2xl shadow-2xl hover:scale-105 transition">Log In</button>
            <p class="text-center text-sm text-white">Naya account banayein? <button onclick="toggleAuth()" class="font-bold underline">Sign Up</button></p>
        </div>

        <div id="signup-card" class="glass-card w-full max-w-sm p-10 space-y-4 hidden">
            <input id="reg-name" type="text" placeholder="Full Name" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white">
            <input id="reg-email" type="email" placeholder="Email Address" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white">
            <input id="reg-password" type="password" placeholder="Create Password" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white">
            <button onclick="handleSignup()" class="w-full py-4 bg-pink-500 text-white font-bold rounded-2xl shadow-2xl hover:scale-105 transition">Sign Up</button>
            <p class="text-center text-sm text-white">Pahle se account hai? <button onclick="toggleAuth()" class="font-bold underline">Log In</button></p>
        </div>
    </div>

    <div id="main-app" class="hidden h-screen overflow-y-auto no-scrollbar bg-white">
        
        <header class="flex justify-between items-center px-5 py-3 border-b sticky top-0 bg-white z-50">
            <h1 class="gajan-logo text-black">Gajan</h1>
            <div class="flex space-x-6 items-center">
                <i class="fa-regular fa-square-plus text-2xl cursor-pointer" onclick="document.getElementById('post-upload').click()"></i>
                <a href="messenger.html"><i class="fa-brands fa-facebook-messenger text-2xl"></i></a>
                <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase tracking-tighter">Logout</button>
            </div>
        </header>

        <input type="file" id="profile-upload" class="hidden" accept="image/*">
        <input type="file" id="post-upload" class="hidden" accept="image/*,video/*">

        <div class="p-5">
            <div class="flex items-center space-x-10 mb-6">
                <div class="relative cursor-pointer group" onclick="document.getElementById('profile-upload').click()">
                    <img id="user-avatar" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full border-4 border-pink-500 p-1 object-cover">
                    <div class="absolute inset-0 bg-black/20 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-camera text-white"></i></div>
                </div>
                <div class="flex-1 flex justify-around text-center">
                    <div><p class="font-bold text-lg">11</p><p class="text-[10px] text-gray-400 font-bold">POSTS</p></div>
                    <div><p class="font-bold text-lg">191</p><p class="text-[10px] text-gray-400 font-bold">FOLLOWERS</p></div>
                    <div><p class="font-bold text-lg">120</p><p class="text-[10px] text-gray-400 font-bold">FOLLOWING</p></div>
                </div>
            </div>
            <div class="mb-5 px-1">
                <p id="display-name" class="font-bold text-base">Gajan User</p>
                <p class="text-sm text-gray-600">Standard Core Gajan Edition ❤️ Jamnagar</p>
            </div>
            <div class="flex space-x-3">
                <button class="flex-1 bg-gray-100 py-2.5 rounded-xl font-bold text-xs border border-gray-200">Edit profile</button>
                <a href="wallet.html" class="flex-1 bg-gray-100 py-2.5 rounded-xl font-bold text-xs text-pink-600 border border-gray-200 text-center flex items-center justify-center"><i class="fa-solid fa-wallet mr-2"></i>Wallet</a>
            </div>
        </div>

        <div class="flex border-t mt-4 sticky top-14 bg-white z-40">
            <button class="flex-1 py-4 text-2xl active-tab text-black"><i class="fa-solid fa-table-cells"></i></button>
            <a href="reels.html" class="flex-1 py-4 text-2xl text-gray-300 text-center"><i class="fa-solid fa-clapperboard"></i></a>
            <button class="flex-1 py-4 text-2xl text-gray-300"><i class="fa-solid fa-user-tag"></i></button>
        </div>
        
        <div class="grid grid-cols-3 gap-0.5 pb-24" id="posts-grid">
            <img src="https://picsum.photos/400/400?random=101" class="aspect-square w-full object-cover">
            <img src="https://picsum.photos/400/400?random=102" class="aspect-square w-full object-cover">
            <img src="https://picsum.photos/400/400?random=103" class="aspect-square w-full object-cover">
            <img src="https://picsum.photos/400/400?random=104" class="aspect-square w-full object-cover">
            <img src="https://picsum.photos/400/400?random=105" class="aspect-square w-full object-cover">
            <img src="https://picsum.photos/400/400?random=106" class="aspect-square w-full object-cover">
        </div>

        <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-4 z-[60] shadow-2xl">
            <a href="index.html"><i class="fa-solid fa-house text-2xl text-black"></i></a>
            <i class="fa-solid fa-magnifying-glass text-2xl text-gray-300"></i>
            <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-300"></i></a>
            <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-500"></i></a>
            <div class="w-8 h-8 bg-indigo-600 rounded-full border border-black flex items-center justify-center text-[10px] text-white font-bold">G</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH LOGIC ---
        window.toggleAuth = () => {
            document.getElementById('login-card').classList.toggle('hidden');
            document.getElementById('signup-card').classList.toggle('hidden');
        };

        window.handleSignup = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                await setDoc(doc(db, "users", res.user.uid), { name, email, tokens: 0, photoURL: "" });
                location.reload();
            } catch (err) { alert(err.message); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (err) { alert("Invalid credentials!"); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-name').innerText = user.displayName || "Gajan User";
                if(user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // --- CLOUDINARY ENGINE ---
        const CLOUD_NAME = "dvfgzrxs7";
        const UPLOAD_PRESET = "gajan_uploads";

        document.getElementById('profile-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                const data = await res.json();
                await updateDoc(doc(db, "users", auth.currentUser.uid), { photoURL: data.secure_url });
                await updateProfile(auth.currentUser, { photoURL: data.secure_url });
                document.getElementById('user-avatar').src = data.secure_url;
                alert("Profile Photo Updated!");
            } catch (err) { alert("Upload failed!"); }
        };

        document.getElementById('post-upload').onchange = async (e) => {
            const file = e.target.files[0];
            alert("Uploading post to Gajan Feed...");
            // Yaha aap post upload ka logic add kar sakte hain
        };
    </script>
</body>
</html>
