<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan TikTok</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Full Screen Video Feed */
        .video-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .video-post { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar Buttons */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .icon { width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .icon:active { transform: scale(0.9); }

        /* Navigation Bars */
        .top-nav { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 10; }
        
        .token-btn { color: #ffd700; font-weight: bold; font-size: 18px; cursor: pointer; }
        .upload-btn { background: #fff; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border-radius: 20px; width: 85%; z-index: 100; border: 1px solid #E1306C; text-align: center; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; margin: 15px auto; display: block; width: 150px; height: 150px; }
        .btn-main { background: #E1306C; color: #fff; padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="token-btn" onclick="openModal('shopModal')">💎 <span id="tokenDisplay">Loading...</span></div>
        <div id="userInfo" onclick="gmailLogin()">Login</div>
    </div>

    <div class="video-container" id="videoFeed">
        <div class="video-post">
            <video loop onclick="this.paused?this.play():this.pause()" autoplay muted playsinline>
                <source src="https://v.redd.it/9zivqf5p8zb81/DASH_720.mp4" type="video/mp4">
            </video>
            <div class="side-bar">
                <div class="icon">❤️</div>
                <div class="icon">💬</div>
                <div class="icon" onclick="openModal('shopModal')">🎁</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <span>🏠</span>
        <span>🔍</span>
        <div class="upload-btn" onclick="alert('Upgrade to Firebase Storage for Uploads')">+</div>
        <span>💬</span>
        <span>👤</span>
    </div>

    <div id="shopModal" class="modal">
        <h3>Gajan Token Shop</h3>
        <div id="qrcode"></div>
        <p id="upiText" style="margin-bottom:10px; font-size:14px;">Loading UPI...</p>
        <button class="btn-main" onclick="closeModal('shopModal')">Close</button>
        <button onclick="adminEntry()" style="background:none; border:none; color:#444; font-size:10px; margin-top:10px;">Admin</button>
    </div>

    <div id="adminModal" class="modal">
        <h3>Update Shop Info</h3>
        <input type="text" id="upiInput" style="width:100%; padding:10px; margin:10px 0;" placeholder="Enter UPI ID">
        <button class="btn-main" onclick="updateShop()">Save Settings</button>
        <button class="btn-main" style="background:#333;" onclick="closeModal('adminModal')">Cancel</button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAs-Aapki-Real-Key", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.appspot.com",
            messagingSenderId: "765432109876",
            appId: "1:765432109876:web:example"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 1. Gmail Login
        function gmailLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                document.getElementById('userInfo').innerText = res.user.displayName;
            }).catch(err => alert("Login Error: " + err.message));
        }

        // 2. Real-time Shop Data (admin_data/stock_info)
        db.collection("admin_data").doc("stock_info").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('tokenDisplay').innerText = (data.total_tokens || 0) + " GJN";
                const upi = data.qr_link || "gajan@upi";
                document.getElementById('upiText').innerText = "Pay to: " + upi;
                
                // QR Generator
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: `upi://pay?pa=${upi}&pn=Gajan&cu=INR`,
                    width: 150, height: 150
                });
            }
        });

        // 3. Admin Update Function
        async function updateShop() {
            const newUpi = document.getElementById('upiInput').value;
            if(!newUpi) return;
            try {
                await db.collection("admin_data").doc("stock_info").update({ qr_link: newUpi });
                alert("Updated!"); closeModal('adminModal');
            } catch(e) { alert(e.message); }
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function adminEntry() {
            if(prompt("Password:") === "Abdul6353738585@") openModal('adminModal');
        }
    </script>
</body>
</html>
