<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan TikTok | V9 Underground</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #fe2c55; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        /* --- WATERMARK --- */
        .watermark { position: absolute; top: 20px; left: 20px; font-weight: 900; font-size: 18px; color: rgba(255,255,255,0.4); z-index: 100; pointer-events: none; text-shadow: 0 0 10px var(--neon); }

        /* --- SCREENS --- */
        .screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; overflow-y: auto; padding-bottom: 80px; }
        .active-screen { display: flex; }

        /* --- FEED --- */
        #homeFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; background: #000; }
        .post { position: relative; height: 100vh; width: 100vw; scroll-snap-align: start; }
        video, .post-img { width: 100%; height: 100%; object-fit: cover; }

        /* --- SIDEBAR --- */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .gold-dice { width: 55px; height: 55px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #ffd700, #fff, #ffd700); box-shadow: 0 0 15px var(--gold); }
        .gold-dice img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- NAVIGATION --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #888; font-size: 11px; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; margin-bottom: 2px; display: block; }
        .plus-btn { background: #fff; color: #000; padding: 4px 16px; border-radius: 10px; font-weight: bold; font-size: 22px; }

        /* --- MODALS --- */
        .modal { position: fixed; bottom: -100%; width: 100%; background: #111; border-radius: 20px 20px 0 0; z-index: 3000; transition: 0.3s; padding: 20px; }
        input, .btn-action { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; }
        input { background: #222; color: #fff; }
        .btn-action { background: var(--neon); color: #fff; font-weight: bold; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); color: red; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="homeScreen" class="screen active-screen">
        <div id="homeFeed"></div>
    </div>

    <div id="discoverScreen" class="screen">
        <div style="padding: 20px; text-align: center;"><h2>Discover Viral Trends</h2></div>
    </div>

    <div id="inboxScreen" class="screen">
        <div style="padding: 20px; border-bottom: 0.5px solid #222;"><h3>Messages</h3></div>
        <div style="text-align: center; margin-top: 100px; color: gray;">No new notifications</div>
    </div>

    <div id="meScreen" class="screen">
        <div style="text-align: center; padding: 40px 20px;">
            <div onclick="adminTrigger()" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto; overflow: hidden;">
                <img id="myPic" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h3 id="myName" style="margin-top: 10px;">User</h3>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                <div><b id="myTokens">0</b><br><small>Tokens</small></div>
                <button onclick="openBuyTokens()" style="background:var(--gold); border:none; padding:5px 15px; border-radius:5px; font-size:12px; font-weight:bold;">BUY TOKENS</button>
            </div>
        </div>
        <div class="grid" id="myGrid"></div>
    </div>

    <div id="adminPanel" style="display:none; position:fixed; inset:0; background:#050505; z-index:9999; padding:20px;">
        <h2>MRGAJAN ADMIN</h2>
        <div style="background:#111; padding:15px; border-radius:10px; margin:20px 0;">
            <p>Master Stock: <b id="masterStock">10,000,000</b></p>
            <input type="email" id="targetEmail" placeholder="User Email">
            <input type="number" id="tokenAmt" placeholder="Amount">
            <button class="btn-action" style="background:var(--gold); color:#000;" onclick="adminTransfer()">TRANSFER</button>
        </div>
        <button onclick="this.parentElement.style.display='none'" class="btn-action">EXIT ADMIN</button>
    </div>

    <div id="giftModal" class="modal">
        <h3>Send Gift</h3>
        <input type="number" id="giftAmount" placeholder="Enter Amount (1 - 100)" min="1" max="100">
        <button class="btn-action" onclick="sendGajanGift()">SEND TO CREATOR</button>
        <button onclick="this.parentElement.style.bottom='-100%'" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Cancel</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('homeScreen', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showScreen('discoverScreen', this)"><i class="fas fa-search"></i>Discover</div>
        <div class="plus-btn" onclick="alert('Upload Open')">+</div>
        <div class="nav-item" onclick="showScreen('inboxScreen', this)"><i class="fas fa-comment-dots"></i>Inbox</div>
        <div class="nav-item" onclick="showScreen('meScreen', this)"><i class="fas fa-user"></i>Me</div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- NAVIGATION LOGIC ---
        function showScreen(screenId, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            if(screenId === 'meScreen') loadMyProfile();
            if(screenId === 'homeScreen') loadFeed();
        }

        // --- UNDERGROUND ADMIN TRIGGER ---
        let clickCount = 0;
        function adminTrigger() {
            clickCount++;
            if(clickCount >= 5) {
                let p = prompt("Master Password?");
                if(p === "Abdul6353738585@") {
                    document.getElementById('adminPanel').style.display = 'block';
                    initAdminStock();
                }
                clickCount = 0;
            }
        }

        // --- GIFT & TOKENS ---
        let targetCreatorUid = '';
        function openGift(uid) {
            targetCreatorUid = uid;
            document.getElementById('giftModal').style.bottom = '0';
        }

        async function sendGajanGift() {
            const amt = parseInt(document.getElementById('giftAmount').value);
            const user = auth.currentUser;
            if(amt < 1 || amt > 100) return alert("Limit: 1 to 100");

            const userRef = db.collection('users').doc(user.uid);
            const creatorRef = db.collection('users').doc(targetCreatorUid);

            const doc = await userRef.get();
            if(doc.data().tokens < amt) return alert("Balance low! Buy Tokens first.");

            await db.runTransaction(async (t) => {
                t.update(userRef, { tokens: firebase.firestore.FieldValue.increment(-amt) });
                t.update(creatorRef, { tokens: firebase.firestore.FieldValue.increment(amt) });
            });
            alert("Gift Sent Successfully!");
            document.getElementById('giftModal').style.bottom = '-100%';
        }

        // --- DELETE POST ---
        async function deletePost(id) {
            if(confirm("Delete this post?")) {
                await db.collection('posts').doc(id).delete();
                loadMyProfile();
            }
        }

        // --- LOAD FEED & PROFILE ---
        async function loadFeed() {
            const feed = document.getElementById('homeFeed');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').get();
            feed.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isVideo = d.type === 'video';
                feed.innerHTML += `
                    <div class="post">
                        <div class="watermark">GAJAN</div>
                        ${isVideo ? `<video loop src="${d.url}" onclick="this.paused?this.play():this.pause()"></video>` : `<img src="${d.url}" class="post-img">`}
                        <div class="sidebar">
                            <div class="gold-dice"><img src="${d.userPic}"></div>
                            <div onclick="openGift('${d.uid}')"><i class="fas fa-gift" style="color:var(--gold)"></i></div>
                            <div><i class="fas fa-heart"></i><b>${d.likes || 0}</b></div>
                            <div><i class="fas fa-share"></i></div>
                        </div>
                        <div style="position:absolute; bottom:80px; left:15px;"><b>@${d.userName}</b><p>${d.caption || ''}</p></div>
                    </div>`;
            });
        }

        async function loadMyProfile() {
            const grid = document.getElementById('myGrid');
            const user = auth.currentUser;
            const snap = await db.collection('posts').where('uid', '==', user.uid).get();
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `
                    <div class="grid-item">
                        ${d.type === 'video' ? `<video src="${d.url}"></video>` : `<img src="${d.url}">`}
                        <div class="del-btn" onclick="deletePost('${doc.id}')"><i class="fas fa-trash"></i></div>
                    </div>`;
            });
            const uDoc = await db.collection('users').doc(user.uid).get();
            document.getElementById('myTokens').innerText = uDoc.data().tokens || 0;
            document.getElementById('myPic').src = user.photoURL;
            document.getElementById('myName').innerText = user.displayName;
        }

        // --- AUTH ---
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).set({
                    email: user.email,
                    name: user.displayName,
                    tokens: firebase.firestore.FieldValue.increment(0)
                }, {merge: true});
                loadFeed();
            } else {
                auth.signInAnonymously(); // Auto login for guest
            }
        });

    </script>
</body>
</html>
