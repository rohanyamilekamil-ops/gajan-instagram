<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan Admin | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .g-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .btn-blue { background: #2563eb; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-green { background: #16a34a; width: 100%; padding: 10px; border-radius: 10px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        .btn-red { background: #dc2626; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-24">

    <h1 class="text-xl font-black italic mb-6 uppercase tracking-tighter">Gajan <span class="text-pink-600">Admin Panel</span></h1>

    <div class="g-card border-yellow-500/30 border-2">
        <h2 class="text-[10px] font-black text-yellow-500 mb-4 uppercase tracking-widest italic">
            <i class="fa-solid fa-clock-rotate-left mr-2"></i> Pending Login Requests
        </h2>
        <div class="overflow-x-auto max-h-[300px] overflow-y-auto">
            <table class="w-full text-left text-[11px]">
                <thead class="text-gray-500 uppercase border-b border-gray-800">
                    <tr>
                        <th class="pb-2">User Name</th>
                        <th class="pb-2">UID (Copy this)</th>
                        <th class="pb-2 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="request-list">
                    </tbody>
            </table>
        </div>
        <p id="no-req" class="text-center text-gray-600 text-[10px] mt-4 hidden">No pending requests.</p>
    </div>

    <div class="g-card border-green-600/30 border">
        <h2 class="text-[10px] font-bold text-green-500 mb-4 uppercase tracking-widest italic text-center">Manual Activation</h2>
        <input id="act-uid" type="text" placeholder="Paste UID here" class="w-full bg-black border border-gray-800 p-3 rounded-xl mb-3 outline-none text-xs text-green-400">
        <button id="activate-btn" class="btn-green w-full">Activate Account ✅</button>
    </div>

    <div class="g-card border-red-600/30 border">
        <h2 class="text-[10px] font-bold text-red-500 mb-4 uppercase tracking-widest italic text-center">Delete Video</h2>
        <input id="del-reel-id" type="text" placeholder="Enter Reel ID" class="w-full bg-black border border-gray-800 p-3 rounded-xl mb-2 outline-none text-xs text-red-400">
        <button id="delete-video-btn" class="btn-red w-full">Delete 🗑️</button>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="g-card text-center">
            <h2 class="text-[9px] text-gray-500 uppercase mb-2">Login QR</h2>
            <div class="w-full aspect-square bg-white rounded-lg mb-2 p-1">
                <img id="qr-prev" src="https://via.placeholder.com/150" class="w-full h-full object-contain">
            </div>
            <input type="file" id="qr-in" class="hidden">
            <button onclick="document.getElementById('qr-in').click()" class="text-[8px] text-blue-400 uppercase font-bold">Change</button>
            <button id="up-qr-btn" class="btn-blue mt-2">Save</button>
        </div>
        <div class="g-card text-center">
            <h2 class="text-[9px] text-gray-500 uppercase mb-2">Intro Video</h2>
            <div class="w-full aspect-square bg-black rounded-lg mb-2 overflow-hidden border border-gray-800">
                <video id="v-prev" class="w-full h-full object-cover"></video>
            </div>
            <input type="file" id="v-in" class="hidden">
            <button onclick="document.getElementById('v-in').click()" class="text-[8px] text-blue-400 uppercase font-bold">Change</button>
            <button id="up-v-btn" class="btn-blue mt-2">Save</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 📩 REAL-TIME REQUEST LIST 📩 ---
        const reqList = document.getElementById('request-list');
        const q = query(collection(db, "users"), where("subscription", "==", "pending"));

        onSnapshot(q, (snapshot) => {
            reqList.innerHTML = "";
            if (snapshot.empty) { document.getElementById('no-req').classList.remove('hidden'); }
            else {
                document.getElementById('no-req').classList.add('hidden');
                snapshot.forEach((userDoc) => {
                    const u = userDoc.data();
                    reqList.innerHTML += `
                        <tr class="border-b border-gray-900">
                            <td class="py-3 font-bold">${u.name || 'Unknown'}</td>
                            <td class="py-3 text-gray-500 font-mono">${u.uid}</td>
                            <td class="py-3 text-right">
                                <button onclick="quickActivate('${u.uid}')" class="bg-green-600 px-3 py-1 rounded-md text-[9px] font-black">APPROVE</button>
                            </td>
                        </tr>
                    `;
                });
            }
        });

        // Quick Approve Function
        window.quickActivate = async (uid) => {
            try {
                await updateDoc(doc(db, "users", uid), { subscription: "active" });
                alert("User Approved! Ab wo login kar sakta hai.");
            } catch (e) { alert("Error!"); }
        };

        // Baki purane functions...
        document.getElementById('activate-btn').onclick = async () => {
            const uid = document.getElementById('act-uid').value.trim();
            if(uid) await updateDoc(doc(db, "users", uid), { subscription: "active" });
            alert("Activated!");
        };

        document.getElementById('delete-video-btn').onclick = async () => {
            const rid = document.getElementById('del-reel-id').value.trim();
            if(rid && confirm("Delete Video?")) await deleteDoc(doc(db, "reels", rid));
            alert("Deleted!");
        };

        // QR/Video Logic (Cloudinary)
        let qrF, vF;
        const cUrl = "https://api.cloudinary.com/v1_1/dvfgzrxs7";
        const cPre = "gajan_live";

        document.getElementById('qr-in').onchange = (e) => { qrF = e.target.files[0]; if(qrF) document.getElementById('qr-prev').src = URL.createObjectURL(qrF); };
        document.getElementById('v-in').onchange = (e) => { vF = e.target.files[0]; if(vF) document.getElementById('v-prev').src = URL.createObjectURL(vF); };

        document.getElementById('up-qr-btn').onclick = async () => {
            const fd = new FormData(); fd.append('file', qrF); fd.append('upload_preset', cPre);
            const res = await fetch(`${cUrl}/image/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            await setDoc(doc(db, "app_settings", "payment_config"), { qr_url: data.secure_url }, { merge: true });
            alert("QR Saved!");
        };

        document.getElementById('up-v-btn').onclick = async () => {
            const fd = new FormData(); fd.append('file', vF); fd.append('upload_preset', cPre);
            const res = await fetch(`${cUrl}/video/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            await setDoc(doc(db, "app_settings", "video_config"), { intro_url: data.secure_url }, { merge: true });
            alert("Video Saved!");
        };
    </script>
</body>
</html>
