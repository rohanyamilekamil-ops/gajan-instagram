<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 flex flex-col items-center">

    <div id="admin-login" class="mt-20 w-full max-w-md bg-gray-900 p-8 rounded-[40px] shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-black mb-8 text-center text-pink-600 italic tracking-tighter">GAJAN ADMIN</h1>
        <input id="adm-user" type="text" placeholder="Username" class="w-full p-4 bg-gray-800 rounded-2xl mb-4 border border-gray-700">
        <input id="adm-pass" type="password" placeholder="Password" class="w-full p-4 bg-gray-800 rounded-2xl mb-6 border border-gray-700">
        <button onclick="checkAdmin()" class="w-full py-4 bg-pink-600 rounded-2xl font-black shadow-lg">LOGIN</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-6xl space-y-8 pb-20">
        <header class="flex justify-between items-center py-6 border-b border-gray-800">
            <h2 class="text-2xl font-black italic">CONTROL PANEL</h2>
            <button onclick="location.reload()" class="bg-red-600 text-[10px] px-6 py-2 rounded-full font-bold uppercase">Logout</button>
        </header>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-gray-900 p-6 rounded-[30px] border border-gray-800 shadow-xl">
                <h3 class="font-black text-blue-500 mb-4 uppercase text-xs">Payment QR Control</h3>
                <div class="space-y-4">
                    <div class="border border-gray-700 p-3 rounded-xl">
                        <p class="text-[9px] mb-2 font-bold opacity-50 uppercase">QR Code 1 (PhonePe)</p>
                        <input type="file" id="qr1-file" class="text-[10px] mb-2">
                        <button onclick="uploadQR(1)" class="w-full bg-blue-600 py-2 rounded-lg text-[10px] font-bold">UPLOAD / UPDATE</button>
                    </div>
                    <div class="border border-gray-700 p-3 rounded-xl">
                        <p class="text-[9px] mb-2 font-bold opacity-50 uppercase">QR Code 2 (GPay/Other)</p>
                        <input type="file" id="qr2-file" class="text-[10px] mb-2">
                        <button onclick="uploadQR(2)" class="w-full bg-blue-600 py-2 rounded-lg text-[10px] font-bold">UPLOAD / UPDATE</button>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-[30px] border border-gray-800 shadow-xl">
                <h3 class="font-black text-yellow-500 mb-4 uppercase text-xs">Token Generator</h3>
                <input id="target-uid" type="text" placeholder="Paste User UID" class="w-full p-3 bg-gray-800 rounded-xl mb-3 text-xs border border-gray-700">
                <input id="token-amt" type="number" placeholder="Amount" class="w-full p-3 bg-gray-800 rounded-xl mb-4 text-xs border border-gray-700">
                <button onclick="sendTokens()" class="w-full bg-yellow-600 py-3 rounded-xl font-black text-xs">ADD TOKENS</button>
            </div>

            <div class="bg-gray-900 p-6 rounded-[30px] border border-gray-800 shadow-xl">
                <h3 class="font-black text-red-500 mb-4 uppercase text-xs">Delete Reels</h3>
                <input id="del-vid-id" type="text" placeholder="Paste Video ID" class="w-full p-3 bg-gray-800 rounded-xl mb-4 text-xs border border-gray-700">
                <button onclick="deleteReel()" class="w-full bg-red-600 py-3 rounded-xl font-black text-xs uppercase">Delete Now</button>
            </div>
        </div>

        <div class="bg-gray-900 p-8 rounded-[40px] border border-gray-800 shadow-xl">
            <h3 class="font-black text-green-500 mb-6 uppercase text-sm italic">Pending Requests</h3>
            <div id="request-list" class="space-y-4">
                <p class="text-xs text-gray-600">Waiting...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc, increment, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkAdmin = () => {
            if(document.getElementById('adm-user').value === "MRGAJAN" && document.getElementById('adm-pass').value === "Abdul6353738585@") {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadRequests();
            } else { alert("Galat Password!"); }
        };

        // QR Photo Upload (Cloudinary connect)
        window.uploadQR = async (num) => {
            const file = document.getElementById(`qr${num}-file`).files[0];
            if(!file) return alert("Photo select karein!");

            const fd = new FormData();
            fd.append("file", file);
            fd.append("upload_preset", "gajan_live"); 

            try {
                const res = await fetch("https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload", { method: "POST", body: fd });
                const data = await res.json();
                
                await setDoc(doc(db, "admin", "settings"), { [`qr${num}Url`]: data.secure_url }, { merge: true });
                alert(`QR Code ${num} Uploaded Successfully!`);
            } catch(e) { alert("Upload Failed!"); }
        };

        // Video Delete System
        window.deleteReel = async () => {
            const vid = document.getElementById('del-vid-id').value;
            if(!vid) return alert("Video ID bhariye!");
            if(confirm("Kya aap sach mein ye video delete karna chahte hain?")) {
                await deleteDoc(doc(db, "reels", vid));
                alert("Video Deleted Permanently!");
            }
        };

        window.sendTokens = async () => {
            const uid = document.getElementById('target-uid').value;
            const amt = parseInt(document.getElementById('token-amt').value);
            await setDoc(doc(db, "wallets", uid), { balance: increment(amt) }, { merge: true });
            alert("Tokens Added!");
        };

        function loadRequests() {
            onSnapshot(query(collection(db, "paymentRequests"), where("status", "==", "pending")), (sn) => {
                const list = document.getElementById('request-list');
                list.innerHTML = "";
                sn.forEach(dDoc => {
                    const d = dDoc.data();
                    list.innerHTML += `
                        <div class="flex items-center justify-between bg-gray-800 p-5 rounded-[25px] border border-gray-700">
                            <div><p class="font-bold text-white text-sm">${d.userName}</p><p class="text-[9px] text-gray-500 uppercase">UID: ${d.uid}</p></div>
                            <button onclick="navigator.clipboard.writeText('${d.uid}');alert('Copied');" class="bg-blue-600 text-[10px] px-6 py-2 rounded-full font-black">COPY UID</button>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
