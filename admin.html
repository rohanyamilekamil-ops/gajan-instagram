<div class="bg-white p-6 rounded-3xl shadow-md mt-6">
    <h2 class="font-bold text-lg mb-4">User Activity Monitor</h2>
    <div id="userList" class="space-y-3">
        </div>
</div>

<script type="module">
    // ... imports ...
    // Fetch all users to see activity
    onSnapshot(collection(db, "users"), (sn) => {
        const list = document.getElementById('userList');
        list.innerHTML = "";
        sn.forEach(u => {
            const ud = u.data();
            list.innerHTML += `
                <div class="flex justify-between border-b pb-2">
                    <span>${ud.name}</span>
                    <span class="text-blue-500 font-mono text-xs">${ud.lastActive ? new Date(ud.lastActive).toDateString() : 'N/A'}</span>
                </div>`;
        });
    });

    // Video Delete function for Admin
    window.deleteVideo = async (rid) => {
        if(confirm("Bhai, pakka delete karna hai?")) {
            await deleteDoc(doc(db, "reels", rid));
            alert("Video Removed!");
        }
    }
</script>
