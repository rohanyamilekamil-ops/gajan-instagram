<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan Admin | Core Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .g-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; }
        .g-logo { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border-radius: 12px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-6">

    <header class="flex items-center gap-3 mb-10">
        <div class="g-logo shadow-[0_0_15px_rgba(220,39,67,0.5)]">
            <span class="text-white font-black italic text-2xl">G</span>
        </div>
        <h1 class="text-2xl font-black italic tracking-tighter">Gajan Admin <span class="text-xs text-red-500 uppercase">Core</span></h1>
    </header>

    <div class="g-card mb-6">
        <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-widest"><i class="fa-solid fa-paper-plane mr-2"></i> Direct Transfer</h2>
        <input id="target-uid" type="text" placeholder="User UID" class="w-full bg-black border border-gray-800 p-4 rounded-xl mb-3 outline-none focus:border-pink-600">
        <input id="token-amt" type="number" placeholder="Amount" class="w-full bg-black border border-gray-800 p-4 rounded-xl mb-4 outline-none">
        <button onclick="sendTokensNow()" class="w-full bg-gradient-to-r from-orange-500 to-pink-600 py-4 rounded-xl font-bold active:scale-95 transition">Release Tokens</button>
    </div>

    <div class="g-card">
        <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-widest"><i class="fa-solid fa-bell mr-2"></i> User Requests</h2>
        <div id="request-list" class="space-y-4 text-sm">
            <p class="text-gray-600 italic">Checking for requests...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🟢 Fetching Requests
        onSnapshot(collection(db, "token_requests"), (sn) => {
            const list = document.getElementById('request-list');
            list.innerHTML = "";
            if(sn.empty) list.innerHTML = "<p class='text-gray-500'>No pending requests.</p>";
            sn.forEach(d => {
                const req = d.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-black/50 p-4 rounded-xl border border-gray-900">
                        <div>
                            <p class="font-bold">@${req.name}</p>
                            <p class="text-[10px] text-gray-500 uppercase tracking-tighter">UID: ${req.uid}</p>
                        </div>
                        <button onclick="approveRequest('${d.id}', '${req.uid}', 100)" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Approve 100</button>
                    </div>`;
            });
        });

        // 🟢 Approve Logic
        window.approveRequest = async (docId, uid, amt) => {
            await updateDoc(doc(db, "wallets", uid), { balance: increment(amt) });
            await deleteDoc(doc(db, "token_requests", docId));
            alert("Tokens Approved!");
        };

        // 🟢 Direct Send Logic
        window.sendTokensNow = async () => {
            const uid = document.getElementById('target-uid').value;
            const amt = parseInt(document.getElementById('token-amt').value);
            if(!uid || !amt) return alert("Details bhariye!");
            await setDoc(doc(db, "wallets", uid), { balance: increment(amt) }, { merge: true });
            alert("Sent Successfully!");
        };
    </script>
</body>
</html>
