<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-bubble-me { background-color: #3797f0; color: white; border-radius: 18px 18px 4px 18px; }
        .chat-bubble-them { background-color: #efefef; color: black; border-radius: 18px 18px 18px 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black h-screen flex flex-col">

    <header class="flex items-center justify-between px-4 py-3 border-b sticky top-0 bg-white z-50">
        <div class="flex items-center space-x-4">
            <a href="index.html"><i class="fa-solid fa-arrow-left text-xl"></i></a>
            <div class="flex items-center space-x-2">
                <img src="https://via.placeholder.com/50" class="w-8 h-8 rounded-full">
                <span class="font-bold text-sm">Gajan_User</span>
            </div>
        </div>
        <div class="flex space-x-5">
            <i class="fa-solid fa-phone text-xl"></i>
            <i class="fa-solid fa-video text-xl"></i>
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
        <div class="flex justify-start">
            <div class="chat-bubble-them px-4 py-2 text-sm max-w-[70%]">
                Hello! Gajan app par aapka swagat hai.
            </div>
        </div>
        <div class="flex justify-end">
            <div class="chat-bubble-me px-4 py-2 text-sm max-w-[70%]">
                Shukriya! Ye bilkul Instagram jaisa hai.
            </div>
        </div>
    </main>

    <div class="p-4 border-t bg-white">
        <div class="flex items-center bg-gray-100 rounded-full px-4 py-2">
            <i class="fa-solid fa-camera mr-3 text-gray-500"></i>
            <input id="msg-input" type="text" placeholder="Message..." class="flex-1 bg-transparent outline-none text-sm">
            <button onclick="sendMessage()" class="text-blue-500 font-bold text-sm ml-2">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const CHAT_ID = "global_chat"; // Aap ise dynamic bana sakte hain

        // 1. Send Message
        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            if(input.value.trim() === "") return;

            await addDoc(collection(db, "chats", CHAT_ID, "messages"), {
                text: input.value,
                sender: "Me", // Isme logged-in user ki ID dalni hogi
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        // 2. Listen for Messages (Real-time)
        const q = query(collection(db, "chats", CHAT_ID, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML = "";
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isMe = msg.sender === "Me";
                chatWindow.innerHTML += `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="${isMe ? 'chat-bubble-me' : 'chat-bubble-them'} px-4 py-2 text-sm max-w-[70%]">
                            ${msg.text}
                        </div>
                    </div>
                `;
            });
            chatWindow.scrollTop = chatWindow.scrollHeight; // Auto scroll to bottom
        });
    </script>
</body>
</html>
