<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-bubble-me { background: #3797f0; color: white; border-radius: 18px 18px 4px 18px; }
        .chat-bubble-them { background: #efefef; color: black; border-radius: 18px 18px 18px 4px; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col">

    <header class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-50">
        <div class="flex items-center space-x-4">
            <a href="index.html"><i class="fa-solid fa-arrow-left text-xl text-black"></i></a>
            <div>
                <h2 class="font-bold text-sm">Gajan Global Chat</h2>
                <p class="text-[10px] text-green-500 font-bold">● Online</p>
            </div>
        </div>
        <i class="fa-solid fa-circle-info text-xl text-gray-400"></i>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
        </main>

    <footer class="p-4 border-t bg-white">
        <div class="flex items-center bg-gray-100 rounded-full px-4 py-2 border">
            <input id="msg-input" type="text" placeholder="Message..." class="flex-1 bg-transparent outline-none text-sm py-1">
            <button onclick="sendGajanMsg()" class="text-blue-500 font-bold text-sm ml-3">Send</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q",
            authDomain: "tiktok-clone-gajan.firebaseapp.com",
            projectId: "tiktok-clone-gajan",
            storageBucket: "tiktok-clone-gajan.firebasestorage.app",
            messagingSenderId: "838023307513",
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Send Message Logic
        window.sendGajanMsg = async () => {
            const input = document.getElementById('msg-input');
            const user = auth.currentUser;
            if(!user || input.value.trim() === "") return;

            await addDoc(collection(db, "global_messages"), {
                text: input.value,
                senderName: user.displayName || "Anonymous",
                senderUid: user.uid,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        // Live Chat Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const q = query(collection(db, "global_messages"), orderBy("timestamp", "asc"));
                onSnapshot(q, (snapshot) => {
                    const chatWindow = document.getElementById('chat-window');
                    chatWindow.innerHTML = "";
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const isMe = msg.senderUid === user.uid;
                        chatWindow.innerHTML += `
                            <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                                <div class="max-w-[75%]">
                                    <p class="text-[9px] text-gray-400 mb-0.5 ml-1">${msg.senderName}</p>
                                    <div class="${isMe ? 'chat-bubble-me' : 'chat-bubble-them'} px-4 py-2 text-sm shadow-sm">
                                        ${msg.text}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
