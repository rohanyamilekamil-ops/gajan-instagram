<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Profile Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        .g-gradient { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .grid-item { aspect-ratio: 1/1; position: relative; background: #eee; overflow: hidden; border: 0.5px solid #fff; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-white pb-20">

    <header class="flex justify-between items-center px-4 py-3 border-b sticky top-0 bg-white z-50">
        <h1 class="font-black text-2xl italic tracking-tighter" onclick="location.href='admin.html'">Gajan</h1>
        <div class="flex items-center space-x-6">
            <a href="upload.html"><i class="fa-regular fa-square-plus text-2xl"></i></a>
            <i class="fa-solid fa-bars text-2xl" onclick="alert('Menu system coming soon!')"></i>
        </div>
    </header>

    <div class="p-4">
        <div class="flex items-center space-x-8 mb-6">
            <div class="w-20 h-20 rounded-full p-[2px] g-gradient">
                <img id="my-avatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-2 border-white object-cover">
            </div>
            <div class="flex-1 flex justify-around text-center">
                <div><p class="font-bold text-base" id="p-count">0</p><p class="text-[10px] text-gray-400 font-bold uppercase">Posts</p></div>
                <div onclick="location.href='list.html'" class="cursor-pointer">
                    <p class="font-bold text-base" id="f-count">0</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Followers</p>
                </div>
                <div><p class="font-bold text-base" id="v-count">0</p><p class="text-[10px] text-gray-400 font-bold uppercase">Views</p></div>
            </div>
        </div>

        <h2 id="display-name" class="font-bold text-sm">@GajanUser</h2>
        <p class="text-[11px] text-gray-400">Jamnagar, Gujarat | Official Gajan 👑</p>
        
        <div class="flex mt-6 space-x-2">
            <button onclick="location.href='edit_profile.html'" class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-[11px] border">Edit Profile</button>
            <button onclick="location.href='send_tokens.html'" class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-[11px] border">Send Tokens</button>
        </div>
    </div>

    <div id="user-grid" class="grid grid-cols-3"></div>

    <nav class="fixed bottom-0 w-full h-[60px] bg-white border-t flex justify-around items-center z-50">
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-black"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-400"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-gray-400"></i></a>
        <div class="w-6 h-6 rounded-full bg-black"></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('display-name').innerText = "@" + (user.displayName || "GajanUser");
                if(user.photoURL) document.getElementById('my-avatar').src = user.photoURL;

                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        document.getElementById('f-count').innerText = s.data().followers?.length || 0;
                        document.getElementById('v-count').innerText = s.data().totalViews || 0;
                    }
                });

                const q = query(collection(db, "reels"), where("uid", "==", user.uid));
                onSnapshot(q, (sn) => {
                    const grid = document.getElementById('user-grid'); grid.innerHTML = "";
                    document.getElementById('p-count').innerText = sn.size;
                    sn.forEach(docSnap => {
                        grid.innerHTML += `<div class="grid-item"><video src="${docSnap.data().videoUrl}"></video></div>`;
                    });
                });
            } else { location.href = "index.html"; }
        });
    </script>
</body>
</html>
