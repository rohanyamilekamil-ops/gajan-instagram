<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; }
        .g-card { background: #111; border: 1px solid #222; border-radius: 20px; }
    </style>
</head>
<body class="pb-24">

    <div class="p-8 flex flex-col items-center">
        <div class="w-24 h-24 rounded-full border-2 border-pink-500 p-1 mb-4">
            <img id="pfp" src="https://via.placeholder.com/150" class="w-full h-full rounded-full object-cover">
        </div>
        <h2 id="name" class="text-xl font-bold">Loading...</h2>
        <p id="email" class="text-xs text-gray-500 mb-8 italic">Verified Member</p>

        <div class="g-card w-full max-w-sm p-6 text-center mb-8">
            <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-1">Your Tokens</p>
            <h3 id="tokens" class="text-4xl font-black text-yellow-500">0</h3>
        </div>

        <button id="logout-btn" class="w-full max-w-xs bg-zinc-800 py-4 rounded-xl font-bold text-xs uppercase tracking-widest active:scale-95">
            Log Out
        </button>
    </div>

    <nav class="fixed bottom-0 w-full h-[65px] bg-black border-t border-zinc-900 flex justify-around items-center">
        <a href="reels.html" class="p-4"><i class="fa-solid fa-house text-zinc-500"></i></a>
        <a href="wallet.html" class="p-4"><i class="fa-solid fa-wallet text-zinc-500"></i></a>
        <a href="profile.html" class="p-4"><i class="fa-solid fa-user text-white"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('name').innerText = user.displayName || "User";
                document.getElementById('email').innerText = user.email;
                if(user.photoURL) document.getElementById('pfp').src = user.photoURL;

                // Tokens Update
                onSnapshot(doc(db, "wallets", user.uid), (s) => {
                    if(s.exists()) document.getElementById('tokens').innerText = s.data().balance || 0;
                });
            } else {
                // Agar login nahi hai, tabhi bahar bhejo
                window.location.href = "index.html";
            }
        });

        // Logout logic
        document.getElementById('logout-btn').onclick = async () => {
            await signOut(auth);
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
