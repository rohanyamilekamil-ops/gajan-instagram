<script type="module">
    // ... (Firebase init same rahega) ...

    window.uploadReel = async () => {
        const videoFile = document.getElementById('reel-input').files[0];
        const btn = document.getElementById('upload-btn');
        if(!videoFile) return alert("Select video!");

        btn.innerText = "Optimizing & Uploading...";
        btn.disabled = true;

        const fd = new FormData();
        fd.append("file", videoFile);
        fd.append("upload_preset", "gajan_live");
        // AUTO COMPRESSION TAGS
        fd.append("quality", "auto"); 
        fd.append("fetch_format", "auto");

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/dvfgzrxs7/video/upload`, { method: "POST", body: fd });
            const data = await res.json();

            if(data.secure_url) {
                await addDoc(collection(db, "reels"), {
                    videoUrl: data.secure_url,
                    uid: auth.currentUser.uid,
                    time: serverTimestamp()
                });
                alert("✅ Uploaded!");
                location.reload();
            } else { alert("Error: Video too large for free plan."); }
        } catch (err) {
            alert("Network Error!");
        } finally {
            btn.innerText = "Upload Video";
            btn.disabled = false;
        }
    };
</script>
