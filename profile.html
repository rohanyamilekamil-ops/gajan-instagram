<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white pb-24">
    <header class="flex justify-between items-center px-5 py-3 border-b sticky top-0 bg-white z-50">
        <h1 class="font-bold italic text-2xl italic">Gajan</h1>
        <div class="flex space-x-6 items-center">
            <i class="fa-regular fa-square-plus text-2xl cursor-pointer" onclick="document.getElementById('post-upload').click()"></i>
            <a href="messenger.html"><i class="fa-brands fa-facebook-messenger text-2xl"></i></a>
            <i class="fa-solid fa-right-from-bracket text-red-500" onclick="logout()"></i>
        </div>
    </header>

    <div class="p-6">
        <div class="flex items-center space-x-8 mb-6">
            <div class="relative w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-yellow-400 to-fuchsia-600 cursor-pointer" onclick="document.getElementById('profile-upload').click()">
                <img id="avatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-4 border-white object-cover">
            </div>
            <div class="flex-1 flex justify-around text-center">
                <div><p class="font-bold text-lg">11</p><p class="text-[10px] text-gray-400 font-bold uppercase">Posts</p></div>
                <div><p class="font-bold text-lg">191</p><p class="text-[10px] text-gray-400 font-bold uppercase">Followers</p></div>
                <div><p class="font-bold text-lg">120</p><p class="text-[10px] text-gray-400 font-bold uppercase">Following</p></div>
            </div>
        </div>
        <p id="name" class="font-bold text-lg">Gajan User</p>
        <p class="text-sm text-gray-500 mb-5">Jamnagar • Official Gajan Edition ❤️</p>
        <div class="flex space-x-2">
            <button class="flex-1 bg-gray-100 py-2.5 rounded-xl font-bold text-xs border border-gray-200">Edit Profile</button>
            <a href="wallet.html" class="flex-1 bg-pink-50 text-pink-600 py-2.5 rounded-xl font-bold text-xs border border-pink-100 text-center">Wallet</a>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-4 z-50">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-black"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-300"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-300"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-500"></i></a>
        <a href="profile.html"><div class="w-7 h-7 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] text-white font-bold">G</div></a>
    </nav>

    <input type="file" id="profile-upload" class="hidden" accept="image/*">
    <input type="file" id="post-upload" class="hidden" accept="video/*,image/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, user => {
            if(!user) window.location.href = "index.html";
            else {
                document.getElementById('name').innerText = user.displayName || "Gajan User";
                if(user.photoURL) document.getElementById('avatar').src = user.photoURL;
            }
        });

        // Cloudinary Profile Upload
        document.getElementById('profile-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", "gajan_live");
            const res = await fetch(`https://api.cloudinary.com/v1_1/dvfgzrxs7/image/upload`, { method: "POST", body: fd });
            const data = await res.json();
            await updateProfile(auth.currentUser, { photoURL: data.secure_url });
            await updateDoc(doc(db, "users", auth.currentUser.uid), { photoURL: data.secure_url });
            location.reload();
        };

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
