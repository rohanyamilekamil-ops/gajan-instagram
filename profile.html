<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan Profile | Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // ✨ Pichle page ke loop ko todne ke liye
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>
</head>
<body class="bg-black text-white">

    <div id="app-content" class="max-w-sm mx-auto p-8 text-center">
        <div class="w-24 h-24 rounded-full border-4 border-pink-600 mx-auto mb-4 overflow-hidden shadow-lg">
            <img id="display-pfp" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
        </div>
        
        <h1 id="display-name" class="text-2xl font-black italic mb-1 text-pink-500">Gajan User</h1>
        <p id="display-email" class="text-[10px] text-zinc-500 mb-10 uppercase tracking-widest italic">Authenticating...</p>

        <div class="bg-zinc-900/50 rounded-3xl p-8 mb-10 border border-white/5">
            <p id="display-tokens" class="text-5xl font-black text-yellow-500 italic">0</p>
            <p class="text-[10px] uppercase tracking-[0.3em] text-zinc-500 mt-2 font-bold">G-Tokens</p>
        </div>

        <button id="btn-logout" class="w-full bg-red-600/20 text-red-600 py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] border border-red-600/30">
            Logout & Exit
        </button>
    </div>

    <nav class="fixed bottom-0 left-0 w-full h-[70px] bg-black/90 border-t border-white/5 flex justify-around items-center z-[9999] backdrop-blur-md">
        <a href="reels.html" class="p-4 text-zinc-600"><i class="fa-solid fa-house"></i></a>
        <a href="wallet.html" class="p-4 text-zinc-600"><i class="fa-solid fa-wallet"></i></a>
        <a href="profile.html" class="p-4 text-white text-xl"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('display-name').innerText = user.displayName || "Gajan User";
                document.getElementById('display-email').innerText = user.email;
                if(user.photoURL) document.getElementById('display-pfp').src = user.photoURL;

                // Tokens Real-time Sync
                onSnapshot(doc(db, "wallets", user.uid), (s) => {
                    if(s.exists()) {
                        document.getElementById('display-tokens').innerText = s.data().balance || 0;
                    }
                });
            } else {
                // Agar sach mein logout hai, tabhi index par bhejo
                window.location.replace("index.html");
            }
        });

        // Forced Logout
        document.getElementById('btn-logout').onclick = async () => {
            if(confirm("Bhai, Logout karna hai?")){
                await signOut(auth);
                localStorage.clear();
                sessionStorage.clear();
                window.location.replace("index.html");
            }
        };
    </script>
</body>
</html>
