<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan Insta | My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .g-gradient { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .stat-box { text-align: center; flex: 1; }
        .profile-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; }
    </style>
</head>
<body class="pb-24">

    <div class="p-8 flex flex-col items-center">
        <div class="relative mb-6">
            <div class="w-28 h-28 rounded-full p-1 g-gradient">
                <img id="user-pfp" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-4 border-black object-cover">
            </div>
            <label for="pfp-upload" class="absolute bottom-1 right-1 bg-white text-black w-8 h-8 rounded-full flex items-center justify-center shadow-lg cursor-pointer">
                <i class="fa-solid fa-camera text-xs"></i>
            </label>
            <input type="file" id="pfp-upload" class="hidden" accept="image/*">
        </div>

        <h2 id="user-name" class="text-2xl font-black italic tracking-tighter mb-1">Loading...</h2>
        <p id="user-email" class="text-[10px] text-gray-500 uppercase tracking-widest mb-8">verifying account...</p>

        <div class="profile-card w-full max-w-sm flex justify-around py-6 mb-8">
            <div class="stat-box">
                <p id="count-followers" class="font-black text-xl">0</p>
                <p class="text-[8px] text-gray-500 uppercase font-bold tracking-tighter">Followers</p>
            </div>
            <div class="stat-box border-x border-white/5">
                <p id="count-following" class="font-black text-xl">0</p>
                <p class="text-[8px] text-gray-500 uppercase font-bold tracking-tighter">Following</p>
            </div>
            <div class="stat-box">
                <p id="count-tokens" class="font-black text-xl text-yellow-500">0</p>
                <p class="text-[8px] text-gray-500 uppercase font-bold tracking-tighter">G-Tokens</p>
            </div>
        </div>

        <button id="logout-btn" class="w-full max-w-xs bg-red-600/10 border border-red-600/20 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] active:scale-95 transition-all">
            Logout & Clear Session
        </button>
    </div>

    <nav class="fixed bottom-0 w-full h-[70px] bg-black/90 backdrop-blur-lg border-t border-white/5 flex justify-around items-center z-[100]">
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-gray-500"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-500"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-gray-500"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user text-xl text-white"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // UI Data Update
                document.getElementById('user-name').innerText = user.displayName || "Gajan User";
                document.getElementById('user-email').innerText = user.email;
                if(user.photoURL) document.getElementById('user-pfp').src = user.photoURL;

                // Real-time Follower Sync
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('count-followers').innerText = d.followers ? d.followers.length : 0;
                        document.getElementById('count-following').innerText = d.following ? d.following.length : 0;
                    }
                });

                // Real-time Token Sync
                onSnapshot(doc(db, "wallets", user.uid), (s) => {
                    if(s.exists()) document.getElementById('count-tokens').innerText = s.data().balance || 0;
                });

            } else {
                // Agar user logged out hai toh direct login page
                window.location.href = "index.html";
            }
        });

        // ✨ Super Logout Function ✨
        document.getElementById('logout-btn').onclick = async () => {
            if(confirm("Bhai, Logout karna hai?")){
                try {
                    await signOut(auth); // Firebase SignOut
                    // Browser memory clear karna taaki bypass session na rahe
                    localStorage.clear();
                    sessionStorage.clear();
                    
                    window.location.replace("index.html"); // History clear karke redirect
                } catch (e) {
                    alert("Error logging out: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
