<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        .g-gradient { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        #crop-modal { display: none; position: fixed; inset: 0; background: black; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body class="bg-white pb-24">

    <div id="crop-modal" class="p-4 items-center justify-center">
        <div class="w-full h-3/4 flex items-center justify-center overflow-hidden">
            <img id="image-to-crop" class="max-w-full block">
        </div>
        <div class="flex space-x-4 mt-6">
            <button onclick="closeCrop()" class="bg-gray-700 text-white px-8 py-3 rounded-2xl font-bold">Cancel</button>
            <button onclick="saveCroppedPhoto()" class="bg-pink-600 text-white px-8 py-3 rounded-2xl font-bold">Set Photo</button>
        </div>
    </div>

    <header class="flex justify-between items-center px-5 py-3 border-b sticky top-0 bg-white z-50">
        <h1 class="font-bold italic text-2xl tracking-tighter">Gajan</h1>
        <div class="flex space-x-6 items-center">
            <a href="upload.html"><i class="fa-regular fa-square-plus text-2xl text-black"></i></a>
            <i class="fa-solid fa-right-from-bracket text-red-500 text-xl cursor-pointer" id="logout-btn"></i>
        </div>
    </header>

    <div class="p-6">
        <div class="flex items-center space-x-8 mb-6">
            <div class="relative group">
                <div class="w-24 h-24 rounded-full p-1 g-gradient cursor-pointer" onclick="document.getElementById('photo-input').click()">
                    <img id="avatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-4 border-white object-cover">
                </div>
                <div class="absolute bottom-0 right-0 bg-black text-white p-1.5 rounded-full border-2 border-white"><i class="fa-solid fa-camera text-xs"></i></div>
                <input type="file" id="photo-input" class="hidden" accept="image/*" onchange="startCropping(this)">
            </div>
            <div class="flex-1 flex justify-around text-center">
                <div><p class="font-bold text-lg" id="p-count">0</p><p class="text-[10px] text-gray-400 font-bold uppercase">Posts</p></div>
                <div><p class="font-bold text-lg">1.2M</p><p class="text-[10px] text-gray-400 font-bold uppercase">Followers</p></div>
                <div><p class="font-bold text-lg">500</p><p class="text-[10px] text-gray-400 font-bold uppercase">Following</p></div>
            </div>
        </div>

        <h2 id="u-name" class="font-bold text-lg cursor-pointer select-none mb-1" onclick="openGajanAdmin()">@GajanUser</h2>
        <p class="text-xs text-gray-500 mb-5 font-bold tracking-tight">Jamnagar, Gujarat | Official Gajan App 👑</p>
        
        <div class="flex space-x-2">
            <button onclick="document.getElementById('photo-input').click()" class="flex-1 bg-gray-100 py-2 rounded-xl font-bold text-[11px] border">Change Photo</button>
            <a href="wallet.html" class="flex-1 bg-pink-50 text-pink-600 py-2 rounded-xl font-bold text-[11px] border text-center flex items-center justify-center">
                <i class="fa-solid fa-wallet mr-2"></i>My Wallet
            </a>
        </div>
    </div>

    <div id="video-grid" class="grid grid-cols-3 gap-0.5 border-t mt-4"></div>

    <nav class="fixed bottom-0 w-full h-[75px] bg-white border-t flex justify-around items-center z-50">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-black"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-300"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-300"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-500"></i></a>
        <div class="w-8 h-8 rounded-full bg-black flex items-center justify-center text-[10px] text-white font-bold border-2 border-white">G</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let cropper;

        // 1. Photo Crop System
        window.startCropping = (input) => {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('image-to-crop');
                    img.src = e.target.result;
                    document.getElementById('crop-modal').style.display = 'flex';
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
                };
                reader.readAsDataURL(file);
            }
        };

        window.closeCrop = () => { document.getElementById('crop-modal').style.display = 'none'; };

        window.saveCroppedPhoto = () => {
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            const croppedUrl = canvas.toDataURL("image/jpeg");
            document.getElementById('avatar').src = croppedUrl;
            // Yahan hum user profile update kar sakte hain
            updateProfile(auth.currentUser, { photoURL: croppedUrl }).then(() => {
                alert("Profile Photo Updated!");
                closeCrop();
            });
        };

        // 2. Underground Admin Logic (5 Taps)
        let tapCount = 0;
        let lastTap = 0;
        window.openGajanAdmin = () => {
            const now = Date.now();
            if (now - lastTap > 1000) tapCount = 0;
            tapCount++;
            lastTap = now;
            if (tapCount === 5) {
                const pass = prompt("Enter Master Admin Password:");
                if (pass === "Abdul6353738585@") window.location.href = "admin.html";
                else { alert("Unauthorized!"); tapCount = 0; }
            }
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('u-name').innerText = "@" + (user.displayName || "GajanUser");
                if(user.photoURL) document.getElementById('avatar').src = user.photoURL;
                const q = query(collection(db, "reels"), where("uid", "==", user.uid));
                onSnapshot(q, (sn) => {
                    const grid = document.getElementById('video-grid'); grid.innerHTML = "";
                    document.getElementById('p-count').innerText = sn.size;
                    sn.forEach(doc => { grid.innerHTML += `<div class="aspect-[9/16] border-[0.5px] border-white"><video src="${doc.data().videoUrl}" class="w-full h-full object-cover"></video></div>`; });
                });
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('logout-btn').onclick = () => { signOut(auth).then(() => window.location.href = "index.html"); };
    </script>
</body>
</html>
