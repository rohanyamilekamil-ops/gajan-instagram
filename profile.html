<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white">
    <header class="flex items-center justify-between px-5 py-4 border-b">
        <i class="fa-solid fa-bars text-xl"></i>
        <h1 id="p-username" class="font-bold text-lg">Gajan User</h1>
        <i class="fa-solid fa-plus text-xl" onclick="location.href='upload.html'"></i>
    </header>

    <div class="p-6 flex items-center space-x-6">
        <img id="p-img" src="https://via.placeholder.com/150" class="w-20 h-20 rounded-full border p-1 object-cover">
        <div class="flex-1 flex justify-around text-center text-sm">
            <div><p class="font-bold">0</p><p class="text-gray-400">Posts</p></div>
            <div><p class="font-bold">1.2M</p><p class="text-gray-400">Followers</p></div>
            <div><p class="font-bold">50</p><p class="text-gray-400">Following</p></div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 text-2xl">
        <a href="index.html"><i class="fa-solid fa-house text-gray-400"></i></a>
        <a href="upload.html"><i class="fa-regular fa-square-plus text-gray-400"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-gray-400"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user text-black"></i></a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const app = initializeApp({ apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan" });
        const auth = getAuth(app);
        onAuthStateChanged(auth, (u) => {
            if(!u) location.href='login.html';
            else {
                document.getElementById('p-username').innerText = u.displayName || "User";
                if(u.photoURL) document.getElementById('p-img').src = u.photoURL;
            }
        });
    </script>
</body>
</html>
