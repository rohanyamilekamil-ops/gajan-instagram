<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Official Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-icon { color: black !important; }
    </style>
</head>
<body class="bg-white pb-20">

    <header class="flex items-center justify-between px-4 py-3 border-b sticky top-0 bg-white z-50">
        <button onclick="window.history.back()"><i class="fa-solid fa-chevron-left text-xl"></i></button>
        <h1 id="topUsername" class="font-bold text-lg text-center flex-1">Gajan</h1>
        <button onclick="alert('Settings coming soon!')"><i class="fa-solid fa-ellipsis-vertical text-xl"></i></button>
    </header>

    <main class="p-4">
        <div class="flex items-center space-x-8 mb-6">
            <div class="relative cursor-pointer">
                <img id="displayPic" src="https://via.placeholder.com/150" class="w-20 h-20 rounded-full border p-1 object-cover">
                <div class="absolute bottom-0 right-0 bg-blue-500 text-white rounded-full p-1 border-2 border-white">
                    <i class="fa-solid fa-plus text-[10px]"></i>
                </div>
            </div>
            
            <div class="flex space-x-8 text-center flex-1 justify-around">
                <div class="cursor-pointer">
                    <p class="font-bold">0</p>
                    <p class="text-sm text-gray-500">Posts</p>
                </div>
                <div class="cursor-pointer">
                    <p id="followerCount" class="font-bold">0</p>
                    <p class="text-sm text-gray-500">Followers</p>
                </div>
                <div class="cursor-pointer">
                    <p class="font-bold">0</p>
                    <p class="text-sm text-gray-500">Following</p>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <h2 id="profileName" class="font-bold text-sm">Gajan</h2>
            <p class="text-sm text-gray-600">Jamnagar, Gujarat | Official Gajan App 👑</p>
        </div>

        <div class="flex space-x-2 mb-6">
            <button id="editBtn" class="flex-1 bg-gray-100 py-2 rounded-lg font-semibold text-sm hover:bg-gray-200">Edit Profile</button>
            <button id="followBtn" class="flex-1 bg-blue-500 text-white py-2 rounded-lg font-semibold text-sm transition-all">Follow</button>
            <a href="wallet.html" class="bg-gray-100 px-4 py-2 rounded-lg flex items-center justify-center hover:bg-gray-200"><i class="fa-solid fa-wallet"></i></a>
        </div>
    </main>

    <div class="grid grid-cols-3 gap-1 px-1">
        <div class="aspect-square bg-gray-200 flex items-center justify-center"><i class="fa-solid fa-image text-gray-400"></i></div>
        <div class="aspect-square bg-gray-200 flex items-center justify-center"><i class="fa-solid fa-image text-gray-400"></i></div>
        <div class="aspect-square bg-gray-200 flex items-center justify-center"><i class="fa-solid fa-image text-gray-400"></i></div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 border-b pb-2 text-center">Edit Profile</h3>
            <label class="text-xs text-gray-500 mb-1 block">Full Name</label>
            <input id="newNameInput" type="text" class="w-full border p-2 rounded mb-4 outline-none focus:border-blue-500">
            <div class="flex space-x-3">
                <button id="cancelBtn" class="flex-1 bg-gray-100 py-2 rounded-lg font-semibold">Cancel</button>
                <button id="saveBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-semibold">Save</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 text-2xl z-50">
        <a href="index.html"><i class="fa-solid fa-house text-gray-400"></i></a>
        <a href="search.html"><i class="fa-solid fa-magnifying-glass text-gray-400"></i></a>
        <a href="create-post.html"><i class="fa-regular fa-square-plus text-gray-400"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-gray-400"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user active-icon"></i></a>
    </footer>

    <script>
        // Select Elements
        const followBtn = document.getElementById('followBtn');
        const followerCount = document.getElementById('followerCount');
        const editBtn = document.getElementById('editBtn');
        const editModal = document.getElementById('editModal');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const newNameInput = document.getElementById('newNameInput');
        const profileName = document.getElementById('profileName');
        const topUsername = document.getElementById('topUsername');

        // Follow Logic
        let isFollowing = false;
        let count = 0;

        followBtn.addEventListener('click', () => {
            if(!isFollowing) {
                isFollowing = true;
                count++;
                followBtn.innerText = "Following";
                followBtn.classList.remove('bg-blue-500', 'text-white');
                followBtn.classList.add('bg-gray-200', 'text-black');
            } else {
                isFollowing = false;
                count--;
                followBtn.innerText = "Follow";
                followBtn.classList.remove('bg-gray-200', 'text-black');
                followBtn.classList.add('bg-blue-500', 'text-white');
            }
            followerCount.innerText = count;
        });

        // Modal Logic
        editBtn.addEventListener('click', () => {
            editModal.classList.remove('hidden');
            newNameInput.value = profileName.innerText;
        });

        cancelBtn.addEventListener('click', () => {
            editModal.classList.add('hidden');
        });

        saveBtn.addEventListener('click', () => {
            const val = newNameInput.value.trim();
            if(val !== "") {
                profileName.innerText = val;
                topUsername.innerText = val;
                editModal.classList.add('hidden');
            }
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == editModal) {
                editModal.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
