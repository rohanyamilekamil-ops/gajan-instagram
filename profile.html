<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // ✨ FIX: User check ko thoda stable banaya hai
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            console.log("User detected:", user.email);
            
            // UI update start
            document.getElementById('user-name').innerText = user.displayName || "Gajan User";
            document.getElementById('user-email').innerText = user.email;
            if(user.photoURL) document.getElementById('user-pfp').src = user.photoURL;

            // Stats Sync
            const userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (s) => {
                if(s.exists()){
                    const d = s.data();
                    document.getElementById('count-followers').innerText = d.followers ? d.followers.length : 0;
                    document.getElementById('count-following').innerText = d.following ? d.following.length : 0;
                    // Agar name firestore mein hai toh wahan se lo
                    if(d.name) document.getElementById('user-name').innerText = d.name;
                }
            });

            // Wallet Sync
            onSnapshot(doc(db, "wallets", user.uid), (s) => {
                if(s.exists()) {
                    document.getElementById('count-tokens').innerText = s.data().balance || 0;
                }
            });

        } else {
            // Check karein ki kya user sach mein logout hua hai
            setTimeout(() => {
                if(!auth.currentUser) {
                    window.location.href = "index.html";
                }
            }, 2000); // 2 second ka gap diya hai taaki Firebase load ho sake
        }
    });

    // Logout Function
    document.getElementById('logout-btn').onclick = async () => {
        if(confirm("Logout karna hai?")){
            await signOut(auth);
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace("index.html");
        }
    };
</script>
