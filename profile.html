<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .insta-gradient { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        video { pointer-events: none; }
    </style>
</head>
<body class="bg-white pb-24">
    <header class="flex justify-between items-center px-5 py-3 border-b sticky top-0 bg-white z-50">
        <h1 class="font-bold italic text-2xl">Gajan</h1>
        <div class="flex space-x-6 items-center">
            <a href="upload.html"><i class="fa-regular fa-square-plus text-2xl text-black"></i></a>
            <a href="messenger.html"><i class="fa-brands fa-facebook-messenger text-2xl text-black"></i></a>
        </div>
    </header>

    <div class="p-6">
        <div class="flex items-center space-x-8 mb-6">
            <div class="relative w-24 h-24 rounded-full p-1 insta-gradient">
                <img id="avatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-4 border-white object-cover">
            </div>
            <div class="flex-1 flex justify-around text-center">
                <div id="post-count-box text-center">
                    <p class="font-bold text-lg" id="post-num">0</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Posts</p>
                </div>
                <div><p class="font-bold text-lg">191</p><p class="text-[10px] text-gray-400 font-bold uppercase">Followers</p></div>
                <div><p class="font-bold text-lg">120</p><p class="text-[10px] text-gray-400 font-bold uppercase">Following</p></div>
            </div>
        </div>
        <p id="name" class="font-bold text-lg text-black">Gajan User</p>
        <p class="text-sm text-gray-500 mb-5">Jamnagar, Gujarat ❤️</p>
        <div class="flex space-x-2">
            <button class="flex-1 bg-gray-100 py-2.5 rounded-xl font-bold text-xs border border-gray-200">Edit Profile</button>
            <a href="wallet.html" class="flex-1 bg-pink-50 text-pink-600 py-2.5 rounded-xl font-bold text-xs border text-center">Wallet</a>
        </div>
    </div>

    <div id="my-video-grid" class="grid grid-cols-3 gap-0.5 border-t pt-1">
        </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-4 z-50 shadow-lg">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-black"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-300"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-300"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-500"></i></a>
        <a href="profile.html"><div class="w-8 h-8 rounded-full bg-black flex items-center justify-center text-[10px] text-white font-bold">G</div></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, user => {
            if(!user) {
                window.location.href = "index.html";
            } else {
                document.getElementById('name').innerText = user.displayName || "Gajan User";
                if(user.photoURL) document.getElementById('avatar').src = user.photoURL;

                // Load ONLY My Videos
                const q = query(
                    collection(db, "reels"), 
                    where("uid", "==", user.uid)
                );

                onSnapshot(q, (sn) => {
                    const grid = document.getElementById('my-video-grid');
                    grid.innerHTML = "";
                    document.getElementById('post-num').innerText = sn.size;
                    
                    if(sn.empty) {
                        grid.innerHTML = `<div class="col-span-3 text-center py-20 text-gray-400 text-xs">No videos yet. Upload your first reel!</div>`;
                    }

                    sn.forEach(doc => {
                        const data = doc.data();
                        grid.innerHTML += `
                            <div class="aspect-[9/16] bg-gray-100 relative overflow-hidden">
                                <video src="${data.videoUrl}" class="w-full h-full object-cover"></video>
                                <div class="absolute bottom-1 left-1 text-[8px] text-white bg-black/20 px-1 rounded">
                                    <i class="fa-solid fa-play"></i>
                                </div>
                            </div>`;
                    });
                });
            }
        });
    </script>
</body>
</html>
