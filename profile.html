<script type="module">
    // ... config same rahega ...
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            console.log("No user found, redirecting to login...");
            window.location.href = 'login.html';
            return;
        }
        
        try {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            // Agar database mein user ka document nahi hai toh bana do
            if (!snap.exists()) {
                await setDoc(userRef, { tokens: 0, followers: [], posts: 0, name: user.displayName || "User" });
            }
            
            const data = snap.data() || { tokens: 0, followers: [] };
            document.getElementById('fullName').innerText = user.displayName || "Gajan User";
            document.getElementById('userImg').src = user.photoURL || "https://via.placeholder.com/150";
            document.getElementById('tokenCount').innerText = data.tokens || 0;
            document.getElementById('followerCount').innerText = data.followers?.length || 0;
        } catch (error) {
            console.error("Data fetch error:", error);
        }
    });
</script>
