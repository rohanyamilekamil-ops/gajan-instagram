<div class="flex-1 flex justify-around text-center">
    <div>
        <p class="font-bold text-base" id="post-count">0</p>
        <p class="text-[10px] text-gray-400 font-bold uppercase">Posts</p>
    </div>
    <div>
        <p class="font-bold text-base" id="follower-count">0</p>
        <p class="text-[10px] text-gray-400 font-bold uppercase">Followers</p>
    </div>
    <div>
        <p class="font-bold text-base" id="following-count">0</p>
        <p class="text-[10px] text-gray-400 font-bold uppercase">Following</p>
    </div>
</div>

<script type="module">
    // Profile load hone par followers count nikalne ka logic
    onAuthStateChanged(auth, user => {
        if(user) {
            // User ka apna data (Followers/Following) load karna
            onSnapshot(doc(db, "users", user.uid), (doc) => {
                if(doc.exists()){
                    const data = doc.data();
                    document.getElementById('follower-count').innerText = data.followers ? data.followers.length : 0;
                    document.getElementById('following-count').innerText = data.following ? data.following.length : 0;
                }
            });
            // ... baki post loading logic
        }
    });
</script>
