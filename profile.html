<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fff; margin:0; }
        .insta-gradient { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .nav-icon { font-size: 24px; color: #ccc; transition: 0.3s; }
        .nav-active { color: #000; }
    </style>
</head>
<body class="pb-24">

    <header class="flex justify-between items-center px-5 py-3 border-b sticky top-0 bg-white z-[100]">
        <h1 class="font-bold italic text-2xl tracking-tighter">Gajan</h1>
        <div class="flex space-x-6 items-center">
            <a href="upload.html"><i class="fa-regular fa-square-plus text-2xl text-black"></i></a>
            <a href="messenger.html"><i class="fa-brands fa-facebook-messenger text-2xl text-black"></i></a>
            <button onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket text-red-500 text-xl"></i></button>
        </div>
    </header>

    <div id="profile-content" class="p-6">
        <div class="flex items-center space-x-8 mb-6">
            <div class="relative w-24 h-24 rounded-full p-1 insta-gradient shadow-lg">
                <img id="avatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-4 border-white object-cover">
            </div>
            <div class="flex-1 flex justify-around text-center">
                <div><p class="font-bold text-lg" id="post-num">0</p><p class="text-[10px] text-gray-400 font-bold">POSTS</p></div>
                <div><p class="font-bold text-lg">191</p><p class="text-[10px] text-gray-400 font-bold">FOLLOWERS</p></div>
                <div><p class="font-bold text-lg">120</p><p class="text-[10px] text-gray-400 font-bold">FOLLOWING</p></div>
            </div>
        </div>
        
        <div class="mb-6">
            <h2 id="name" class="font-bold text-lg">Loading...</h2>
            <p class="text-sm text-gray-500">Jamnagar, Gujarat ❤️</p>
        </div>

        <div class="flex space-x-2">
            <button class="flex-1 bg-gray-100 py-2 rounded-xl font-bold text-xs border">Edit Profile</button>
            <a href="wallet.html" class="flex-1 bg-pink-50 text-pink-600 py-2 rounded-xl font-bold text-xs border text-center">Wallet</a>
        </div>
    </div>

    <div id="grid-container" class="grid grid-cols-3 gap-0.5 border-t pt-1">
        </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-4 z-[100]">
        <a href="profile.html"><i class="fa-solid fa-house nav-icon nav-active"></i></a>
        <i class="fa-solid fa-magnifying-glass nav-icon"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard nav-icon"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet nav-icon text-pink-500"></i></a>
        <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center text-[10px] font-bold border-2 border-white">G</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Security: Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in
                document.getElementById('name').innerText = user.displayName || "Gajan User";
                if(user.photoURL) document.getElementById('avatar').src = user.photoURL;

                // Real-time Grid Load
                const q = query(collection(db, "reels"), where("uid", "==", user.uid));
                onSnapshot(q, (snapshot) => {
                    const grid = document.getElementById('grid-container');
                    grid.innerHTML = "";
                    document.getElementById('post-num').innerText = snapshot.size;
                    
                    if(snapshot.empty) {
                        grid.innerHTML = `<div class="col-span-3 text-center py-20 text-gray-300 text-xs italic">No Posts Yet</div>`;
                    }

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        grid.innerHTML += `
                            <div class="aspect-[9/16] bg-gray-100 overflow-hidden relative">
                                <video src="${data.videoUrl}" class="w-full h-full object-cover"></video>
                                <div class="absolute inset-0 bg-black/10"></div>
                            </div>`;
                    });
                });
            } else {
                // User is logged out, send to login page immediately
                window.location.replace("index.html");
            }
        });

        // Logout Cleanly
        window.handleLogout = () => {
            signOut(auth).then(() => {
                window.location.replace("index.html");
            }).catch((error) => {
                alert("Logout Failed: " + error.message);
            });
        };
    </script>
</body>
</html>
