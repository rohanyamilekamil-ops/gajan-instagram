<div class="flex-1 flex justify-around text-center">
    <div><p class="font-bold text-sm" id="post-count">0</p><p class="text-[10px] text-gray-500">Posts</p></div>
    <div><p class="font-bold text-sm" id="follower-count">0</p><p class="text-[10px] text-gray-500">Followers</p></div>
    <div><p class="font-bold text-sm" id="total-views-count">0</p><p class="text-[10px] text-gray-500">Total Views</p></div>
</div>

<script type="module">
    // Profile loading logic mein ye add karein
    onAuthStateChanged(auth, user => {
        if(user) {
            // Real-time listener for user stats
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    // 🔐 Safe display of total views
                    document.getElementById('total-views-count').innerText = data.totalViews || 0;
                    document.getElementById('follower-count').innerText = data.followers ? data.followers.length : 0;
                }
            });
        }
    });
</script>
