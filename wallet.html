<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Wallet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-24">
    <header class="p-6 flex items-center justify-between bg-white shadow-sm sticky top-0 z-50">
        <h1 class="font-bold text-xl tracking-tighter italic">Gajan Wallet</h1>
        <a href="profile.html"><i class="fa-solid fa-xmark text-2xl text-gray-400"></i></a>
    </header>

    <div class="m-6 p-8 rounded-[40px] bg-gradient-to-br from-pink-600 to-purple-800 text-white shadow-2xl">
        <p class="text-[10px] font-bold uppercase opacity-70 tracking-widest">Available Balance</p>
        <div class="flex items-center mt-2">
            <i class="fa-solid fa-coins text-3xl mr-3 text-yellow-400"></i>
            <h2 id="my-balance" class="text-5xl font-black">0</h2>
        </div>
        <p class="mt-6 text-[9px] font-bold opacity-50">MY UID: <span id="u-id-txt" class="select-all text-white font-black">Loading...</span></p>
    </div>

    <div class="mx-6 p-8 bg-white rounded-[40px] border shadow-sm text-center">
        <h3 class="font-bold text-lg">Buy Tokens</h3>
        <p class="text-[10px] text-gray-400 mb-6 uppercase">Scan QR & Upload Screenshot</p>
        
        <img id="admin-qr" src="https://via.placeholder.com/300?text=Scan+QR" class="w-52 h-52 mx-auto rounded-3xl mb-6 border-4 border-gray-50 p-2">

        <div class="mb-6 p-4 border-2 border-dashed border-gray-200 rounded-2xl cursor-pointer bg-gray-50" onclick="document.getElementById('receipt-input').click()">
            <p id="receipt-status" class="text-[10px] font-bold text-gray-400 uppercase">Tap to Select Screenshot</p>
            <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="previewReceipt(this)">
        </div>

        <button id="submit-pay-btn" onclick="sendProofToAdmin()" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition">Submit Request</button>
    </div>

    <nav class="fixed bottom-0 w-full h-[75px] bg-white border-t flex justify-around items-center z-50">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-300"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-300"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        window.previewReceipt = (input) => {
            if (input.files[0]) {
                document.getElementById('receipt-status').innerText = "✅ PHOTO READY";
                document.getElementById('receipt-status').style.color = "green";
            }
        };

        window.sendProofToAdmin = async () => {
            const file = document.getElementById('receipt-input').files[0];
            if (!file) return alert("Pehle screenshot select karein!");
            
            const btn = document.getElementById('submit-pay-btn');
            btn.disabled = true;
            document.getElementById('receipt-status').innerText = "SENDING TO ADMIN...";

            try {
                await addDoc(collection(db, "paymentRequests"), {
                    uid: currentUser.uid,
                    userName: currentUser.displayName || "Gajan User",
                    time: serverTimestamp(),
                    status: "pending"
                });
                alert("✅ Request Sent! Admin will approve soon.");
                location.reload();
            } catch (e) { alert("Error! Try again."); btn.disabled = false; }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('u-id-txt').innerText = user.uid;
                onSnapshot(doc(db, "wallets", user.uid), (d) => {
                    if(d.exists()) document.getElementById('my-balance').innerText = d.data().balance;
                });
                onSnapshot(doc(db, "admin", "settings"), (d) => {
                    if(d.exists()) document.getElementById('admin-qr').src = d.data().qrUrl;
                });
            }
        });
    </script>
</body>
</html>
