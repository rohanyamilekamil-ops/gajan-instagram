<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan Wallet | Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; }
        .g-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .g-logo-box { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border-radius: 14px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .token-glow { filter: drop-shadow(0 0 10px rgba(220, 39, 67, 0.6)); }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-24">

    <header class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="g-logo-box shadow-lg">
                <span class="text-white font-black italic text-2xl">G</span>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter">Gajan Wallet</h1>
        </div>
        <i class="fa-solid fa-clock-rotate-left text-xl text-gray-400"></i>
    </header>

    <main class="p-6 flex-1">
        <div class="g-glass p-8 text-center mb-8">
            <p class="text-gray-400 text-xs uppercase tracking-widest mb-2 font-bold">Total Balance</p>
            <div class="flex items-center justify-center gap-3">
                <i class="fa-solid fa-coins text-yellow-400 text-3xl token-glow"></i>
                <h2 id="token-balance" class="text-5xl font-black italic tracking-tighter">0</h2>
            </div>
            <p class="text-[10px] text-pink-500 mt-4 font-bold uppercase tracking-tighter">Gajan Insta Core Tokens</p>
        </div>

        <div class="g-glass p-6 text-center border-dashed border-pink-500/30">
            <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-paper-plane text-pink-500"></i>
            </div>
            <h3 class="font-bold text-sm mb-1">Kam pad gaye?</h3>
            <p class="text-gray-500 text-[10px] mb-6">Admin se request karein, 100 tokens turant milenge.</p>
            <button onclick="requestFromAdmin()" id="req-btn" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all shadow-xl">
                Request 100 Tokens
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full h-[70px] bg-black/80 backdrop-blur-lg border-t border-white/5 flex justify-around items-center z-50">
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-gray-500"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-500"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-white"></i></a>
        <div onclick="location.href='profile.html'" class="w-7 h-7 rounded-full bg-white/20 border border-white/10"></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                // Real-time Balance Update 💸
                onSnapshot(doc(db, "wallets", user.uid), (snap) => {
                    if(snap.exists()) {
                        document.getElementById('token-balance').innerText = snap.data().balance || 0;
                    }
                });
            } else { location.href = "index.html"; }
        });

        window.requestFromAdmin = async () => {
            const btn = document.getElementById('req-btn');
            btn.innerText = "Sending Request...";
            btn.disabled = true;

            try {
                const user = auth.currentUser;
                // 🟢 Admin ke liye request bhejna
                await setDoc(doc(db, "token_requests", user.uid), {
                    uid: user.uid,
                    name: user.displayName || "Gajan User",
                    time: serverTimestamp(),
                    status: "pending"
                });
                alert("👑 Request Sent! Admin jald hi approve karenge.");
                btn.innerText = "Request Sent ✅";
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Try Again";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
