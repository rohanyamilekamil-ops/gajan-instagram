<div class="mt-10 p-6 g-card text-center">
    <div class="g-logo mx-auto mb-4">
        <span class="text-white font-black italic text-xl">G</span>
    </div>
    <p class="text-gray-400 text-xs mb-4">Kam pad gaye? Admin se request karein.</p>
    <button onclick="requestFromAdmin()" class="bg-white text-black px-8 py-3 rounded-full font-bold text-sm active:scale-90 transition">Request 100 Tokens</button>
</div>

<script type="module">
    // Script ke andar ye function add karein
    window.requestFromAdmin = async () => {
        const { getFirestore, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        const db = getFirestore();
        const auth = getAuth();
        
        await setDoc(doc(db, "token_requests", auth.currentUser.uid), {
            uid: auth.currentUser.uid,
            name: auth.currentUser.displayName || "User",
            time: new Date()
        });
        alert("Request Sent to Admin! 👑");
    };
</script>
