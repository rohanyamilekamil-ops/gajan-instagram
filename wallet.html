<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan Wallet | Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .g-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .g-logo-box { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .qr-frame { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 0 20px rgba(220, 39, 67, 0.3); }
        .g-gradient { background: linear-gradient(to right, #f09433, #dc2743, #bc1888); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="g-logo-box"><span class="text-white font-black italic text-xl">G</span></div>
            <h1 class="text-xl font-black italic tracking-tighter">Gajan Wallet</h1>
        </div>
    </header>

    <main class="p-6 space-y-6">
        <div class="g-glass p-8 text-center relative overflow-hidden">
            <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mb-2">Synced Balance</p>
            <div class="flex items-center justify-center gap-3 mb-6">
                <i class="fa-solid fa-coins text-yellow-400 text-2xl"></i>
                <h2 id="token-balance" class="text-5xl font-black italic tracking-tighter">0</h2>
            </div>
            
            <button onclick="location.href='withdraw.html'" class="border border-pink-500/50 text-pink-500 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                <i class="fa-solid fa-money-bill-transfer mr-2"></i> Withdraw Money
            </button>
        </div>

        <div class="g-glass p-6 text-center">
            <h3 class="text-xs font-bold text-pink-500 mb-5 uppercase tracking-widest">Recharge Tokens</h3>
            <div class="qr-frame inline-block mb-4">
                <img id="qr-display" src="https://via.placeholder.com/200?text=Waiting+for+Admin+QR" class="w-44 h-44 object-contain">
            </div>
            <p class="text-[10px] text-gray-400 mb-6 font-medium">Scan QR & Pay. Admin verify karke tokens bhej denge.</p>
            <button id="req-btn" class="w-full g-gradient text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all shadow-lg">
                I have Paid (Request Tokens)
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full h-[65px] bg-black/90 border-t border-white/5 flex justify-around items-center z-50">
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-gray-500"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-400"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-white"></i></a>
        <img id="nav-pfp" onclick="location.href='profile.html'" src="https://via.placeholder.com/30" class="w-7 h-7 rounded-full border border-white/10">
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                if(user.photoURL) document.getElementById('nav-pfp').src = user.photoURL;
                // 🔐 Sync Balance
                onSnapshot(doc(db, "wallets", user.uid), (s) => {
                    if(s.exists()) document.getElementById('token-balance').innerText = s.data().balance || 0;
                });
                // 📸 Sync QR Photo from Admin
                onSnapshot(doc(db, "app_settings", "payment_config"), (s) => {
                    if(s.exists() && s.data().qr_url) document.getElementById('qr-display').src = s.data().qr_url;
                });
            } else { location.href = "index.html"; }
        });

        document.getElementById('req-btn').onclick = async () => {
            const btn = document.getElementById('req-btn');
            btn.innerText = "Syncing..."; btn.disabled = true;
            try {
                await setDoc(doc(db, "token_requests", auth.currentUser.uid), {
                    uid: auth.currentUser.uid,
                    name: auth.currentUser.displayName || "User",
                    time: serverTimestamp()
                });
                alert("Request Sent! Admin verify karenge.");
                btn.innerText = "Request Sent ✅";
            } catch (e) {
                alert("Error!");
                btn.innerText = "I have Paid (Request Tokens)";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
