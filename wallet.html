<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-md mx-auto h-screen bg-white shadow-xl flex flex-col">
        <header class="p-4 border-b flex items-center space-x-4">
            <a href="index.html"><i class="fa-solid fa-arrow-left text-xl"></i></a>
            <h1 class="text-xl font-bold">Gajan Pay</h1>
        </header>

        <div class="p-6 text-center">
            <div class="bg-gradient-to-r from-pink-500 to-indigo-600 p-8 rounded-3xl text-white shadow-lg mb-6">
                <p class="text-sm opacity-80 uppercase tracking-widest">Available Balance</p>
                <h2 class="text-5xl font-bold mt-2"><span id="balance">0</span> <span class="text-xl">Tokens</span></h2>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="bg-indigo-100 text-indigo-700 p-4 rounded-2xl font-bold" onclick="alert('Scan QR Coming Soon')">
                    <i class="fa-solid fa-qrcode block text-2xl mb-1"></i> Scan & Send
                </button>
                <button class="bg-pink-100 text-pink-700 p-4 rounded-2xl font-bold">
                    <i class="fa-solid fa-arrow-up-from-bracket block text-2xl mb-1"></i> Withdraw
                </button>
            </div>
        </div>

        <div class="px-6 flex-1 overflow-y-auto">
            <h3 class="font-bold text-gray-800 mb-4">Recent Transactions</h3>
            <div class="space-y-4 text-sm text-gray-500 italic">No transactions yet.</div>
        </div>
    </div>
</body>
</html>
