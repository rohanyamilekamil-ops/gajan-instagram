<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900/50 h-screen flex flex-col justify-end">
    <div class="bg-white rounded-t-[40px] p-6 h-[75vh] overflow-y-auto">
        <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-6" onclick="history.back()"></div>
        <div class="bg-gray-100 rounded-xl p-3 flex items-center mb-6">
            <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
            <input type="text" placeholder="Search friends..." class="bg-transparent outline-none w-full text-sm">
        </div>
        <div class="grid grid-cols-3 gap-6" id="user-grid"></div>
        <hr class="my-8">
        <div class="flex justify-around items-center opacity-70">
            <i class="fa-brands fa-whatsapp text-4xl text-green-500"></i>
            <i class="fa-solid fa-link text-3xl bg-gray-100 p-3 rounded-full"></i>
            <i class="fa-solid fa-share-nodes text-3xl bg-gray-100 p-3 rounded-full"></i>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const snap = await getDocs(collection(db, "users"));
        const grid = document.getElementById('user-grid');
        snap.forEach(uDoc => {
            const u = uDoc.data();
            grid.innerHTML += `<div class="flex flex-col items-center"><img src="${u.photo || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-full object-cover mb-2 border"><p class="text-[10px] font-bold">${u.name || 'User'}</p><button class="bg-blue-500 text-white px-3 py-1 rounded mt-2 text-[9px]">Send</button></div>`;
        });
    </script>
</body>
</html>
