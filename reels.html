<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Official Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 📱 Side UI (Right Side Buttons) */
        .side-ui { position: absolute; right: 12px; bottom: 140px; z-index: 50; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        .icon-btn { font-size: 28px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.1s; }
        .icon-btn:active { transform: scale(1.3); }

        /* 📝 Bottom Info */
        .bottom-ui { position: absolute; bottom: 95px; left: 15px; z-index: 50; color: white; width: 70%; text-shadow: 0 1px 4px #000; }
        
        /* 💖 Big Heart Animation */
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 100px; z-index: 100; pointer-events: none; opacity: 0; }
        .animate-heart { animation: heartPop 0.7s ease-out; }
        @keyframes heartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 0.9; } 100% { scale: 1.5; opacity: 0; } }

        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div class="feed-container" id="gajan-feed"></div>

    <nav>
        <a href="reels.html"><i class="fa-solid fa-house text-2xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-500"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-gray-500"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-gray-500"></i></a>
        <div onclick="location.href='profile.html'" class="w-7 h-7 rounded-full bg-white border border-gray-600"></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let viewed = new Set();

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
            const container = document.getElementById('gajan-feed');
            const oldScroll = container.scrollTop;
            container.innerHTML = "";
            
            sn.forEach(reelDoc => {
                const d = reelDoc.data();
                const rid = reelDoc.id;
                const isLiked = d.likedBy && auth.currentUser && d.likedBy.includes(auth.currentUser.uid);

                container.innerHTML += `
                    <div class="reel-unit" ondblclick="handleDoubleTap('${rid}', '${d.uid}', this)">
                        <video class="rvid" data-id="${rid}" data-creator="${d.uid}" loop playsinline muted preload="auto" src="${d.videoUrl}"></video>
                        <i class="fa-solid fa-heart big-heart"></i>
                        
                        <div class="side-ui">
                            <div>
                                <i class="fa-solid fa-heart icon-btn ${isLiked ? 'text-red-500' : 'text-white'}" onclick="handleLikeClick('${rid}', '${d.uid}', this.parentElement.parentElement)"></i>
                                <p class="text-[11px] font-bold mt-1">${d.likedBy ? d.likedBy.length : 0}</p>
                            </div>
                            <div onclick="window.location.href='comments.html?id=${rid}'">
                                <i class="fa-solid fa-comment icon-btn"></i>
                                <p class="text-[11px] font-bold mt-1">Chat</p>
                            </div>
                            <div onclick="shareAction('${rid}', '${d.videoUrl}')">
                                <i class="fa-solid fa-paper-plane icon-btn text-[24px]"></i>
                                <p class="text-[11px] font-bold mt-1">Share</p>
                            </div>
                            <div class="opacity-60 mt-2">
                                <i class="fa-solid fa-eye text-xl"></i>
                                <p class="text-[9px] font-bold">${d.views || 0}</p>
                            </div>
                        </div>

                        <div class="bottom-ui">
                            <p class="font-bold text-sm tracking-tight">@${d.name || 'GajanUser'}</p>
                            <p class="text-xs opacity-90 mt-1">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            container.scrollTop = oldScroll;
            setupObserver();
        });

        function setupObserver() {
            const vids = document.querySelectorAll('.rvid');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(async (e) => {
                    const v = e.target;
                    const rid = v.dataset.id;
                    const cUid = v.dataset.creator;
                    if (e.isIntersecting) {
                        v.play().catch(()=>{});
                        if(!viewed.has(rid)) {
                            viewed.add(rid);
                            await updateDoc(doc(db, "reels", rid), { views: increment(1) });
                            if(cUid) await updateDoc(doc(db, "users", cUid), { totalViews: increment(1) }, { merge: true });
                        }
                    } else { v.pause(); }
                });
            }, { threshold: 0.8 });
            vids.forEach(v => obs.observe(v));
        }

        window.handleLikeClick = async (rid, cUid, el) => {
            if(!auth.currentUser) return alert("Pehle Login karein!");
            if(auth.currentUser.uid === cUid) return alert("Aap apni video like nahi kar sakte!");

            try {
                await runTransaction(db, async (t) => {
                    const myWallet = await t.get(doc(db, "wallets", auth.currentUser.uid));
                    const reelDoc = await t.get(doc(db, "reels", rid));
                    if (reelDoc.data().likedBy && reelDoc.data().likedBy.includes(auth.currentUser.uid)) throw "Already Liked";
                    if (!myWallet.exists() || myWallet.data().balance < 1) throw "Insufficent Tokens! Wallet recharge karein.";

                    t.update(doc(db, "wallets", auth.currentUser.uid), { balance: increment(-1) });
                    t.set(doc(db, "wallets", cUid), { balance: increment(1) }, { merge: true });
                    t.update(doc(db, "reels", rid), { likedBy: arrayUnion(auth.currentUser.uid) });
                });
                const h = el.querySelector('.big-heart');
                h.classList.add('animate-heart');
                setTimeout(() => h.classList.remove('animate-heart'), 700);
            } catch(e) { if(e !== "Already Liked") alert(e); }
        };

        window.handleDoubleTap = (rid, cUid, el) => { handleLikeClick(rid, cUid, el); };

        window.shareAction = (rid, url) => {
            const text = `Gajan App par ye video dekho! \nLink: ${window.location.origin}/reels.html?id=${rid}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        };

        document.addEventListener('click', (e) => { if(e.target.tagName === 'VIDEO') e.target.muted = !e.target.muted; });
    </script>
</body>
</html>
