<script type="module">
    // --- Notification UI Function ---
    function showTokenNotif(senderName) {
        const notif = document.createElement('div');
        notif.className = "fixed top-10 left-1/2 -translate-x-1/2 z-[300] bg-white text-black px-6 py-3 rounded-full shadow-2xl font-bold text-[10px] animate-bounce border-2 border-yellow-500";
        notif.innerHTML = `🔥 🎉 <b>${senderName}</b> sent you 1 Token!`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 4000);
    }

    // --- Like Logic with Notification Trigger ---
    window.triggerLike = async (rid, creatorUid, el) => {
        if(!auth.currentUser) return alert("Login First!");
        if(auth.currentUser.uid === creatorUid) return;

        const heart = el.querySelector('.fa-heart');
        if (heart.classList.contains('text-red-500')) return;

        try {
            await runTransaction(db, async (t) => {
                const myWallet = doc(db, "wallets", auth.currentUser.uid);
                const hisWallet = doc(db, "wallets", creatorUid);
                const mySnap = await t.get(myWallet);
                
                if (!mySnap.exists() || mySnap.data().balance < 1) throw "No Tokens!";

                t.update(myWallet, { balance: increment(-1) });
                t.set(hisWallet, { balance: increment(1) }, { merge: true });
                
                // 🔔 Notification Document Create Karna
                const notifId = "NOTIF-" + Date.now();
                t.set(doc(db, "notifications", creatorUid), {
                    from: auth.currentUser.displayName || "Someone",
                    type: "token",
                    time: serverTimestamp()
                }, { merge: true });

                t.update(doc(db, "reels", rid), { likedBy: arrayUnion(auth.currentUser.uid) });
            });
            heart.classList.replace('text-white', 'text-red-500');
        } catch (e) {
            if(e === "No Tokens!") document.getElementById('token-buy-modal').classList.remove('hidden');
        }
    };

    // --- Real-time Notification Listener ---
    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "notifications", user.uid), (s) => {
                if(s.exists()) {
                    showTokenNotif(s.data().from);
                }
            });
        }
    });
</script>
