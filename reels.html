<script type="module">
    // ... (purana firebase config) ...

    onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
        const container = document.getElementById('gajan-feed');
        container.innerHTML = "";
        sn.forEach(rd => {
            const d = rd.data();
            const rid = rd.id;
            container.innerHTML += `
                <div class="reel-unit">
                    <video class="rvid" loop playsinline muted src="${d.videoUrl}"></video>
                    
                    <div class="side-ui">
                        <div onclick="sendTokenGift('${d.uid}', '${d.name}')">
                            <i class="fa-solid fa-gift icon-btn text-pink-500 animate-bounce"></i>
                            <p class="text-[9px] font-bold">SEND GIFT</p>
                        </div>
                        
                        <div id="admin-tools" class="hidden">
                             <button onclick="deleteVideo('${rid}')" class="bg-red-600 p-2 rounded-full text-xs"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>

                    <div class="bottom-ui">
                        <p class="font-bold">@${d.name}</p>
                        <p class="text-[10px] text-green-400">Last Active: ${new Date(d.lastActive).toLocaleDateString()}</p>
                    </div>
                </div>`;
        });
    });

    // GIFT LOGIC (User to User)
    window.sendTokenGift = async (toUid, toName) => {
        const amount = prompt(`Kitne tokens ${toName} ko bhejne hain?`);
        if(!amount || isNaN(amount)) return;
        
        const fromRef = doc(db, "users", auth.currentUser.uid);
        const toRef = doc(db, "users", toUid);
        
        const fromSnap = await getDoc(fromRef);
        if(fromSnap.data().tokens >= amount) {
            await updateDoc(fromRef, { tokens: increment(-amount) });
            await updateDoc(toRef, { tokens: increment(parseInt(amount)) });
            alert(`Gift Sent Successfully to ${toName}!`);
        } else {
            alert("In-sufficient balance!");
        }
    };
</script>
