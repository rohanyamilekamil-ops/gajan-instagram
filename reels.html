<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Smart Fit Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }

        .reels-container {
            height: 100dvh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        .reel-slide {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Blur Effect (Instagram Style) */
        .video-bg-blur {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.5);
            opacity: 0.6;
            z-index: 1;
        }

        /* Main UHD Video - Smart Fit */
        .main-video {
            position: relative;
            width: 100%;
            height: 100%;
            max-height: 100dvh;
            object-fit: contain; /* Isse video ka koi bhi part nahi katega aur object nahi dabega */
            z-index: 2;
        }

        /* UI Overlays */
        .content-info {
            position: absolute;
            bottom: 100px;
            left: 15px;
            right: 80px;
            z-index: 10;
            color: white;
            pointer-events: none;
        }

        .side-bar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 25px;
            color: white;
        }

        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="reels-container">
        <div class="reel-slide">
            <video class="video-bg-blur" muted loop src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
            
            <video class="main-video" loop playsinline preload="auto" onclick="togglePlay(this)">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>

            <div class="content-info">
                <p class="font-bold">@gajan_premium</p>
                <p class="text-xs mt-1">Smart Fit Mode: No parts cut, only pure UHD quality. 🔥</p>
            </div>

            <div class="side-bar">
                <div class="text-center"><i class="fa-solid fa-heart text-3xl"></i><p class="text-[10px] font-bold">1.5M</p></div>
                <div class="text-center"><i class="fa-solid fa-comment text-3xl"></i><p class="text-[10px] font-bold">10K</p></div>
                <i class="fa-solid fa-share text-2xl"></i>
            </div>
        </div>
    </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] text-black font-bold">G</div></a>
    </nav>

    <script>
        function togglePlay(vid) {
            const bgVid = vid.parentElement.querySelector('.video-bg-blur');
            if (vid.paused) {
                vid.play();
                bgVid.play();
                vid.muted = false;
            } else {
                vid.pause();
                bgVid.pause();
            }
        }
    </script>
</body>
</html>
