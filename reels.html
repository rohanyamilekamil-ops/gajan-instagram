<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Official Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-wrapper { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; background: #000; }
        .feed-wrapper::-webkit-scrollbar { display: none; }
        .reel-container { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui-side { position: absolute; right: 15px; bottom: 130px; z-index: 30; display: flex; flex-direction: column; gap: 25px; color: white; text-align: center; }
        .ui-bottom { position: absolute; bottom: 100px; left: 15px; z-index: 30; color: white; width: 70%; }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: linear-gradient(transparent, #000); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .f-btn { border: 1px solid white; padding: 2px 10px; border-radius: 5px; font-size: 11px; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="feed-wrapper" id="g-feed">
        </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <a href="search.html"><i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] font-bold text-black border-2 border-white">G</div></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Real-time listener: data aate hi dikhega
        const q = query(collection(db, "reels"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('g-feed');
            feed.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="reel-container">
                        <video class="video-element" loop playsinline muted src="${data.videoUrl}"></video>
                        <div class="ui-side">
                            <i class="fa-solid fa-heart text-3xl"></i><p class="text-[11px] font-bold">${data.likedBy ? data.likedBy.length : 0}</p>
                            <i class="fa-solid fa-comment text-3xl" onclick="window.location.href='comments.html?id=${doc.id}'"></i>
                            <i class="fa-solid fa-paper-plane text-2xl" onclick="window.location.href='share_menu.html?vid=${doc.id}'"></i>
                        </div>
                        <div class="ui-bottom">
                            <p class="font-bold text-sm">@${data.name || 'User'} <span class="f-btn">Follow</span></p>
                            <p class="text-xs mt-1 opacity-90">${data.caption || ''}</p>
                        </div>
                    </div>`;
            });
            setupObserver();
        });

        function setupObserver() {
            const vids = document.querySelectorAll('.video-element');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.play().catch(() => {});
                    } else {
                        entry.target.pause();
                    }
                });
            }, { threshold: 0.7 });
            vids.forEach(v => observer.observe(v));
        }

        // Tap to Unmute/Play
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO') {
                e.target.muted = false; // Pehli bar touch karte hi sound chalu
                e.target.paused ? e.target.play() : e.target.pause();
            }
        });
    </script>
</body>
</html>
