<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | HD Reels Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 🎨 Logo & Header Overlay */
        .g-header { position: fixed; top: 0; width: 100%; p: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); padding: 15px; }
        .logo-icon { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border-radius: 10px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .side-ui { position: absolute; right: 12px; bottom: 130px; z-index: 50; display: flex; flex-direction: column; gap: 22px; color: white; text-align: center; }
        .bottom-ui { position: absolute; bottom: 90px; left: 15px; z-index: 50; color: white; width: 75%; text-shadow: 0 1px 4px #000; }
        
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 100px; z-index: 100; pointer-events: none; opacity: 0; }
        .animate-heart { animation: hPop 0.7s ease-out; }
        @keyframes hPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 0.9; } 100% { scale: 1.5; opacity: 0; } }
        
        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <header class="g-header">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='profile.html'">
            <div class="logo-icon shadow-lg">
                <span class="text-white font-black text-xl italic">G</span>
                <i class="fa-solid fa-crown absolute -top-1.5 -right-1.5 text-yellow-400 text-[9px] rotate-12"></i>
            </div>
            <h1 class="text-white font-black italic tracking-tighter text-lg">Gajan</h1>
        </div>
        <div class="flex gap-6 text-white text-xl">
            <i class="fa-solid fa-camera"></i>
            <i class="fa-solid fa-paper-plane"></i>
        </div>
    </header>

    <div class="feed-container" id="g-feed"></div>

    <nav>
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-500"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-gray-500"></i></a>
        <div onclick="location.href='profile.html'" class="w-6 h-6 rounded-full bg-white border border-gray-400"></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let viewed = new Set();

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
            const container = document.getElementById('g-feed');
            const currentScroll = container.scrollTop;
            container.innerHTML = "";
            sn.forEach(rDoc => {
                const d = rDoc.data();
                const rid = rDoc.id;
                const isLiked = d.likedBy && auth.currentUser && d.likedBy.includes(auth.currentUser.uid);

                container.innerHTML += `
                    <div class="reel-unit" ondblclick="handlePayLike('${rid}', '${d.uid}', this)">
                        <video class="rvid" data-id="${rid}" data-creator="${d.uid}" loop playsinline muted preload="auto" src="${d.videoUrl}"></video>
                        <i class="fa-solid fa-heart big-heart"></i>
                        <div class="side-ui">
                            <div>
                                <i class="fa-solid fa-heart text-3xl ${isLiked ? 'text-red-500' : 'text-white'}" onclick="handlePayLike('${rid}', '${d.uid}', this.parentElement.parentElement)"></i>
                                <p class="text-[11px] font-bold mt-0.5">${d.likedBy ? d.likedBy.length : 0}</p>
                            </div>
                            <div onclick="window.location.href='comments.html?id=${rid}'">
                                <i class="fa-solid fa-comment text-3xl"></i>
                                <p class="text-[11px] font-bold">Chat</p>
                            </div>
                            <div onclick="shareWA('${rid}')">
                                <i class="fa-solid fa-paper-plane text-2xl"></i>
                                <p class="text-[11px] font-bold">Share</p>
                            </div>
                            <div class="opacity-60 mt-1">
                                <i class="fa-solid fa-eye"></i>
                                <p class="text-[9px] font-bold">${d.views || 0}</p>
                            </div>
                        </div>
                        <div class="bottom-ui">
                            <p class="font-bold text-sm">@${d.name || 'User'}</p>
                            <p class="text-xs opacity-80 mt-1">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            container.scrollTop = currentScroll;
            setupFeedObserver();
        });

        function setupFeedObserver() {
            const vids = document.querySelectorAll('.rvid');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(async (e) => {
                    const v = e.target;
                    if (e.isIntersecting) {
                        v.play().catch(()=>{});
                        if(!viewed.has(v.dataset.id)) {
                            viewed.add(v.dataset.id);
                            await updateDoc(doc(db, "reels", v.dataset.id), { views: increment(1) });
                            if(v.dataset.creator) await updateDoc(doc(db, "users", v.dataset.creator), { totalViews: increment(1) }, { merge: true });
                        }
                    } else { v.pause(); }
                });
            }, { threshold: 0.8 });
            vids.forEach(v => observer.observe(v));
        }

        window.handlePayLike = async (rid, cUid, el) => {
            if(!auth.currentUser) return alert("Login!");
            if(auth.currentUser.uid === cUid) return; // Own video like won't cost/give tokens

            try {
                await runTransaction(db, async (t) => {
                    const myWallet = await t.get(doc(db, "wallets", auth.currentUser.uid));
                    const reelDoc = await t.get(doc(db, "reels", rid));
                    if (reelDoc.data().likedBy && reelDoc.data().likedBy.includes(auth.currentUser.uid)) throw "Already Liked";
                    if (!myWallet.exists() || myWallet.data().balance < 1) throw "No Tokens!";

                    t.update(doc(db, "wallets", auth.currentUser.uid), { balance: increment(-1) });
                    t.set(doc(db, "wallets", cUid), { balance: increment(1) }, { merge: true });
                    t.update(doc(db, "reels", rid), { likedBy: arrayUnion(auth.currentUser.uid) });
                });
                const h = el.querySelector('.big-heart');
                h.classList.add('animate-heart');
                setTimeout(() => h.classList.remove('animate-heart'), 700);
            } catch(e) { if(e !== "Already Liked") alert(e); }
        };

        window.shareWA = (rid) => {
            const link = `${window.location.origin}/reels.html?id=${rid}`;
            window.open(`https://api.whatsapp.com/send?text=Gajan App par ye dekho: ${link}`, '_blank');
        };

        document.addEventListener('click', (e) => { if(e.target.tagName === 'VIDEO') e.target.muted = !e.target.muted; });
    </script>
</body>
</html>
