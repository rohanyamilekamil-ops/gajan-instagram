<div class="side-ui">
    <div onclick="sendTokenPopup('${d.uid}', '${reelDoc.id}')" class="flex flex-col items-center">
        <i class="fa-solid fa-coins text-3xl text-yellow-500 animate-bounce"></i>
        <p class="text-[9px] font-bold">GIFT</p>
    </div>
    </div>

<div class="bottom-ui">
    <div class="flex items-center">
        <p class="font-bold text-sm">@${d.name || 'User'}</p>
        <button id="f-${d.uid}" onclick="followAction('${d.uid}')" class="f-btn bg-white text-black px-3 py-1 ml-2 rounded-full text-[10px] font-bold">Follow</button>
    </div>
</div>

<script type="module">
    // Follow System Logic
    window.followAction = async (targetId) => {
        if(!auth.currentUser) return alert("Login First!");
        const myRef = doc(db, "users", auth.currentUser.uid);
        await updateDoc(myRef, { following: arrayUnion(targetId) });
        document.getElementById('f-'+targetId).innerText = "Following";
        document.getElementById('f-'+targetId).style.opacity = "0.5";
    };

    // Token Gift Popup
    window.sendTokenPopup = (targetUid, reelId) => {
        const amount = prompt("Kitne Gajan Tokens bhejne hain? (1 - 100,000)");
        if(amount && !isNaN(amount)) {
            // Yahan Wallet logic connect hoga
            alert(amount + " Tokens bheje gaye! Confirmation jald aayega.");
        }
    };
</script>
