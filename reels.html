<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Fast & Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .reels-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; background: #000; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui-right { position: absolute; right: 15px; bottom: 130px; z-index: 50; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        .ui-left { position: absolute; bottom: 100px; left: 15px; z-index: 50; color: white; width: 75%; }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: linear-gradient(transparent, #000); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div class="reels-container" id="feed-box">
        </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] font-bold text-black border-2 border-white">G</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let viewedAlready = new Set(); 

        // Millions of users ke liye 'getDocs' best hai (Data load once, No Loop)
        async function fetchStableReels() {
            const q = query(collection(db, "reels"), orderBy("time", "desc"));
            const snapshot = await getDocs(q);
            const box = document.getElementById('feed-box');
            box.innerHTML = "";

            snapshot.forEach(reelDoc => {
                const data = reelDoc.data();
                box.innerHTML += `
                    <div class="reel-unit">
                        <video class="reel-video" data-id="${reelDoc.id}" loop playsinline muted src="${data.videoUrl}"></video>
                        <div class="ui-right">
                            <i class="fa-solid fa-heart text-3xl" onclick="likeMe('${reelDoc.id}', this)"></i>
                            <p class="text-[11px] font-bold">${data.likedBy ? data.likedBy.length : 0}</p>
                            <i class="fa-solid fa-comment text-3xl" onclick="window.location.href='comments.html?id=${reelDoc.id}'"></i>
                            <i class="fa-solid fa-eye text-2xl opacity-70"></i>
                            <p class="text-[9px] font-bold" id="v-${reelDoc.id}">${data.views || 0}</p>
                            <i class="fa-solid fa-paper-plane text-2xl" onclick="window.location.href='share_menu.html?vid=${reelDoc.id}'"></i>
                        </div>
                        <div class="ui-left">
                            <p class="font-bold text-sm">@${data.name || 'GajanUser'}</p>
                            <p class="text-xs mt-1 opacity-80">${data.caption || ''}</p>
                        </div>
                    </div>`;
            });
            initSwipeLogic();
        }

        function initSwipeLogic() {
            const vids = document.querySelectorAll('.reel-video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const video = entry.target;
                        const rid = video.dataset.id;
                        video.play().catch(()=>{});
                        
                        // Silent View Update: Sirf 1 bar update hoga
                        if (!viewedAlready.has(rid)) {
                            viewedAlready.add(rid);
                            updateDoc(doc(db, "reels", rid), { views: increment(1) });
                            // Screen par bina refresh kiye number update
                            const vTxt = document.getElementById('v-'+rid);
                            if(vTxt) vTxt.innerText = parseInt(vTxt.innerText) + 1;
                        }
                    } else {
                        entry.target.pause();
                    }
                });
            }, { threshold: 0.6 });
            vids.forEach(v => observer.observe(v));
        }

        window.likeMe = async (id, btn) => {
            if(auth.currentUser) {
                btn.style.color = "red";
                await updateDoc(doc(db, "reels", id), { likedBy: arrayUnion(auth.currentUser.uid) });
            }
        };

        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO') {
                e.target.muted = !e.target.muted;
                if(e.target.paused) e.target.play();
            }
        });

        fetchStableReels();
    </script>
</body>
</html>
