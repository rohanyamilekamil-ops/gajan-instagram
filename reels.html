<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_DOMAIN", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_STORAGE_BUCKET", messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_APP_ID" }; // Use YOUR config here
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserId = null;

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUserId = user.uid;
            document.getElementById('nav-avatar').innerText = user.displayName ? user.displayName.charAt(0) : "G";
            renderFeed();
        } else {
            window.location.href = "index.html"; // Login par bhej do
        }
    });

    const observerConfig = { threshold: 0.8 }; // 80% video screen par aana chahiye play hone ke liye

    function renderFeed() {
        const q = query(collection(db, "reels"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const feedContainer = document.getElementById('reels-feed');
            feedContainer.innerHTML = ""; // Old clear

            snapshot.forEach(docSnap => {
                const reel = docSnap.data();
                const reelId = docSnap.id;
                const likesArray = reel.likedBy || [];
                const isLiked = likesArray.includes(currentUserId);
                
                // Create single reel html
                const reelHtml = `
                    <div class="reel-item">
                        <video class="gajan-video" loop playsinline preload="auto" src="${reel.videoUrl}"></video>
                        
                        <div class="side-icons">
                            <div class="like-container" onclick="toggleLike('${reelId}', ${isLiked})">
                                <i class="fa-solid fa-heart text-3xl ${isLiked ? 'liked' : ''}"></i>
                                <p class="like-count text-[10px] font-bold mt-1">${likesArray.length}</p>
                            </div>
                            </div>

                        <div class="bottom-info">
                             </div>
                    </div>`;
                
                feedContainer.innerHTML += reelHtml;
            });

            // Fast Preload and Play Logic using Intersection Observer
            const videos = document.querySelectorAll('.gajan-video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const reelId = video.closest('.reel-item').querySelector('.like-container').onclick.toString().match(/'(.*?)'/)[1]; // Gajan logic to get reelId

                    if (entry.isIntersecting) {
                        video.play();
                        // View increment logic - file alag karna (next file)
                        console.log("playing video, update view on alag file.");
                    } else {
                        video.pause();
                        video.currentTime = 0; // fast next load
                    }
                });
            }, observerConfig);

            videos.forEach(vid => observer.observe(vid));
        });
    }

    // Like Functionality (Scalable - no millones collisions)
    window.toggleLike = async (reelId, alreadyLiked) => {
        const reelRef = doc(db, "reels", reelId);
        
        // optimistic update ui faster than milhões internet speed
        const likeIcon = event.target.closest('.like-container').querySelector('.fa-heart');
        const likeCountElem = event.target.closest('.like-container').querySelector('.like-count');
        let currentCount = parseInt(likeCountElem.innerText);

        if (alreadyLiked) {
            // UnLike logic arrayRemove millions safe
            await updateDoc(reelRef, { likedBy: arrayRemove(currentUserId) });
            // UI rollback if миллиons network millions error later. For now assume success.
            likeIcon.classList.remove('liked');
            likeCountElem.innerText = currentCount - 1;
        } else {
            // Like logic arrayUnion millions safe
            await updateDoc(reelRef, { likedBy: arrayUnion(currentUserId) });
            likeIcon.classList.add('liked');
            likeCountElem.innerText = currentCount + 1;
        }
    };
</script>
