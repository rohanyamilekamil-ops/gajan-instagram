<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Full Screen UHD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
            position: fixed; /* Scroll bars lock karne ke liye */
        }

        /* Full Screen Container */
        .reels-container {
            height: 100dvh; /* Dynamic height for mobile address bar */
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        /* Individual Reel */
        .reel-slide {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        /* FORCE FULL SCREEN VIDEO */
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; /* Isse video pura khinch jayega aur bars khatam hongi */
            z-index: 1;
        }

        /* Content Overlay (Bottom Text) */
        .content-overlay {
            position: absolute;
            bottom: 90px; /* Nav bar ke upar */
            left: 15px;
            right: 80px;
            z-index: 10;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* Side Actions (Icons) */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            color: white;
        }

        /* Bottom Nav */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom); /* iPhone notch support */
        }
    </style>
</head>
<body>

    <div class="reels-container">
        <div class="reel-slide">
            <video loop playsinline preload="auto" onclick="toggleVideo(this)">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>

            <div id="status-icon" class="absolute inset-0 flex items-center justify-center z-20 opacity-40 pointer-events-none">
                <i class="fa-solid fa-volume-xmark text-white text-6xl" id="v-icon"></i>
            </div>

            <div class="content-overlay">
                <p class="font-bold text-lg">@gajan_premium</p>
                <p class="text-xs mt-1">UHD Mode: No more black bars! 🔥 Smooth Full Screen experience.</p>
            </div>

            <div class="side-actions">
                <div class="text-center"><i class="fa-solid fa-heart text-3xl"></i><p class="text-[10px] font-bold">1.5M</p></div>
                <div class="text-center"><i class="fa-solid fa-comment text-3xl"></i><p class="text-[10px] font-bold">10K</p></div>
                <i class="fa-solid fa-share text-2xl"></i>
                <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
            </div>
        </div>
    </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] text-black font-bold">G</div></a>
    </nav>

    <script>
        function toggleVideo(vid) {
            const icon = document.getElementById('v-icon');
            const statusBox = document.getElementById('status-icon');

            if (vid.paused) {
                vid.play();
                vid.muted = false; // Sound chalu
                statusBox.classList.add('hidden');
            } else {
                vid.pause();
                statusBox.classList.remove('hidden');
                icon.className = "fa-solid fa-play text-white text-6xl";
            }
        }
    </script>
</body>
</html>
