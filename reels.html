<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Real Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-ui { position: absolute; right: 12px; bottom: 130px; z-index: 50; display: flex; flex-direction: column; gap: 22px; color: white; text-align: center; }
        .bottom-ui { position: absolute; bottom: 90px; left: 15px; z-index: 50; color: white; width: 80%; }
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 0.5px solid #222; }
    </style>
</head>
<body>
    <div class="feed-container" id="gajan-feed"></div>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house text-2xl text-gray-600"></i></a>
        <a href="upload.html"><i class="fa-solid fa-square-plus text-2xl text-gray-600"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user text-2xl text-gray-600"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        onAuthStateChanged(auth, (u) => { 
            if(u && u.displayName === 'MRGAJAN') isAdmin = true; 
        });

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
            const container = document.getElementById('gajan-feed');
            container.innerHTML = "";
            sn.forEach(rd => {
                const d = rd.data();
                const rid = rd.id;
                container.innerHTML += `
                    <div class="reel-unit">
                        <video class="rvid" loop playsinline muted src="${d.videoUrl}" onclick="this.muted = !this.muted" data-id="${rid}"></video>
                        <div class="side-ui">
                            <i class="fa-solid fa-heart text-3xl"></i><p class="text-xs -mt-4">${d.likedBy?.length || 0}</p>
                            <i class="fa-solid fa-gift text-3xl text-pink-500" onclick="alert('Gifting Soon!')"></i>
                            <i class="fa-solid fa-eye text-2xl opacity-70"></i><p class="text-[10px] -mt-4">${d.views || 0}</p>
                            ${isAdmin ? `<button onclick="deletePost('${rid}')" class="text-red-500 text-2xl"><i class="fa-solid fa-trash"></i></button>` : ''}
                        </div>
                        <div class="bottom-ui">
                            <div class="flex items-center mb-2">
                                <img src="${d.userPhoto || 'https://via.placeholder.com/50'}" class="w-8 h-8 rounded-full border border-white mr-2">
                                <p class="font-bold text-sm">@${d.name || 'User'}</p>
                            </div>
                            <p class="text-xs opacity-90">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            setupObserver();
        });

        window.deletePost = async (id) => {
            if(confirm("Delete this video?")) { await deleteDoc(doc(db, "reels", id)); alert("Deleted!"); }
        };

        function setupObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => { 
                    if (e.isIntersecting) {
                        e.target.play();
                        updateDoc(doc(db, "reels", e.target.getAttribute('data-id')), { views: increment(1) });
                    } else e.target.pause(); 
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.rvid').forEach(v => obs.observe(v));
        }
    </script>
</body>
</html>
