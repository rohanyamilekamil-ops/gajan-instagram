<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Stable Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; background: #000; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-item { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-ui { position: absolute; right: 15px; bottom: 130px; z-index: 50; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        .bottom-ui { position: absolute; bottom: 100px; left: 15px; z-index: 50; color: white; text-shadow: 0 1px 4px #000; }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: linear-gradient(transparent, #000); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div class="feed-container" id="reels-list"></div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] font-bold text-black border-2 border-white">G</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let viewedReels = new Set(); // Views ko control karne ke liye

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
            const container = document.getElementById('reels-list');
            const currentScroll = container.scrollTop;
            container.innerHTML = "";
            sn.forEach(reelDoc => {
                const d = reelDoc.data();
                container.innerHTML += `
                    <div class="reel-item">
                        <video class="rvid" data-id="${reelDoc.id}" loop playsinline muted src="${d.videoUrl}"></video>
                        <div class="side-ui">
                            <i class="fa-solid fa-heart text-3xl" onclick="likePost('${reelDoc.id}')"></i>
                            <p class="text-[11px] font-bold">${d.likedBy ? d.likedBy.length : 0}</p>
                            <i class="fa-solid fa-comment text-3xl" onclick="window.location.href='comments.html?id=${reelDoc.id}'"></i>
                            <i class="fa-solid fa-eye text-2xl opacity-70"></i>
                            <p class="text-[9px] font-bold">${d.views || 0}</p>
                            <i class="fa-solid fa-paper-plane text-2xl" onclick="window.location.href='share_menu.html?vid=${reelDoc.id}'"></i>
                        </div>
                        <div class="bottom-ui">
                            <p class="font-bold text-sm">@${d.name || 'GajanUser'} <span class="ml-2 border px-2 py-0.5 rounded text-[10px]" onclick="location.href='users.html'">Follow</span></p>
                            <p class="text-xs mt-1 opacity-80">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            container.scrollTop = currentScroll;
            initObserver();
        });

        function initObserver() {
            const vids = document.querySelectorAll('.rvid');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target;
                    const rid = video.dataset.id;
                    if (e.isIntersecting) {
                        video.play().catch(()=>{});
                        // Sirf ek baar view count hoga jab tak page refresh na ho
                        if (!viewedReels.has(rid)) {
                            viewedReels.add(rid);
                            updateDoc(doc(db, "reels", rid), { views: increment(1) });
                        }
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.6 });
            vids.forEach(v => obs.observe(v));
        }

        window.likePost = async (id) => {
            if(auth.currentUser) {
                await updateDoc(doc(db, "reels", id), { likedBy: arrayUnion(auth.currentUser.uid) });
            }
        };

        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO') {
                e.target.muted = !e.target.muted;
                if(e.target.paused) e.target.play();
            }
        });
    </script>
</body>
</html>
