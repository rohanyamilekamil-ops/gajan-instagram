<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Official Feed Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .g-header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding: 15px 20px; }
        .side-ui { position: absolute; right: 12px; bottom: 140px; z-index: 50; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        .icon-btn { font-size: 28px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.1s; }
        .icon-btn:active { transform: scale(1.3); }
        .bottom-ui { position: absolute; bottom: 100px; left: 15px; z-index: 50; color: white; width: 70%; text-shadow: 0 1px 4px #000; }
        .creator-badge { display: flex; items-center; gap: 10px; margin-bottom: 12px; }
        .creator-pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 100px; z-index: 100; pointer-events: none; opacity: 0; }
        .animate-heart { animation: heartPop 0.7s ease-out; }
        @keyframes heartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 0.9; } 100% { scale: 1.5; opacity: 0; } }
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <header class="g-header">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='profile.html'">
            <div class="bg-gradient-to-tr from-[#f09433] via-[#dc2743] to-[#bc1888] rounded-xl w-9 h-9 flex items-center justify-center relative shadow-lg">
                <span class="text-white font-black text-xl italic">G</span>
                <i class="fa-solid fa-crown absolute -top-1.5 -right-1.5 text-yellow-400 text-[9px] rotate-12"></i>
            </div>
            <h1 class="text-white font-black italic tracking-tighter text-lg">Gajan Insta</h1>
        </div>
        <div class="flex gap-6 text-white text-xl"><i class="fa-solid fa-camera"></i><i class="fa-solid fa-paper-plane"></i></div>
    </header>

    <div class="feed-container" id="gajan-feed"></div>

    <nav>
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-500"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-gray-500"></i></a>
        <div onclick="location.href='profile.html'" class="w-7 h-7 rounded-full p-[1.5px] bg-gradient-to-tr from-yellow-400 to-fuchsia-600 cursor-pointer shadow-lg active:scale-90 transition">
            <img id="my-nav-pfp" src="https://via.placeholder.com/30" class="w-full h-full rounded-full border border-gray-900 object-cover">
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, runTransaction, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let viewed = new Set();

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                // User ki apni photo nav mein
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists() && userDoc.data().photoURL) {
                    document.getElementById('my-nav-pfp').src = userDoc.data().photoURL;
                } else if(user.photoURL) {
                    document.getElementById('my-nav-pfp').src = user.photoURL;
                }
            }
        });

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
            const container = document.getElementById('gajan-feed');
            const oldScroll = container.scrollTop; container.innerHTML = "";
            sn.forEach(reelDoc => {
                const d = reelDoc.data();
                const rid = reelDoc.id;
                const isLiked = d.likedBy && auth.currentUser && d.likedBy.includes(auth.currentUser.uid);
                
                // Photo check: d.photoURL ya d.pfp jo bhi database mein hai
                const creatorPhoto = d.photoURL || d.pfp || 'https://via.placeholder.com/150';

                container.innerHTML += `
                    <div class="reel-unit" ondblclick="handlePayLike('${rid}', '${d.uid}', this)">
                        <video class="rvid" data-id="${rid}" data-creator="${d.uid}" loop playsinline muted preload="auto" src="${d.videoUrl}"></video>
                        <i class="fa-solid fa-heart big-heart"></i>
                        <div class="side-ui">
                            <div><i class="fa-solid fa-heart icon-btn ${isLiked ? 'text-red-500' : 'text-white'}" onclick="handlePayLike('${rid}', '${d.uid}', this.parentElement.parentElement)"></i><p class="text-[11px] font-bold mt-1">${d.likedBy ? d.likedBy.length : 0}</p></div>
                            <div onclick="location.href='comments.html?id=${rid}'"><i class="fa-solid fa-comment icon-btn"></i><p class="text-[11px] font-bold mt-1">Chat</p></div>
                            <div onclick="shareAction('${rid}')"><i class="fa-solid fa-paper-plane icon-btn text-[24px]"></i><p class="text-[11px] font-bold mt-1">Share</p></div>
                            <div class="opacity-60 mt-2">
                                <i class="fa-solid fa-eye text-xl"></i>
                                <p class="text-[9px] font-bold">${d.views || 0}</p>
                            </div>
                        </div>
                        <div class="bottom-ui">
                            <div class="creator-badge">
                                <img src="${creatorPhoto}" class="creator-pfp border-2 border-white">
                                <div class="flex flex-col">
                                    <p class="font-bold text-sm">@${d.name || 'User'}</p>
                                    <p class="text-[8px] opacity-70 uppercase">UID: ${d.uid.substring(0,8)}...</p>
                                </div>
                                <button onclick="followUser('${d.uid}', this)" class="bg-white text-black px-4 py-1 rounded-lg text-[10px] font-bold ml-2">Follow</button>
                            </div>
                            <p class="text-xs opacity-90">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            container.scrollTop = oldScroll;
            setupObserver();
        });

        function setupObserver() {
            const vids = document.querySelectorAll('.rvid');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(async (e) => {
                    const v = e.target; const rid = v.dataset.id; const cUid = v.dataset.creator;
                    if (e.isIntersecting) { 
                        v.play().catch(()=>{}); 
                        if(!viewed.has(rid)) { 
                            viewed.add(rid); 
                            await updateDoc(doc(db, "reels", rid), { views: increment(1) }); 
                            if(cUid) await updateDoc(doc(db, "users", cUid), { totalViews: increment(1) }, { merge: true }); 
                        } 
                    }
                    else { v.pause(); }
                });
            }, { threshold: 0.8 }); vids.forEach(v => obs.observe(v));
        }

        window.handlePayLike = async (rid, cUid, el) => {
            if(!auth.currentUser) return alert("Login!"); 
            if(auth.currentUser.uid === cUid) return;
            try {
                await runTransaction(db, async (t) => {
                    const myWalletRef = doc(db, "wallets", auth.currentUser.uid);
                    const hisWalletRef = doc(db, "wallets", cUid);
                    const reelRef = doc(db, "reels", rid);
                    
                    const myWallet = await t.get(myWalletRef);
                    const reelDoc = await t.get(reelRef);

                    if (reelDoc.data().likedBy && reelDoc.data().likedBy.includes(auth.currentUser.uid)) throw "Already Liked";
                    if (!myWallet.exists() || myWallet.data().balance < 1) throw "No Tokens!";

                    t.update(myWalletRef, { balance: increment(-1) });
                    t.set(hisWalletRef, { balance: increment(1) }, { merge: true });
                    t.update(reelRef, { likedBy: arrayUnion(auth.currentUser.uid) });
                });
                const h = el.querySelector('.big-heart'); h.classList.add('animate-heart'); setTimeout(() => h.classList.remove('animate-heart'), 700);
            } catch(e) { if(e !== "Already Liked") alert(e); }
        };

        window.followUser = async (tUid, btn) => {
            if(!auth.currentUser) return;
            const myRef = doc(db, "users", auth.currentUser.uid); const tRef = doc(db, "users", tUid);
            if(btn.innerText === "Follow") { 
                await updateDoc(myRef, { following: arrayUnion(tUid) }); 
                await updateDoc(tRef, { followers: arrayUnion(auth.currentUser.uid) }); 
                btn.innerText = "Following"; btn.style.opacity = "0.5"; 
            }
            else { 
                await updateDoc(myRef, { following: arrayRemove(tUid) }); 
                await updateDoc(tRef, { followers: arrayRemove(auth.currentUser.uid) }); 
                btn.innerText = "Follow"; btn.style.opacity = "1"; 
            }
        };

        window.shareAction = (rid) => {
            const link = `${window.location.origin}/reels.html?id=${rid}`;
            window.open(`https://api.whatsapp.com/send?text=Gajan App par ye mast video dekho: ${link}`, '_blank');
        };

        document.addEventListener('click', (e) => { if(e.target.tagName === 'VIDEO') e.target.muted = !e.target.muted; });
    </script>
</body>
</html>
