<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Ultra HD Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overscroll-behavior-y: none; /* Smooth feel on scroll */
        }
        
        /* main container for swipe */
        .reels-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* VVIP for smooth mobile swipe */
        }
        .reels-scroller::-webkit-scrollbar { display: none; }

        /* Each reel section */
        .reel {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        /* VVIP UHD VIDEO SETTINGS */
        video {
            height: 100%;
            width: 100%;
            object-fit: cover; /* Cover full screen */
            
            /* High-Performance Rendering (Smoothness Fix) */
            will-change: transform;
            transform: translateZ(0); 
            
            /* Remove default browser bars */
            outline: none;
            -webkit-media-controls-play-button { display: none; }
        }

        /* Floating elements visibility */
        .overlay-elements { pointer-events: none; }
        .interactive-icon { pointer-events: auto; }

        /* Bottom Nav Fix */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 100;
            border-top: 1px solid #1a1a1a;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body class="no-scrollbar">

    <div class="reels-scroller">
        
        <div class="reel">
            <video loop preload="auto" playsinline id="v1" onclick="handleReelAction(this)">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>

            <div id="hint-1" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50 z-20">
                <i class="fa-solid fa-volume-xmark text-white text-5xl" id="vol-1"></i>
            </div>

            <div class="side-actions absolute right-4 bottom-[120px] z-30 text-white flex flex-col items-center gap-7">
                <div class="flex flex-col items-center interactive-icon"><i class="fa-solid fa-heart text-3xl"></i><span class="text-[11px] font-bold">1.5M</span></div>
                <div class="flex flex-col items-center interactive-icon"><i class="fa-solid fa-comment text-3xl"></i><span class="text-[11px] font-bold">10K</span></div>
                <i class="fa-solid fa-share-nodes text-2xl interactive-icon"></i>
                <i class="fa-solid fa-ellipsis text-xl interactive-icon"></i>
            </div>

            <div class="overlay-elements absolute bottom-[100px] left-4 right-[80px] z-30 text-white p-4 rounded-xl" style="background: linear-gradient(transparent, rgba(0,0,0,0.6));">
                <p class="font-bold text-base">@gajan_premium</p>
                <p class="text-xs mt-1 leading-relaxed">UHD 4k mode active! Experience the smoothness. Tap to unmute. 🔥 #gajan #premium #jamnagar</p>
            </div>
        </div>

    </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-600"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-600"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-7 h-7 rounded-full bg-white flex items-center justify-center text-xs text-black font-bold border border-black">G</div></a>
    </nav>

    <script>
        function handleReelAction(video) {
            const vIcon = document.getElementById('vol-1');
            const vHint = document.getElementById('hint-1');

            if (video.paused) {
                video.play();
                video.muted = false; // Unmute on click
                vHint.classList.add('hidden');
            } else {
                video.pause();
                vHint.classList.remove('hidden');
            }
        }

        // Browser policy: Pehla video hamesha click se hi sound dega.
        window.addEventListener('load', () => {
            alert("✨ Welcome to Gajan UHD! Tap on the video to play with Sound.");
        });
    </script>
</body>
</html>
