<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Reels Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .side-ui { position: absolute; right: 12px; bottom: 140px; z-index: 50; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        .icon-btn { font-size: 28px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .bottom-ui { position: absolute; bottom: 100px; left: 15px; z-index: 50; color: white; width: 75%; }
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 0.5px solid #222; }
    </style>
</head>
<body>
    <div class="feed-container" id="gajan-feed"></div>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house text-2xl text-gray-500"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-500"></i>
        <a href="upload.html"><i class="fa-solid fa-square-plus text-2xl text-gray-500"></i></a>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="profile.html"><div id="nav-pic" class="w-7 h-7 rounded-full bg-gray-700 border border-white overflow-hidden"></div></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        onAuthStateChanged(auth, (u) => { 
            user = u; 
            if(u?.photoURL) document.getElementById('nav-pic').innerHTML = `<img src="${u.photoURL}" class="w-full h-full object-cover">`;
        });

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), (sn) => {
            const container = document.getElementById('gajan-feed');
            container.innerHTML = "";
            sn.forEach(rd => {
                const d = rd.data();
                const rid = rd.id;
                container.innerHTML += `
                    <div class="reel-unit">
                        <video class="rvid" loop playsinline muted src="${d.videoUrl}" onclick="this.muted = !this.muted"></video>
                        <div class="side-ui">
                            <div onclick="likeAction('${rid}')"><i class="fa-solid fa-heart icon-btn"></i><p class="text-[11px]">${d.likedBy?.length || 0}</p></div>
                            <i class="fa-solid fa-comment icon-btn" onclick="location.href='comments.html?id=${rid}'"></i>
                            <div onclick="location.href='wallet.html?to=${d.uid}'"><i class="fa-solid fa-coins icon-btn text-yellow-500"></i><p class="text-[9px]">GIFT</p></div>
                            <i class="fa-solid fa-paper-plane icon-btn"></i>
                        </div>
                        <div class="bottom-ui">
                            <div class="flex items-center mb-2">
                                <img src="${d.userPhoto || 'https://via.placeholder.com/50'}" class="w-8 h-8 rounded-full border border-white mr-2">
                                <p class="font-bold text-sm">@${d.name || 'User'}</p>
                            </div>
                            <p class="text-xs opacity-90">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            startObserver();
        });

        function startObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => { if (e.isIntersecting) e.target.play(); else e.target.pause(); });
            }, { threshold: 0.8 });
            document.querySelectorAll('.rvid').forEach(v => obs.observe(v));
        }
    </script>
</body>
</html>
