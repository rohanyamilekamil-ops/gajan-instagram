<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan Insta | HD Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed::-webkit-scrollbar { display: none; }
        .reel { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .bottom-ui { position: absolute; bottom: 100px; left: 15px; z-index: 50; color: white; width: 80%; }
        .side-ui { position: absolute; right: 15px; bottom: 150px; z-index: 50; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; }
        .sound-toggle { position: fixed; top: 20px; right: 20px; z-index: 200; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; color: white; }
    </style>
</head>
<body>

    <button class="sound-toggle" onclick="toggleAllSound()"><i id="vol-icon" class="fa-solid fa-volume-xmark"></i></button>

    <div class="feed" id="main-feed"></div>

    <nav class="fixed bottom-0 w-full h-[65px] bg-black border-t border-gray-800 flex justify-around items-center z-[100]">
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-xl text-gray-400"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-gray-400"></i></a>
        <div onclick="location.href='profile.html'" class="w-7 h-7 rounded-full bg-white border"></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isMuted = true;
        window.toggleAllSound = () => {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            document.getElementById('vol-icon').className = isMuted ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
        };

        onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), async (sn) => {
            const container = document.getElementById('main-feed');
            container.innerHTML = "";
            for (const rDoc of sn.docs) {
                const d = rDoc.data();
                const userSnap = await getDoc(doc(db, "users", d.uid));
                const userPhoto = userSnap.exists() ? userSnap.data().photoURL : "https://via.placeholder.com/150";

                container.innerHTML += `
                    <div class="reel">
                        <video class="rvid" loop playsinline muted preload="auto" src="${d.videoUrl}"></video>
                        <div class="side-ui">
                            <i class="fa-solid fa-heart text-3xl"></i>
                            <p class="text-xs font-bold">${d.likedBy?.length || 0}</p>
                            <i class="fa-solid fa-comment text-3xl"></i>
                        </div>
                        <div class="bottom-ui">
                            <div class="flex items-center gap-3 mb-3">
                                <img src="${userPhoto}" class="w-10 h-10 rounded-full border-2 border-white object-cover">
                                <p class="font-bold text-sm">@${d.name || 'User'}</p>
                                <button onclick="location.href='list.html'" class="bg-white text-black px-4 py-1 rounded-lg text-[10px] font-bold">Follow</button>
                            </div>
                            <p class="text-xs opacity-90">${d.caption || ''}</p>
                        </div>
                    </div>`;
            }
            setupObserver();
        });

        function setupObserver() {
            const vids = document.querySelectorAll('.rvid');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) { e.target.play().catch(()=>{}); e.target.muted = isMuted; }
                    else { e.target.pause(); }
                });
            }, { threshold: 0.8 });
            vids.forEach(v => obs.observe(v));
        }
    </script>
</body>
</html>
