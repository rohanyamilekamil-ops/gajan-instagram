<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Reels Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }

        /* Smooth Vertical Swipe Container */
        .reels-wrapper {
            height: 100dvh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-unit {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video Fit System */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Instagram style full screen */
            z-index: 1;
        }

        /* Basic UI Overlay */
        .ui-overlay {
            position: absolute; bottom: 100px; left: 15px; z-index: 10; color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .side-btns {
            position: absolute; right: 15px; bottom: 140px; z-index: 10;
            display: flex; flex-direction: column; gap: 25px; color: white;
        }

        /* Navigation */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: linear-gradient(transparent, #000);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="reels-wrapper" id="main-feed">
        </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] font-bold text-black">G</div></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Reels from Database
        const q = query(collection(db, "reels"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('main-feed');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="reel-unit">
                        <video class="reel-video" loop playsinline src="${data.videoUrl}"></video>
                        <div class="ui-overlay">
                            <p class="font-bold">@${data.name || 'GajanUser'}</p>
                            <p class="text-xs opacity-80 mt-1">${data.caption || ''}</p>
                        </div>
                        <div class="side-btns">
                            <i class="fa-solid fa-heart text-3xl"></i>
                            <i class="fa-solid fa-comment text-3xl" onclick="window.location.href='comments.html?id=${doc.id}'"></i>
                            <i class="fa-solid fa-share text-2xl"></i>
                        </div>
                    </div>`;
            });
            setupPlayLogic();
        });

        // Swipe play logic
        function setupPlayLogic() {
            const videos = document.querySelectorAll('.reel-video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.play(); // Screen par aate hi play
                    } else {
                        entry.target.pause(); // Screen se hat-te hi pause
                    }
                });
            }, { threshold: 0.8 });
            videos.forEach(v => observer.observe(v));
        }

        // Click to pause/play
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO') {
                e.target.paused ? e.target.play() : e.target.pause();
            }
        });
    </script>
</body>
</html>
