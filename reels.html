<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .reels-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    </style>
</head>
<body>

    <div class="reels-container" id="reels-feed">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Crucial: Only load data if user is authenticated
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadReels();
            } else {
                // If not logged in, THEN go to index.html
                window.location.href = "index.html";
            }
        });

        function loadReels() {
            const q = query(collection(db, "reels"), orderBy("time", "desc"));
            onSnapshot(q, (sn) => {
                const container = document.getElementById('reels-feed');
                container.innerHTML = "";
                sn.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="reel-item">
                            <video class="gajan-video" loop playsinline src="${d.videoUrl}"></video>
                        </div>`;
                });
                setupObserver();
            });
        }

        function setupObserver() {
            const videos = document.querySelectorAll('.gajan-video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.play();
                    } else {
                        entry.target.pause();
                    }
                });
            }, { threshold: 0.8 });
            videos.forEach(v => observer.observe(v));
        }

        // Tap to play/pause ONLY (No redirection here)
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO') {
                if (e.target.paused) {
                    e.target.play();
                } else {
                    e.target.pause();
                }
            }
        });
    </script>
</body>
</html>
