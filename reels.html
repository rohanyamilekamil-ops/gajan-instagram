<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Stable Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }
        .feed-container { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-box { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-ui { position: absolute; right: 15px; bottom: 120px; z-index: 10; display: flex; flex-direction: column; gap: 22px; color: white; text-align: center; }
        .bottom-ui { position: absolute; bottom: 90px; left: 15px; z-index: 10; color: white; text-shadow: 0 1px 5px #000; }
        .follow-tag { background: rgba(255,255,255,0.2); border: 1px solid #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="feed-container" id="g-feed"></div>

    <nav class="fixed bottom-0 w-full h-[70px] bg-gradient-to-t from-black to-transparent flex justify-around items-center z-50">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "reels"), orderBy("time", "desc"));
        onSnapshot(q, (sn) => {
            const container = document.getElementById('g-feed');
            container.innerHTML = "";
            sn.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="reel-box">
                        <video class="main-v" data-id="${doc.id}" loop playsinline src="${d.videoUrl}"></video>
                        <div class="side-ui">
                            <i class="fa-solid fa-heart text-3xl"></i>
                            <p class="text-[10px] font-bold">${d.likedBy ? d.likedBy.length : 0}</p>
                            <i class="fa-solid fa-comment text-3xl" onclick="window.location.href='comments.html?id=${doc.id}'"></i>
                            <i class="fa-solid fa-paper-plane text-2xl" onclick="window.location.href='share_menu.html?vid=${doc.id}'"></i>
                        </div>
                        <div class="bottom-ui">
                            <div class="flex items-center">
                                <p class="font-bold">@${d.name || 'User'}</p>
                                <span class="follow-tag">Follow</span>
                            </div>
                            <p class="text-xs mt-1 opacity-80">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            initObserver();
        });

        function initObserver() {
            const vids = document.querySelectorAll('.main-v');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.play().catch(() => {});
                        // Silent View Update
                        const rid = e.target.getAttribute('data-id');
                        setTimeout(() => { updateDoc(doc(db, "reels", rid), { views: increment(1) }); }, 2000);
                    } else { e.target.pause(); }
                });
            }, { threshold: 0.8 });
            vids.forEach(v => obs.observe(v));
        }
    </script>
</body>
</html>
