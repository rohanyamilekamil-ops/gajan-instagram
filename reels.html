<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; overflow: hidden; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; scroll-snap-align: start; position: relative; }
        video { height: 100%; width: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 100px; left: 15px; right: 70px; color: white; }
        .side { position: absolute; right: 15px; bottom: 120px; color: white; display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>
    <div class="reels-container">
        <div class="reel">
            <video loop autoplay muted src="https://www.w3schools.com/html/mov_bbb.mp4" onclick="this.paused ? this.play() : this.pause()"></video>
            <div class="side text-center">
                <i class="fa-solid fa-heart text-3xl"></i><p class="text-xs">1.5M</p>
                <i class="fa-solid fa-comment text-3xl"></i><p class="text-xs">10K</p>
                <i class="fa-solid fa-share text-2xl"></i>
            </div>
            <div class="overlay">
                <p class="font-bold">@mrgajan_</p>
                <p class="text-xs mt-1">Jamnagar ki shan! 🔥 #jamnagar #gajan</p>
            </div>
        </div>
        </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around py-4 z-50">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-500"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white border-b-2 border-white pb-1"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-7 h-7 rounded-full bg-white flex items-center justify-center text-[10px] text-black font-bold">G</div></a>
    </nav>
</body>
</html>
