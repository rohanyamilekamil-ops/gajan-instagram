<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Professional Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; }
        .feed-container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .feed-container::-webkit-scrollbar { display: none; }
        .reel-box { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width:100%; height:100%; object-fit: cover; }
        
        /* Side Icons Instagram Style */
        .side-actions { position: absolute; right: 12px; bottom: 120px; z-index: 50; display: flex; flex-direction: column; gap: 18px; color: white; text-align: center; }
        .side-actions i { font-size: 28px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .liked { color: #ff2d55; }

        /* Bottom Info Instagram Style */
        .bottom-ui { position: absolute; bottom: 90px; left: 15px; z-index: 50; color: white; width: 80%; }
        .follow-tag { background: transparent; border: 1px solid white; border-radius: 5px; padding: 2px 8px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="feed-container" id="gajan-feed"></div>

    <nav class="fixed bottom-0 w-full h-[70px] flex justify-around items-center bg-gradient-to-t from-black to-transparent z-[100]">
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div id="nav-p" class="w-8 h-8 rounded-full bg-white border-2 border-white overflow-hidden"><img id="my-pic" src=""></div></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userUID = "";
        onAuthStateChanged(auth, u => { 
            if(u) { userUID = u.uid; document.getElementById('my-pic').src = u.photoURL || 'https://via.placeholder.com/50'; loadFullFeed(); } 
            else { window.location.href="index.html"; }
        });

        function loadFullFeed() {
            const q = query(collection(db, "reels"), orderBy("time", "desc"));
            onSnapshot(q, (sn) => {
                const feed = document.getElementById('gajan-feed');
                feed.innerHTML = "";
                sn.forEach(reelDoc => {
                    const d = reelDoc.data();
                    const id = reelDoc.id;
                    const isLiked = d.likedBy && d.likedBy.includes(userUID);
                    
                    feed.innerHTML += `
                        <div class="reel-box">
                            <video class="vid" data-id="${id}" loop playsinline src="${d.videoUrl}"></video>
                            
                            <div class="side-actions">
                                <div onclick="doLike('${id}', ${isLiked})">
                                    <i class="fa-solid fa-heart ${isLiked ? 'liked' : ''}"></i>
                                    <p class="text-[10px] font-bold mt-1">${d.likedBy ? d.likedBy.length : 0}</p>
                                </div>
                                <i class="fa-solid fa-comment" onclick="window.location.href='comments.html?id=${id}'"></i>
                                <div onclick="doView('${id}')">
                                    <i class="fa-solid fa-eye text-xl"></i>
                                    <p class="text-[10px] font-bold mt-1">${d.views || 0}</p>
                                </div>
                                <i class="fa-solid fa-paper-plane" onclick="alert('Shared!')"></i>
                            </div>

                            <div class="bottom-ui">
                                <div class="flex items-center space-x-3 mb-2">
                                    <a href="userProfile.html?uid=${d.uid}">
                                        <img src="${d.userPhoto || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full border border-white">
                                    </a>
                                    <p class="font-bold text-sm">@${d.name || 'GajanUser'}</p>
                                    <button class="follow-tag" onclick="doFollow('${d.uid}')">Follow</button>
                                </div>
                                <p class="text-xs opacity-90">${d.caption || ''}</p>
                            </div>
                        </div>`;
                });
                setupObserver();
            });
        }

        function setupObserver() {
            const vids = document.querySelectorAll('.vid');
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    if(e.isIntersecting) { 
                        e.target.play(); 
                        updateDoc(doc(db, "reels", e.target.dataset.id), { views: increment(1) });
                    } else { e.target.pause(); }
                });
            }, { threshold: 0.8 });
            vids.forEach(v => obs.observe(v));
        }

        window.doLike = async (id, liked) => {
            const ref = doc(db, "reels", id);
            await updateDoc(ref, { likedBy: liked ? arrayRemove(userUID) : arrayUnion(userUID) });
        };

        window.doFollow = async (target) => {
            const ref = doc(db, "users", userUID);
            await updateDoc(ref, { following: arrayUnion(target) });
            alert("Following User!");
        };
    </script>
</body>
</html>
