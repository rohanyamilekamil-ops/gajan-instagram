<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan Insta | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; color: white; }
        .feed { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .reel { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .side-ui { position: absolute; right: 15px; bottom: 160px; z-index: 50; display: flex; flex-direction: column; gap: 20px; text-align: center; }
        .bottom-ui { position: absolute; bottom: 100px; left: 15px; z-index: 50; width: 80%; }
        .id-badge { background: rgba(255,159,67,0.2); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 9px; color: #ff9f43; border: 0.5px solid #ff9f43; margin-bottom: 5px; display: inline-block; }
        .loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading" class="loader">
        <i class="fa-solid fa-spinner fa-spin text-3xl text-pink-500"></i>
    </div>

    <div class="feed" id="main-feed"></div>

    <nav class="fixed bottom-0 w-full h-[70px] bg-black border-t border-gray-900 flex justify-around items-center z-[100]">
        <a href="reels.html"><i class="fa-solid fa-house text-xl text-white"></i></a>
        <i class="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
        <a href="upload.html"><i class="fa-solid fa-square-plus text-2xl text-pink-500"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-xl text-gray-500"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user text-xl text-gray-500"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, arrayUnion, arrayRemove, runTransaction, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    window.location.href = "index.html"; // Agar login nahi hai toh wapas bhejo
                } else {
                    loadReels();
                }
            });

            function loadReels() {
                const feed = document.getElementById('main-feed');
                const loader = document.getElementById('loading');

                const q = query(collection(db, "reels"), orderBy("time", "desc"));
                
                onSnapshot(q, async (snapshot) => {
                    loader.style.display = 'none';
                    feed.innerHTML = "";
                    
                    if (snapshot.empty) {
                        feed.innerHTML = "<div class='h-screen flex items-center justify-center text-gray-500'>No Videos Yet!</div>";
                        return;
                    }

                    for (let rDoc of snapshot.docs) {
                        const d = rDoc.data();
                        const rid = rDoc.id;
                        
                        feed.innerHTML += `
                            <div class="reel">
                                <video loop playsinline class="rvid" src="${d.videoUrl}"></video>
                                <div class="side-ui">
                                    <div onclick="alert('Like Feature Loading...')">
                                        <i class="fa-solid fa-heart text-3xl text-white"></i>
                                        <p class="text-xs font-bold mt-1">${d.likedBy ? d.likedBy.length : 0}</p>
                                    </div>
                                    <i class="fa-solid fa-comment text-3xl"></i>
                                    <i class="fa-solid fa-share text-3xl"></i>
                                </div>
                                <div class="bottom-ui">
                                    <span class="id-badge">ID: ${rid}</span>
                                    <p class="font-bold text-sm mb-1">@${d.name || 'User'}</p>
                                    <p class="text-xs opacity-80">${d.caption || ''}</p>
                                </div>
                            </div>
                        `;
                    }
                    setupVideoObserver();
                }, (error) => {
                    alert("Firestore Error: " + error.message);
                });
            }

            function setupVideoObserver() {
                const vids = document.querySelectorAll('.rvid');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.play().catch(e => console.log("Auto-play blocked"));
                        } else {
                            entry.target.pause();
                        }
                    });
                }, { threshold: 0.7 });
                vids.forEach(v => observer.observe(v));
            }

        } catch (e) {
            alert("Critical System Error: " + e.message);
        }
    </script>
</body>
</html>
