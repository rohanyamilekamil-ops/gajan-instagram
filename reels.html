<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gajan | Live Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
        .reels-box { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-box::-webkit-scrollbar { display: none; }
        .reel { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background:#000; }
        video { height: 100%; width: 100%; object-fit: cover; }
        .side { position: absolute; right: 15px; bottom: 120px; z-index: 10; color: white; display: flex; flex-direction: column; gap: 20px; }
        nav { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, #000); display: flex; justify-content: space-around; padding: 20px 0; z-index: 20; }
    </style>
</head>
<body>
    <div class="reels-box" id="reels-container">
        </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white border-b-2"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-500"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "reels"), orderBy("time", "desc"));
        onSnapshot(q, (sn) => {
            const container = document.getElementById('reels-container');
            container.innerHTML = "";
            sn.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="reel">
                        <video loop playsinline onclick="this.paused ? this.play() : this.pause()" src="${data.videoUrl}"></video>
                        <div class="side text-center">
                            <i class="fa-solid fa-heart text-3xl"></i><p class="text-[10px]">1.5M</p>
                            <i class="fa-solid fa-comment text-3xl"></i><p class="text-[10px]">10K</p>
                        </div>
                        <div class="absolute bottom-24 left-4 text-white">
                            <p class="font-bold">@${data.name || 'GajanUser'}</p>
                            <p class="text-xs opacity-80">${data.caption || ''}</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
