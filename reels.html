<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gajan | Reels Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }

        /* Yeh container swiping ko smooth banayega */
        .reels-container {
            height: 100dvh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        .reel-item {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        /* Video pure screen par dikhega bina dabe */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Right Side Icons */
        .side-bar {
            position: absolute; right: 15px; bottom: 120px;
            z-index: 10; display: flex; flex-direction: column; gap: 25px; color: white; text-align: center;
        }

        /* Bottom Info */
        .bottom-ui {
            position: absolute; bottom: 90px; left: 15px;
            z-index: 10; color: white;
        }

        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: linear-gradient(transparent, #000);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reels-feed">
        </div>

    <nav>
        <a href="profile.html"><i class="fa-solid fa-house text-2xl text-gray-400"></i></a>
        <i class="fa-solid fa-magnifying-glass text-2xl text-gray-400"></i>
        <a href="reels.html"><i class="fa-solid fa-clapperboard text-2xl text-white"></i></a>
        <a href="wallet.html"><i class="fa-solid fa-wallet text-2xl text-pink-600"></i></a>
        <a href="profile.html"><div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] font-bold text-black">G</div></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", 
            authDomain: "tiktok-clone-gajan.firebaseapp.com", 
            projectId: "tiktok-clone-gajan", 
            storageBucket: "tiktok-clone-gajan.firebasestorage.app", 
            messagingSenderId: "838023307513", 
            appId: "1:838023307513:web:e40efbaf7c3dbf16158228" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Reels
        const q = query(collection(db, "reels"), orderBy("time", "desc"));
        onSnapshot(q, (sn) => {
            const container = document.getElementById('reels-feed');
            container.innerHTML = "";
            sn.forEach(reelDoc => {
                const d = reelDoc.data();
                const id = reelDoc.id;
                
                container.innerHTML += `
                    <div class="reel-item">
                        <video class="v-play" data-id="${id}" loop playsinline src="${d.videoUrl}"></video>
                        <div class="side-bar">
                            <i class="fa-solid fa-heart text-3xl"></i>
                            <p class="text-[10px] font-bold">${d.likedBy ? d.likedBy.length : 0}</p>
                            <i class="fa-solid fa-comment text-3xl"></i>
                            <i class="fa-solid fa-eye text-2xl"></i>
                            <p class="text-[10px] font-bold">${d.views || 0}</p>
                        </div>
                        <div class="bottom-ui">
                            <p class="font-bold">@${d.name || 'GajanUser'}</p>
                            <p class="text-xs opacity-80">${d.caption || ''}</p>
                        </div>
                    </div>`;
            });
            initVideoLogic();
        });

        // Video Play/Pause on Scroll
        function initVideoLogic() {
            const videos = document.querySelectorAll('.v-play');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target;
                    const rid = vid.getAttribute('data-id');

                    if (entry.isIntersecting) {
                        vid.play();
                        // View Count badhane ka logic
                        updateDoc(doc(db, "reels", rid), { views: increment(1) });
                    } else {
                        vid.pause();
                        vid.currentTime = 0;
                    }
                });
            }, { threshold: 0.8 });
            videos.forEach(v => observer.observe(v));
        }

        // Tap to Pause
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO') {
                e.target.paused ? e.target.play() : e.target.pause();
            }
        });
    </script>
</body>
</html>
