<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajan | Comments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: white; height: 100vh; display: flex; flex-direction: column; }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; }
        .input-area { border-top: 1px solid #efefef; padding: 10px 15px; display: flex; align-items: center; gap: 10px; background: white; }
    </style>
</head>
<body>

    <header class="p-4 border-b flex items-center gap-4">
        <i class="fa-solid fa-arrow-left text-xl cursor-pointer" onclick="history.back()"></i>
        <h1 class="font-bold text-lg">Comments</h1>
    </header>

    <div class="comment-list" id="comments-container">
        <p class="text-center text-gray-400 mt-10 text-sm">No comments yet...</p>
    </div>

    <div class="input-area">
        <img id="my-pfp" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover">
        <input id="comment-text" type="text" placeholder="Add a comment..." class="flex-1 outline-none text-sm bg-gray-50 p-2 rounded-full px-4 border">
        <button onclick="postComment()" class="text-blue-500 font-bold text-sm">Post</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const reelId = urlParams.get('id');

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('my-pfp').src = user.photoURL || 'https://via.placeholder.com/40';
                loadComments();
            } else { location.href = "index.html"; }
        });

        async function loadComments() {
            const q = query(collection(db, `reels/${reelId}/comments`), orderBy("time", "desc"));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('comments-container');
                box.innerHTML = "";
                sn.forEach(doc => {
                    const d = doc.data();
                    box.innerHTML += `
                        <div class="flex gap-3 mb-5">
                            <img src="${d.pfp || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full object-cover">
                            <div>
                                <p class="text-sm font-bold">${d.name} <span class="font-normal text-gray-500 text-[10px] ml-2">${new Date(d.time?.toDate()).toLocaleDateString()}</span></p>
                                <p class="text-sm mt-0.5 text-gray-800">${d.text}</p>
                            </div>
                        </div>`;
                });
            });
        }

        window.postComment = async () => {
            const txt = document.getElementById('comment-text').value;
            if(!txt) return;
            
            await addDoc(collection(db, `reels/${reelId}/comments`), {
                name: auth.currentUser.displayName || "Gajan User",
                pfp: auth.currentUser.photoURL || "",
                text: txt,
                uid: auth.currentUser.uid,
                time: serverTimestamp()
            });
            document.getElementById('comment-text').value = "";
        };
    </script>
</body>
</html>
