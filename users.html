<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajan | Discover</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-5">
    <h2 class="font-bold text-xl mb-5">Discover People</h2>
    <div id="u-list" class="space-y-6"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyDMqxLOVO6iB5OTL4_KyiU1ddmf8T3P22Q", authDomain: "tiktok-clone-gajan.firebaseapp.com", projectId: "tiktok-clone-gajan", storageBucket: "tiktok-clone-gajan.firebasestorage.app", messagingSenderId: "838023307513", appId: "1:838023307513:web:e40efbaf7c3dbf16158228" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const snap = await getDocs(collection(db, "users"));
        const list = document.getElementById('u-list');
        snap.forEach(uDoc => {
            const u = uDoc.data();
            list.innerHTML += `<div class="flex items-center justify-between"><div class="flex items-center space-x-3"><img src="${u.photo || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full"><p class="font-bold text-sm">${u.name}</p></div><button onclick="f('${uDoc.id}')" class="bg-black text-white px-4 py-1.5 rounded-lg text-xs">Follow</button></div>`;
        });
        window.f = async (id) => { await updateDoc(doc(db, "users", auth.currentUser.uid), { following: arrayUnion(id) }); alert("Following!"); };
    </script>
</body>
</html>
